# OpenBao Secret Sync — syncs secrets from OpenBao vault to K8s Secrets.
# Runs as an init job on deploy and as a CronJob every hour.
# The K8s Secrets are the delivery mechanism; OpenBao is the source of truth.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-secret-sync
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openbao-secret-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openbao-secret-sync
subjects:
  - kind: ServiceAccount
    name: openbao-secret-sync
    namespace: security
roleRef:
  kind: ClusterRole
  name: openbao-secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-sync-script
  namespace: security
data:
  sync.sh: |
    #!/bin/sh
    set -e
    BAO_ADDR="http://openbao.security.svc:8200"

    # Read the root token from the mounted secret
    BAO_TOKEN=$(cat /openbao-token/token)

    # Helper: read secret from OpenBao and create/update K8s Secret
    sync_secret() {
      local bao_path="$1"
      local k8s_name="$2"
      local k8s_namespace="$3"
      shift 3

      echo "Syncing $bao_path -> $k8s_namespace/$k8s_name"

      # Read from OpenBao
      local data
      data=$(wget -q -O - \
        --header="X-Vault-Token: $BAO_TOKEN" \
        "$BAO_ADDR/v1/convocate/data/$bao_path" 2>&1)

      if [ $? -ne 0 ]; then
        echo "ERROR: Failed to read $bao_path from OpenBao"
        return 1
      fi

      # Build K8s Secret manifest from the key-value pairs
      local tmpfile="/tmp/secret-${k8s_name}.yaml"
      cat > "$tmpfile" <<YAML
    apiVersion: v1
    kind: Secret
    metadata:
      name: $k8s_name
      namespace: $k8s_namespace
      labels:
        managed-by: openbao-sync
    type: Opaque
    stringData:
    YAML

      # Extract each key-value pair using simple parsing
      for key in "$@"; do
        local bao_key=$(echo "$key" | cut -d= -f1)
        local k8s_key=$(echo "$key" | cut -d= -f2)
        local value
        value=$(echo "$data" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['data']['$bao_key'])" 2>/dev/null)
        if [ -n "$value" ]; then
          echo "      $k8s_key: \"$value\"" >> "$tmpfile"
        fi
      done

      # Apply to K8s
      kubectl apply -f "$tmpfile" 2>&1
      rm -f "$tmpfile"
    }

    # Sync all secrets
    sync_secret influxdb influxdb-credentials o11y \
      "password=DOCKER_INFLUXDB_INIT_PASSWORD" \
      "admin_token=DOCKER_INFLUXDB_INIT_ADMIN_TOKEN"

    sync_secret minio minio-credentials data-layer \
      "root_user=MINIO_ROOT_USER" \
      "root_password=MINIO_ROOT_PASSWORD"

    sync_secret grafana grafana-credentials o11y \
      "admin_password=GF_SECURITY_ADMIN_PASSWORD" \
      "influxdb_token=INFLUXDB_TOKEN"

    sync_secret fluentbit fluentbit-credentials o11y \
      "http_token=HTTP_TOKEN"

    echo "=== Secret sync complete ==="
---
apiVersion: v1
kind: Secret
metadata:
  name: openbao-root-token
  namespace: security
type: Opaque
stringData:
  token: "PLACEHOLDER"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-secret-sync
  namespace: security
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: openbao-secret-sync
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sync
              image: 192.168.3.90:5000/convocate/openbao:latest
              command: ["/busybox/sh", "/scripts/sync.sh"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: token
                  mountPath: /openbao-token
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: secret-sync-script
            - name: token
              secret:
                secretName: openbao-root-token
          restartPolicy: OnFailure
