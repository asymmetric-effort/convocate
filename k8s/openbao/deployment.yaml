apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: security
  labels:
    app: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao
  template:
    metadata:
      labels:
        app: openbao
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8200"
        prometheus.io/path: "/v1/sys/health"
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openbao
          image: 192.168.3.90:5000/convocate/openbao:latest
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - containerPort: 8200
              name: api
          env:
            - name: BAO_ADDR
              value: "http://127.0.0.1:8200"
          volumeMounts:
            - name: data
              mountPath: /openbao/data
            - name: audit
              mountPath: /openbao/audit
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 20
            failureThreshold: 5
        # Audit log forwarder sidecar — tails audit.log and sends to InfluxDB
        - name: audit-forwarder
          image: 192.168.3.90:5000/convocate/fluentbit:latest
          args:
            - "-c"
            - "/fluent-bit/etc/fluent-bit.conf"
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          envFrom:
            - secretRef:
                name: fluentbit-audit-credentials
          volumeMounts:
            - name: audit
              mountPath: /openbao/audit
              readOnly: true
            - name: audit-config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openbao-data
        - name: audit
          emptyDir: {}
        - name: audit-config
          configMap:
            name: openbao-audit-fluentbit
