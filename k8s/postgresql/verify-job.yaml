apiVersion: batch/v1
kind: Job
metadata:
  name: verify-postgresql
  namespace: convocate
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: verify-postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: verify
          image: 192.168.3.90:5000/convocate/postgresql:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== PostgreSQL Verification ==="
              /usr/lib/postgresql/17/bin/pg_isready -h postgresql.convocate.svc -U postgres
              if [ $? -eq 0 ]; then
                echo "PASS: PostgreSQL is reachable"
              else
                echo "FAIL: PostgreSQL is not reachable"
                exit 1
              fi
      restartPolicy: OnFailure
