apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: o11y
  labels:
    app: influxdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      securityContext:
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: influxdb
          image: 192.168.3.90:5000/convocate/influxdb:latest
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: "setup"
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: "admin"
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: DOCKER_INFLUXDB_INIT_PASSWORD
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: "convocate"
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: "logs"
            - name: DOCKER_INFLUXDB_INIT_RETENTION
              value: "90d"
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-credentials
                  key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
            - name: INFLUXD_BOLT_PATH
              value: "/var/lib/influxdb2/influxd.bolt"
            - name: INFLUXD_ENGINE_PATH
              value: "/var/lib/influxdb2/engine"
            - name: INFLUXD_TLS_CERT
              value: "/tls/tls.crt"
            - name: INFLUXD_TLS_KEY
              value: "/tls/tls.key"
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
            - name: tls
              mountPath: /tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: influxdb-data
        - name: tls
          secret:
            secretName: influxdb-tls
