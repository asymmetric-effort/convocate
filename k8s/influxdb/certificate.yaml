apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: influxdb-tls
  namespace: o11y
spec:
  secretName: influxdb-tls
  issuerRef:
    name: openbao-pki-internal
    kind: ClusterIssuer
  dnsNames:
    - influxdb
    - influxdb.o11y.svc
    - influxdb.o11y.svc.cluster.local
  duration: 24h
  renewBefore: 12h
