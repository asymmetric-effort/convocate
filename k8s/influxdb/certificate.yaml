apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: influxdb-selfsigned
  namespace: o11y
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: influxdb-tls
  namespace: o11y
spec:
  secretName: influxdb-tls
  issuerRef:
    name: influxdb-selfsigned
    kind: Issuer
  dnsNames:
    - influxdb
    - influxdb.o11y.svc
    - influxdb.o11y.svc.cluster.local
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
