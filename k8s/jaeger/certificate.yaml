apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: jaeger-selfsigned
  namespace: o11y
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jaeger-tls
  namespace: o11y
spec:
  secretName: jaeger-tls
  issuerRef:
    name: jaeger-selfsigned
    kind: Issuer
  dnsNames:
    - jaeger
    - jaeger.o11y.svc
    - jaeger.o11y.svc.cluster.local
  duration: 8760h
  renewBefore: 720h
