apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: o11y
data:
  jaeger.yaml: |
    service:
      extensions: [jaeger_storage, jaeger_query]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]

    extensions:
      jaeger_storage:
        backends:
          badger:
            badger:
              directories:
                keys: /jaeger/keys
                values: /jaeger/values
              ephemeral: false
      jaeger_query:
        storage:
          traces: badger
        http:
          endpoint: 0.0.0.0:16686

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024

    exporters:
      jaeger_storage_exporter:
        trace_storage: badger
