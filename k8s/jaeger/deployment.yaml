apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: o11y
  labels:
    app: jaeger
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      securityContext:
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-permissions
          image: ubuntu:24.04
          command: ["sh", "-c", "chown -R 65534:65534 /jaeger && chmod 700 /jaeger"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /jaeger
      containers:
        - name: jaeger
          image: 192.168.3.90:5000/convocate/jaeger:latest
          args:
            - "--config"
            - "/etc/jaeger/jaeger.yaml"
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 16686
              name: query
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          volumeMounts:
            - name: config
              mountPath: /etc/jaeger
            - name: data
              mountPath: /jaeger
            - name: tls
              mountPath: /tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 16686
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 16686
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: config
          configMap:
            name: jaeger-config
        - name: data
          persistentVolumeClaim:
            claimName: jaeger-data
        - name: tls
          secret:
            secretName: jaeger-tls
