# Default deny-all policy for the convocate-agents namespace.
# Agent pods can only communicate with explicitly allowed destinations.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: convocate-agents
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
# Baseline allow policy for agent pods.
# Permits egress to required services and ingress from the control plane.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-baseline
  namespace: convocate-agents
spec:
  podSelector:
    matchLabels:
      app: convocate-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound from Convocate API (convocate namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: convocate
      ports:
        - protocol: TCP
          port: 8443
  egress:
    # DNS resolution (kube-dns)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Anthropic API (api.anthropic.com)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # SSH for GitHub
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 22
    # Convocate API service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: convocate
      ports:
        - protocol: TCP
          port: 8443
