apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: o11y
data:
  grafana.ini: |
    [server]
    protocol = http
    http_port = 3000
    domain = grafana.asymmetric-effort.com
    root_url = https://grafana.asymmetric-effort.com

    [database]
    type = sqlite3
    path = /var/lib/grafana/grafana.db

    [security]
    admin_user = admin

    [auth.anonymous]
    enabled = false

    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/convocate-cluster.json

    [log]
    mode = console
    level = info

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: https://prometheus.o11y.svc:9090
        isDefault: true
        jsonData:
          tlsSkipVerify: true
        editable: false
      - name: InfluxDB
        type: influxdb
        access: proxy
        url: https://influxdb.o11y.svc:8086
        jsonData:
          version: Flux
          organization: convocate
          defaultBucket: logs
          tlsSkipVerify: true
        secureJsonData:
          token: $INFLUXDB_TOKEN
        editable: false
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.o11y.svc:16686
        isDefault: false
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: convocate
        orgId: 1
        folder: Convocate
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
