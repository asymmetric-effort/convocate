apiVersion: v1
kind: ServiceAccount
metadata:
  name: convocate-api
  namespace: convocate
---
# Cluster-scoped: read-only node access + metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: convocate-api
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: convocate-api
subjects:
  - kind: ServiceAccount
    name: convocate-api
    namespace: convocate
roleRef:
  kind: ClusterRole
  name: convocate-api
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-scoped: agent management in convocate-agents only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: convocate-api-agents
  namespace: convocate-agents
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: convocate-api-agents
  namespace: convocate-agents
subjects:
  - kind: ServiceAccount
    name: convocate-api
    namespace: convocate
roleRef:
  kind: Role
  name: convocate-api-agents
  apiGroup: rbac.authorization.k8s.io
