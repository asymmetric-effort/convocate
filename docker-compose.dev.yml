# Local development environment combining control-plane and agent-host stacks.
#
# All base images are ubuntu:latest or gcr.io/distroless (supply chain policy).
# All listeners bind 127.0.0.1 inside containers; Docker port-mapping
# handles external access on the loopback interface only.
#
# Ports:
#   8443 — Router API (HTTPS, GitHub Actions equivalent of tcp/443)
#   8444 — Web UI + Dispatch mTLS (equivalent of tcp/8443)
#   6379 — Redis (TLS)
#   8200 — OpenBao
#
# Usage:
#   make local/start   # build images and bring up everything
#   make local/logs    # tail all service logs
#   make local/stop    # stop (volumes preserved)
#   make local/reset   # tear down + volumes, regenerate CA, restart

services:
  # --- TLS Bootstrap (runs once, generates dev certs) ---

  tls-init:
    image: convocate-tls-init:latest
    container_name: convocate-tls-init
    volumes:
      - dev-tls:/tls
    restart: "no"

  # --- Control Plane ---

  redis:
    image: convocate-redis:latest
    container_name: convocate-redis
    restart: unless-stopped
    depends_on:
      tls-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      --bind 127.0.0.1
      --tls-port 6379
      --port 0
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients optional
    volumes:
      - redis-data:/data
      - dev-tls:/tls:ro
    healthcheck:
      test: >
        redis-cli -h 127.0.0.1 --tls
        --cert /tls/redis.crt
        --key /tls/redis.key
        --cacert /tls/ca.crt ping
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - convocate-dev

  openbao:
    image: convocate-openbao:latest
    container_name: convocate-openbao
    restart: unless-stopped
    depends_on:
      tls-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=dev-root-token
      - BAO_DEV_LISTEN_ADDRESS=127.0.0.1:8200
    command: server -dev
    volumes:
      - openbao-data:/var/lib/openbao
      - dev-tls:/tls:ro
    cap_add:
      - IPC_LOCK
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "BAO_ADDR=http://127.0.0.1:8200 bao status || true"
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - convocate-dev

  router:
    image: convocate-router:${VERSION:-latest}
    container_name: convocate-router
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:443"
      - "127.0.0.1:8444:8443"
    environment:
      - CONVOCATE_PUBLIC_URL=https://localhost:8443
      - CONVOCATE_REDIS_URL=rediss://redis:6379
      - CONVOCATE_OPENBAO_URL=http://openbao:8200
      - CONVOCATE_DEV=1
    depends_on:
      redis:
        condition: service_healthy
      openbao:
        condition: service_healthy
    volumes:
      - router-data:/var/lib/convocate
      - dev-tls:/tls
    networks:
      - convocate-dev

  # --- Agent Host ---

  dispatch:
    image: convocate-dispatch:${VERSION:-latest}
    container_name: convocate-dispatch
    restart: unless-stopped
    environment:
      - CONVOCATE_CONTROL_URL=https://router:8443
      - CONVOCATE_HOST_ID=dev-host-1
      - CONVOCATE_REDIS_URL=rediss://redis:6379
      - CONVOCATE_DEV=1
    depends_on:
      - router
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - secrets-sockets:/run/convocate/secrets
      - dev-tls:/tls:ro
    networks:
      - convocate-dev

  openbao-agent:
    image: convocate-openbao:latest
    container_name: convocate-openbao-agent
    restart: unless-stopped
    depends_on:
      openbao:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat > /tmp/agent.hcl << 'HCL'
        pid_file = "/tmp/bao-agent.pid"
        vault { address = "http://openbao:8200" }
        auto_auth {
          method "token" {
            config = { token = "dev-root-token" }
          }
        }
        cache { use_auto_auth_token = true }
        listener "tcp" {
          address = "127.0.0.1:8100"
          tls_disable = true
        }
        HCL
        exec bao agent -config=/tmp/agent.hcl
    volumes:
      - openbao-agent-data:/var/lib/openbao
      - dev-tls:/tls:ro
    networks:
      - convocate-dev

  secrets-broker:
    image: convocate-secrets-broker:${VERSION:-latest}
    container_name: convocate-secrets-broker
    restart: unless-stopped
    environment:
      - CONVOCATE_HOST_ID=dev-host-1
      - CONVOCATE_DEV=1
    depends_on:
      - openbao-agent
    volumes:
      - secrets-sockets:/run/convocate/secrets
    networks:
      - convocate-dev

volumes:
  router-data:
  redis-data:
  openbao-data:
  openbao-agent-data:
  secrets-sockets:
  dev-tls:

networks:
  convocate-dev:
    driver: bridge
