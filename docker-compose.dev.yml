# Local development environment combining control-plane and agent-host stacks.
#
# All base images are ubuntu:latest or gcr.io/distroless (supply chain policy).
# All listeners bind 127.0.0.1 inside containers; Docker port-mapping
# handles external access on the loopback interface only.
#
# Ports:
#   8443 — Web UI (HTTPS, operator-facing)
#   8444 — Router API (HTTPS, internal + Dispatch mTLS)
#   6379 — Redis (TLS)
#   8200 — OpenBao
#
# Usage:
#   make local/start   # build images and bring up everything
#   make local/logs    # tail all service logs
#   make local/stop    # stop (volumes preserved)
#   make local/reset   # tear down + volumes, regenerate CA, restart

services:
  # --- TLS Bootstrap (runs once, generates dev certs) ---

  tls-init:
    image: convocate-tls-init:latest
    container_name: convocate-tls-init
    volumes:
      - dev-tls:/tls
    restart: "no"
    networks:
      - convocate-dev

  # --- Control Plane ---

  # Redis is not needed in dev mode — the router uses in-memory MockConn.
  # The convocate-redis image is built for production deployments only.

  openbao:
    image: convocate-openbao:latest
    container_name: convocate-openbao
    restart: unless-stopped
    depends_on:
      tls-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=dev-root-token
      - BAO_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    command: server -dev
    volumes:
      - openbao-data:/var/lib/openbao
      - dev-tls:/tls:ro
    cap_add:
      - IPC_LOCK
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "BAO_ADDR=http://127.0.0.1:8200 bao status || true"
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - convocate-dev

  router-api:
    image: convocate-router-api:${VERSION:-latest}
    container_name: convocate-router-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8444:443"
      - "127.0.0.1:8445:8443"
    environment:
      - CONVOCATE_PUBLIC_URL=https://localhost:8443
      - CONVOCATE_REDIS_URL=rediss://redis:6379
      - CONVOCATE_OPENBAO_URL=http://openbao:8200
      - CONVOCATE_DEV=1
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - CONVOCATE_AUTH_ORG=${CONVOCATE_AUTH_ORG:-asymmetric-effort}
    depends_on:
      openbao:
        condition: service_healthy
    volumes:
      - router-data:/var/lib/convocate
      - dev-tls:/tls
    networks:
      - convocate-dev

  ui:
    image: convocate-ui:${VERSION:-latest}
    container_name: convocate-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:443"
    environment:
      - CONVOCATE_ROUTER_API_URL=https://router-api:443
      - CONVOCATE_DEBUG=1
    depends_on:
      - router-api
    volumes:
      - dev-tls:/tls:ro
    networks:
      - convocate-dev

  # --- Agent Host ---

  dispatch:
    image: convocate-dispatch-api:${VERSION:-latest}
    container_name: convocate-dispatch-api
    restart: unless-stopped
    environment:
      - CONVOCATE_CONTROL_URL=https://router-api:8443
      - CONVOCATE_HOST_ID=dev-host-1
      - CONVOCATE_REDIS_URL=rediss://redis:6379
      - CONVOCATE_DEV=1
    depends_on:
      - router-api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - secrets-sockets:/run/convocate/secrets
      - dev-tls:/tls:ro
    networks:
      - convocate-dev

  openbao-agent:
    image: convocate-openbao:latest
    container_name: convocate-openbao-agent
    restart: unless-stopped
    depends_on:
      openbao:
        condition: service_healthy
    environment:
      - BAO_ADDR=http://openbao:8200
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/agent.hcl << 'HCL'
        pid_file = "/tmp/bao-agent.pid"
        vault { address = "http://openbao:8200" }
        auto_auth {
          method "token_file" {
            config = { token_file_path = "/tmp/bao-token" }
          }
        }
        cache { use_auto_auth_token = true }
        listener "tcp" {
          address = "127.0.0.1:8100"
          tls_disable = true
        }
        HCL
        echo "dev-root-token" > /tmp/bao-token
        exec bao agent -config=/tmp/agent.hcl
    volumes:
      - openbao-agent-data:/var/lib/openbao
      - dev-tls:/tls:ro
    networks:
      - convocate-dev

  secrets-broker:
    image: convocate-secrets-broker:${VERSION:-latest}
    container_name: convocate-secrets-broker
    restart: unless-stopped
    environment:
      - CONVOCATE_HOST_ID=dev-host-1
      - CONVOCATE_DEV=1
    depends_on:
      - openbao-agent
    volumes:
      - secrets-sockets:/run/convocate/secrets
    networks:
      - convocate-dev

volumes:
  router-data:
  openbao-data:
  openbao-agent-data:
  secrets-sockets:
  dev-tls:

networks:
  convocate-dev:
    name: convocate_convocate-dev
    driver: bridge
