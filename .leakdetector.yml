# Leakdetector configuration for Convocate
# See: https://leakdetector.asymmetric-effort.com

# Allowlist patterns for test fixtures (not real secrets)
allowlists:
  # Test fixture tokens used in unit/integration tests
  - description: "Test fixture mock tokens in Go test files"
    paths:
      - ".*_test\\.go$"
    regexes:
      - "mock-token"
      - "Bearer mock-token"
      - "tok-.*"

  # Test fixture tokens in PDV test files
  - description: "PDV test helper auth headers"
    paths:
      - "test/pdv/.*\\.ts$"
    regexes:
      - "mock-token"
      - "Bearer mock-token"

  # Helm template Go syntax (looks like secrets but isn't)
  - description: "Helm template syntax"
    paths:
      - "infrastructure/charts/.*\\.(yaml|tpl)$"

  # Ansible vault references
  - description: "Ansible variable references"
    paths:
      - "infrastructure/.*\\.(yml|yaml|j2)$"

  # OpenBao configuration paths (not secrets, just path references)
  - description: "OpenBao API path references"
    regexes:
      - "/v1/auth/userpass/"
      - "/v1/identity/"
      - "/v1/sys/"
