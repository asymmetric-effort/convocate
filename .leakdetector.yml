# Leakdetector configuration for Convocate
# See: https://leakdetector.asymmetric-effort.com

# Exclude paths from scanning entirely
exclude_paths:
  - "infrastructure/"
  - "test/pdv/"
  - ".*_test\\.go$"

# Allowlist patterns for specific false positives
allowlists:
  # OpenBao API path references (not secrets)
  - description: "OpenBao API path references"
    regexes:
      - "/v1/auth/userpass/"
      - "/v1/identity/"
      - "/v1/sys/"

  # Mock tokens in source
  - description: "Mock token patterns"
    regexes:
      - "mock-token"
      - "tok-.*"
