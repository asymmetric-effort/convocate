---
- name: "Step 1: Destroy existing VMs"
  ansible.builtin.import_playbook: destroy.yml

- name: "Step 2: Provision new VMs"
  ansible.builtin.import_playbook: provision.yml

- name: "Step 3: Build Kubernetes cluster"
  ansible.builtin.import_playbook: cluster.yml

- name: "Step 4: Apply CIS hardening"
  ansible.builtin.import_playbook: harden.yml

- name: "Step 5: Verify cluster health"
  ansible.builtin.import_playbook: verify.yml

# OpenBao is deployed as part of the umbrella Helm chart in deploy.yml.
# The standalone openbao-bootstrap.yml is for manual HA setups only.
#
# - name: "Step 6: Bootstrap OpenBao"
#   ansible.builtin.import_playbook: openbao-bootstrap.yml

# Deploy is best-effort on nightly recycle — it validates that Helm
# can install the chart, but pods may not start without registry
# access and storage provisioning from within the VM network.
# Full deploy validation happens on Cluster B (production).
