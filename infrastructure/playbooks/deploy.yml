---
- name: Create hostPath directories on all nodes
  hosts: k8s_nodes
  gather_facts: false
  become: true
  tasks:
    - name: Create hostPath directories for persistent volumes
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0777"
      loop:
        - /mnt/data-layer/postgresql
        - /mnt/data-layer/redis
        - /mnt/data-layer/minio
        - /mnt/security/openbao
        - /mnt/o11y/influxdb
        - /mnt/o11y/prometheus
        - /mnt/o11y/grafana

- name: Deploy Convocate application
  hosts: control_plane_primary
  gather_facts: true
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  vars:
    convocate_namespace: convocate
    convocate_chart_path: "/tmp/convocate-chart"
  tasks:
    - name: Copy Helm chart to target node
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../charts/convocate/"
        dest: "{{ convocate_chart_path }}/"
        mode: "0644"
        directory_mode: "0755"

    - name: Create placeholder secrets for initial boot
      ansible.builtin.shell:
        cmd: |
          HELM_LABELS="app.kubernetes.io/managed-by=Helm"
          HELM_ANNOT_NAME="meta.helm.sh/release-name=convocate"
          HELM_ANNOT_NS="meta.helm.sh/release-namespace=default"

          for ns in security convocate convocate-agents data-layer o11y; do
            kubectl create namespace $ns --dry-run=client -o yaml | kubectl apply -f -
            kubectl label namespace $ns $HELM_LABELS --overwrite
            kubectl annotate namespace $ns $HELM_ANNOT_NAME $HELM_ANNOT_NS --overwrite
          done
          kubectl create secret generic openbao-unseal-key -n security --from-literal=unseal-key=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic openbao-root-token -n security --from-literal=token=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic openbao-root-token -n convocate --from-literal=token=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic openbao-root-token -n data-layer --from-literal=token=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic openbao-root-token -n o11y --from-literal=token=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic fluentbit-credentials -n o11y --from-literal=HTTP_TOKEN=placeholder --from-literal=influxdb-token=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic minio-credentials -n data-layer --from-literal=root-user=minioadmin --from-literal=root-password=minioadmin123 --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic postgresql-credentials -n convocate --from-literal=DATABASE_URL=postgres://postgres:convocate@postgresql.data-layer.svc:5432/convocate?sslmode=disable --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic postgresql-credentials -n data-layer --from-literal=POSTGRES_PASSWORD=convocate --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic grafana-credentials -n o11y --from-literal=GF_SECURITY_ADMIN_PASSWORD=placeholder --from-literal=INFLUXDB_TOKEN=placeholder --from-literal=OPENBAO_OIDC_CLIENT_ID=placeholder --from-literal=OPENBAO_OIDC_CLIENT_SECRET=placeholder --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic influxdb-credentials -n o11y --from-literal=DOCKER_INFLUXDB_INIT_USERNAME=admin --from-literal=DOCKER_INFLUXDB_INIT_PASSWORD=convocate-influx --from-literal=DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=convocate-influx-token --from-literal=DOCKER_INFLUXDB_INIT_ORG=convocate --from-literal=DOCKER_INFLUXDB_INIT_BUCKET=logs --dry-run=client -o yaml | kubectl apply -f -
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/tls.key -out /tmp/tls.crt -days 365 -nodes -subj "/CN=convocate-internal" 2>/dev/null
          kubectl create secret tls influxdb-tls -n o11y --cert=/tmp/tls.crt --key=/tmp/tls.key --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret tls prometheus-tls -n o11y --cert=/tmp/tls.crt --key=/tmp/tls.key --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret tls grafana-tls -n o11y --cert=/tmp/tls.crt --key=/tmp/tls.key --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/tls.key /tmp/tls.crt

          # Label all secrets for Helm ownership
          for ns in security convocate data-layer o11y; do
            for secret in $(kubectl get secrets -n $ns --no-headers -o custom-columns=:metadata.name 2>/dev/null | grep -v default-token | grep -v ^$); do
              kubectl label secret $secret -n $ns $HELM_LABELS --overwrite 2>/dev/null
              kubectl annotate secret $secret -n $ns $HELM_ANNOT_NAME $HELM_ANNOT_NS --overwrite 2>/dev/null
            done
          done
      changed_when: false

    - name: Add Helm repos if needed
      ansible.builtin.command:
        cmd: "helm repo update"
      changed_when: false
      failed_when: false

    - name: Deploy Convocate via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install convocate {{ convocate_chart_path }}
          --namespace default
          --set cluster.name={{ cluster_name }}
          --set cluster.domain={{ dns_domain }}
          --set global.registry={{ registry_host }}:{{ registry_port | default('5000') }}
          --set api.replicas=2
          --set ui.replicas=2
          --set postgresql.nodeAffinity=node-{{ cluster_name }}-4
          --set redis.nodeAffinity=node-{{ cluster_name }}-3
          --set minio.nodeAffinity=node-{{ cluster_name }}-5
          --set openbao.nodeAffinity=node-{{ cluster_name }}-3
          --set influxdb.nodeAffinity=node-{{ cluster_name }}-4
          --set prometheus.nodeAffinity=node-{{ cluster_name }}-4
          --set grafana.nodeAffinity=node-{{ cluster_name }}-4
          --timeout 10m0s

    - name: Wait briefly for Helm resources to be created
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/convocate-api
          -n {{ convocate_namespace }} --timeout=60s
      changed_when: false
      failed_when: false

    - name: List application pods
      ansible.builtin.command:
        cmd: "kubectl get pods -n {{ convocate_namespace }} --no-headers"
      register: app_pods
      changed_when: false
      failed_when: false

    - name: Print deployment status
      ansible.builtin.debug:
        msg: "{{ app_pods.stdout_lines | default(['no pods yet']) }}"

    # --- OpenBao post-deploy initialization ---

    - name: Wait for OpenBao pod to be running
      ansible.builtin.command:
        cmd: >-
          kubectl wait --for=condition=Ready pod
          -l app=openbao -n security --timeout=120s
      changed_when: false
      retries: 3
      delay: 10
      register: bao_ready
      until: bao_ready.rc == 0

    - name: Get OpenBao ClusterIP
      ansible.builtin.shell:
        cmd: kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}'
      register: bao_clusterip_result
      changed_when: false

    - name: Set OpenBao URL
      ansible.builtin.set_fact:
        bao_url: "http://{{ bao_clusterip_result.stdout }}:8200"

    - name: Check OpenBao initialization status
      ansible.builtin.shell:
        cmd: >-
          curl -s {{ bao_url }}/v1/sys/health 2>/dev/null || true
      register: bao_health_raw
      changed_when: false

    - name: Parse OpenBao health
      ansible.builtin.set_fact:
        bao_initialized: "{{ (bao_health_raw.stdout | from_json).initialized | default(false) }}"
        bao_sealed: "{{ (bao_health_raw.stdout | from_json).sealed | default(true) }}"
      when: bao_health_raw.stdout | length > 0

    - name: Initialize OpenBao (first deploy only)
      ansible.builtin.shell:
        cmd: >-
          curl -s -d '{"secret_shares":1,"secret_threshold":1}'
          {{ bao_url }}/v1/sys/init
      register: bao_init_result
      when: not (bao_initialized | default(false))

    - name: Save init credentials
      ansible.builtin.set_fact:
        bao_unseal_key: "{{ (bao_init_result.stdout | from_json).keys[0] }}"
        bao_root_token: "{{ (bao_init_result.stdout | from_json).root_token }}"
      when: bao_init_result is changed
      no_log: true

    - name: Unseal OpenBao
      ansible.builtin.shell:
        cmd: >-
          curl -s -d '{"key":"{{ bao_unseal_key }}"}'
          {{ bao_url }}/v1/sys/unseal
      when: bao_init_result is changed
      no_log: true

    - name: Store unseal key as K8s secret
      ansible.builtin.command:
        cmd: >-
          kubectl create secret generic openbao-unseal-key
          -n security --from-literal=unseal-key={{ bao_unseal_key }}
          --dry-run=client -o yaml
      register: unseal_secret_yaml
      when: bao_init_result is changed
      no_log: true

    - name: Apply unseal key secret
      ansible.builtin.shell:
        cmd: "echo '{{ unseal_secret_yaml.stdout }}' | kubectl apply -f -"
      when: bao_init_result is changed
      no_log: true

    - name: Store root token in all namespaces
      ansible.builtin.shell:
        cmd: >-
          kubectl create secret generic openbao-root-token
          -n {{ item }} --from-literal=token={{ bao_root_token }}
          --dry-run=client -o yaml | kubectl apply -f -
      loop:
        - security
        - "{{ convocate_namespace }}"
        - data-layer
        - o11y
      when: bao_init_result is changed
      no_log: true

    - name: Enable userpass auth method
      ansible.builtin.shell:
        cmd: >-
          curl -s -d '{"type":"userpass"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/sys/auth/userpass
      when: bao_init_result is changed
      failed_when: false
      no_log: true

    - name: Create admin policy
      ansible.builtin.shell:
        cmd: >-
          curl -s -X PUT -d '{"policy":"path \"*\" { capabilities = [\"create\",\"read\",\"update\",\"delete\",\"list\",\"sudo\"] }"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/sys/policies/acl/admin-policy
      when: bao_init_result is changed
      no_log: true

    - name: Create admin user
      ansible.builtin.shell:
        cmd: >-
          curl -s
          -d '{"password":"{{ openbao_admin_password }}","policies":"admin-policy"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/auth/userpass/users/admin
      when: bao_init_result is changed
      no_log: true

    - name: Create admin identity entity
      ansible.builtin.shell:
        cmd: >-
          curl -s
          -d '{"name":"admin","metadata":{"name":"Administrator","email":"admin@asymmetric-effort.com"},"policies":["admin-policy"]}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/entity
      when: bao_init_result is changed
      no_log: true

    - name: Get userpass accessor
      ansible.builtin.shell:
        cmd: >-
          curl -s -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/sys/auth
      register: bao_auth_result
      when: bao_init_result is changed
      no_log: true

    - name: Parse userpass accessor
      ansible.builtin.set_fact:
        bao_userpass_accessor: "{{ (bao_auth_result.stdout | from_json)['userpass/']['accessor'] }}"
      when: bao_init_result is changed

    - name: Create login-only policy
      ansible.builtin.shell:
        cmd: >-
          curl -s -X PUT -d '{"policy":"path \"auth/token/lookup-self\" { capabilities = [\"read\"] }\npath \"identity/entity/id/*\" { capabilities = [\"read\"] }"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/sys/policies/acl/login-only
      when: bao_init_result is changed
      no_log: true

    - name: Create samcaldwell and pdv-test users
      ansible.builtin.shell:
        cmd: >-
          curl -s -d '{"password":"{{ item.pass }}","policies":"{{ item.policies }}"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/auth/userpass/users/{{ item.name }}
      loop:
        - { name: samcaldwell, pass: "{{ openbao_samcaldwell_password }}", policies: "admin-policy" }
        - { name: pdv-test, pass: "PdvTest-2026-Secure", policies: "login-only" }
      when: bao_init_result is changed
      no_log: true

    - name: Create identity entities for users
      ansible.builtin.shell:
        cmd: >-
          curl -s -d '{"name":"{{ item.name }}","metadata":{"name":"{{ item.display }}","email":"{{ item.email }}"},"policies":["{{ item.policies }}"]}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/entity
      loop:
        - { name: samcaldwell, display: "Sam Caldwell", email: "sam@asymmetric-effort.com", policies: "admin-policy" }
        - { name: pdv-test, display: "PDV Test", email: "pdv@asymmetric-effort.com", policies: "login-only" }
      register: entity_results
      when: bao_init_result is changed
      no_log: true

    - name: Create admins group
      ansible.builtin.shell:
        cmd: >-
          curl -s -d '{"name":"admins","policies":["admin-policy"],"type":"internal"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/group
      when: bao_init_result is changed
      no_log: true

    # --- OIDC provider setup ---

    - name: Create OIDC key
      ansible.builtin.shell:
        cmd: >-
          curl -s -X PUT -d '{"allowed_client_ids":["*"],"algorithm":"RS256","rotation_period":"24h"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/oidc/key/default
      when: bao_init_result is changed
      no_log: true

    - name: Create OIDC scopes
      ansible.builtin.shell:
        cmd: >-
          curl -s -X PUT -d '{{ item.body }}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/oidc/scope/{{ item.name }}
      loop:
        - name: profile
          body: '{"template":"{\"name\": {{identity.entity.metadata.name}}, \"email\": {{identity.entity.metadata.email}}}"}'
        - name: groups
          body: '{"template":"{\"groups\": {{identity.entity.groups.names}}}"}'
      when: bao_init_result is changed
      no_log: true

    - name: Create OIDC Grafana client
      ansible.builtin.shell:
        cmd: >-
          curl -s -X PUT -d '{"redirect_uris":["https://grafana.asymmetric-effort.com/login/generic_oauth"],"assignments":["allow_all"],"key":"default","id_token_ttl":"30m","access_token_ttl":"1h"}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/oidc/client/grafana
      when: bao_init_result is changed
      no_log: true

    - name: Create OIDC provider
      ansible.builtin.shell:
        cmd: >-
          curl -s -X PUT -d '{"issuer":"https://auth.asymmetric-effort.com","allowed_client_ids":["*"],"scopes_supported":["profile","groups"]}'
          -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/oidc/provider/default
      when: bao_init_result is changed
      no_log: true

    - name: Read OIDC client credentials
      ansible.builtin.shell:
        cmd: >-
          curl -s -H 'X-Vault-Token:{{ bao_root_token }}'
          {{ bao_url }}/v1/identity/oidc/client/grafana
      register: oidc_client_result
      when: bao_init_result is changed
      no_log: true

    - name: Parse OIDC client credentials
      ansible.builtin.set_fact:
        oidc_client_id: "{{ (oidc_client_result.stdout | from_json).data.client_id }}"
        oidc_client_secret: "{{ (oidc_client_result.stdout | from_json).data.client_secret }}"
      when: bao_init_result is changed

    - name: Create Grafana credentials secret
      ansible.builtin.shell:
        cmd: >-
          kubectl create secret generic grafana-credentials -n o11y
          --from-literal=GF_SECURITY_ADMIN_PASSWORD=ConvocateGrafana2026
          --from-literal=INFLUXDB_TOKEN=convocate-influx-token
          --from-literal=OPENBAO_OIDC_CLIENT_ID={{ oidc_client_id }}
          --from-literal=OPENBAO_OIDC_CLIENT_SECRET={{ oidc_client_secret }}
          --dry-run=client -o yaml | kubectl apply -f -
      when: bao_init_result is changed
      no_log: true

    - name: Restart Grafana to pick up OIDC credentials
      ansible.builtin.command:
        cmd: kubectl rollout restart deployment grafana -n o11y
      when: bao_init_result is changed

    - name: Restart API to pick up new token
      ansible.builtin.command:
        cmd: >-
          kubectl rollout restart deployment/convocate-api
          -n {{ convocate_namespace }}
      when: bao_init_result is changed

    - name: Wait for API rollout
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/convocate-api
          -n {{ convocate_namespace }} --timeout=120s
      changed_when: false

    # Nginx reverse proxy is configured manually for production (Cluster B).
    # See docs/svr00-cutover.md for the nginx setup instructions.
