---
- name: Build and push OpenBao Docker image
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Build OpenBao Docker image
      ansible.builtin.command:
        cmd: >-
          docker build
          -t 192.168.3.90:5000/openbao:latest
          -f {{ playbook_dir }}/../../infrastructure/docker/openbao.Dockerfile
          {{ playbook_dir }}/../../infrastructure/docker/
      changed_when: true

    - name: Push OpenBao Docker image to self-hosted registry
      ansible.builtin.command:
        cmd: docker push 192.168.3.90:5000/openbao:latest
      changed_when: true

- name: Bootstrap svr00 — base OS, network, firewall
  hosts: svr00
  become: true
  gather_facts: true
  roles:
    - svr00-base

- name: Bootstrap svr00 — Docker
  hosts: svr00
  become: true
  gather_facts: true
  roles:
    - svr00-docker

- name: Bootstrap svr00 — KVM/libvirt
  hosts: svr00
  become: true
  gather_facts: true
  roles:
    - svr00-libvirt
