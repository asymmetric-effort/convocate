---
- name: Prepare all Kubernetes nodes
  hosts: k8s_nodes
  gather_facts: true
  roles:
    - common
    - containerd
    - registry

- name: Initialize primary control plane
  hosts: control_plane_primary
  gather_facts: true
  roles:
    - kubeadm-init
    - kube-vip

- name: Join additional control plane nodes
  hosts: control_plane:!control_plane_primary
  gather_facts: true
  serial: 1
  roles:
    - kubeadm-join-cp
    - kube-vip

- name: Join worker nodes
  hosts: workers
  gather_facts: true
  roles:
    - kubeadm-join-worker

- name: Install CNI and cluster services
  hosts: control_plane_primary
  gather_facts: true
  roles:
    - cilium
    - cert-manager

- name: Create hostPath directories for persistent volumes
  hosts: k8s_nodes
  gather_facts: false
  become: true
  tasks:
    - name: Create hostPath directories with correct ownership
      ansible.builtin.shell:
        cmd: |
          for dir in /mnt/data-layer/postgresql /mnt/data-layer/redis /mnt/data-layer/minio /mnt/security/openbao /mnt/o11y/influxdb /mnt/o11y/prometheus /mnt/o11y/grafana; do
            mkdir -p $dir
            chown 65534:65534 $dir
            chmod 0700 $dir
          done
