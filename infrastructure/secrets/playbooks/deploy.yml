---
- name: Deploy OpenBao secrets infrastructure
  hosts: svr00
  become: true
  gather_facts: false
  vars:
    secrets_dir: /opt/openbao
    deploy_target: "all"
  tasks:
    - name: Create secrets directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      loop:
        - "{{ secrets_dir }}"
        - "{{ secrets_dir }}/config"
        - /var/openbao/secrets-a
        - /var/openbao/secrets-b

    - name: Set data directory ownership for distroless (nobody:nobody)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: "65534"
        group: "65534"
      loop:
        - /var/openbao/secrets-a
        - /var/openbao/secrets-b

    - name: Copy docker-compose.yml to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ secrets_dir }}/docker-compose.yml"
        mode: "0644"
        owner: root
        group: root

    - name: Copy OpenBao config to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../config/openbao-config.hcl"
        dest: "{{ secrets_dir }}/config/openbao-config.hcl"
        mode: "0644"
        owner: root
        group: root

    - name: Pull latest OpenBao image
      ansible.builtin.command:
        cmd: docker pull 192.168.3.90:5000/convocate/openbao:latest
      changed_when: true

    - name: Stop secrets-a before wipe
      ansible.builtin.command:
        cmd: docker compose -f {{ secrets_dir }}/docker-compose.yml stop secrets-a
      changed_when: true
      failed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Wipe secrets-a data (test instance — full reset each deploy)
      ansible.builtin.shell:
        cmd: rm -rf /var/openbao/secrets-a/* && chown 65534:65534 /var/openbao/secrets-a
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Deploy secrets-a (recreate)
      ansible.builtin.command:
        cmd: docker compose -f {{ secrets_dir }}/docker-compose.yml up -d --force-recreate secrets-a
      changed_when: true
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Wait for secrets-a to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://192.168.3.160:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Initialize secrets-a with known root token
      ansible.builtin.shell:
        cmd: |
          HEALTH=$(curl -sf http://192.168.3.160:8200/v1/sys/health 2>/dev/null || echo '{}')
          INIT=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("initialized",False))' 2>/dev/null)
          if [ "$INIT" = "False" ]; then
            RESULT=$(curl -sf -d '{"secret_shares":1,"secret_threshold":1,"root_token_pgp_key":""}' http://192.168.3.160:8200/v1/sys/init)
            UNSEAL_KEY=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["keys"][0])')
            curl -sf -d "{\"key\":\"$UNSEAL_KEY\"}" http://192.168.3.160:8200/v1/sys/unseal
            echo "secrets-a initialized and unsealed"
          fi
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Deploy secrets-b (rolling, non-destructive)
      ansible.builtin.command:
        cmd: docker compose -f {{ secrets_dir }}/docker-compose.yml up -d --no-recreate secrets-b
      changed_when: true
      when: deploy_target == "all" or deploy_target == "secrets-b"

    - name: Restart secrets-b with new image (non-destructive)
      ansible.builtin.shell:
        cmd: |
          docker compose -f {{ secrets_dir }}/docker-compose.yml pull secrets-b
          docker compose -f {{ secrets_dir }}/docker-compose.yml up -d secrets-b
      changed_when: true
      when: deploy_target == "secrets-b"

    - name: Wait for secrets-b to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://192.168.3.161:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-b"

    - name: Initialize secrets-b if first deploy (non-destructive)
      ansible.builtin.shell:
        cmd: |
          HEALTH=$(curl -sf http://192.168.3.161:8200/v1/sys/health 2>/dev/null || echo '{}')
          INIT=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("initialized",False))' 2>/dev/null)
          if [ "$INIT" = "False" ]; then
            RESULT=$(curl -sf -d '{"secret_shares":1,"secret_threshold":1}' http://192.168.3.161:8200/v1/sys/init)
            UNSEAL_KEY=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["keys"][0])')
            curl -sf -d "{\"key\":\"$UNSEAL_KEY\"}" http://192.168.3.161:8200/v1/sys/unseal
            echo "secrets-b initialized (first deploy)"
          else
            SEALED=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("sealed",True))' 2>/dev/null)
            if [ "$SEALED" = "True" ]; then
              echo "ERROR: secrets-b is sealed and cannot be unsealed without key"
              exit 1
            fi
            echo "secrets-b already running"
          fi
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-b"
