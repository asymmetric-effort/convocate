---
# Deploy OpenBao — application-level only.
# Assumes bootstrap has already run (directories, init, PKI, TLS certs).
- name: Deploy OpenBao secrets infrastructure
  hosts: svr00
  become: true
  gather_facts: false
  vars:
    secrets_dir: /opt/openbao
    deploy_target: "all"
  tasks:
    - name: Copy docker-compose.yml to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ secrets_dir }}/docker-compose.yml"
        mode: "0644"
        owner: root
        group: root

    - name: Copy OpenBao TLS configs to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../config/{{ item }}"
        dest: "{{ secrets_dir }}/config/{{ item }}"
        mode: "0644"
        owner: root
        group: root
      loop:
        - openbao-config-secrets-a.hcl
        - openbao-config-secrets-b.hcl

    - name: Pull latest OpenBao image
      ansible.builtin.command:
        cmd: docker pull 192.168.3.90:5000/convocate/openbao:latest
      changed_when: true

    # =========================================================================
    # secrets-a — test instance (wiped each deploy)
    # =========================================================================

    - name: Stop secrets-a before wipe
      ansible.builtin.command:
        cmd: docker compose -f {{ secrets_dir }}/docker-compose.yml stop secrets-a
      changed_when: true
      failed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Wipe secrets-a data (test instance — full reset each deploy)
      ansible.builtin.shell:
        cmd: |
          rm -rf /var/openbao/secrets-a/*
          chown 65534:65534 /var/openbao/secrets-a
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Copy HTTP bootstrap config for secrets-a init
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../config/openbao-config.hcl"
        dest: "{{ secrets_dir }}/config/openbao-config-http.hcl"
        mode: "0644"
        owner: root
        group: root
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Start secrets-a on HTTP for re-init
      ansible.builtin.shell:
        cmd: |
          docker compose -f {{ secrets_dir }}/docker-compose.yml rm -f secrets-a 2>/dev/null || true
          docker stop secrets-a-bootstrap 2>/dev/null || true
          docker rm secrets-a-bootstrap 2>/dev/null || true
          docker run -d --name secrets-a-bootstrap \
            --cap-add IPC_LOCK \
            -p 192.168.3.160:8200:8200 \
            -v /var/openbao/secrets-a:/openbao/data \
            -v {{ secrets_dir }}/config/openbao-config-http.hcl:/openbao/config/config.hcl:ro \
            -e BAO_API_ADDR=http://192.168.3.160:8200 \
            -e BAO_CLUSTER_ADDR=http://192.168.3.160:8201 \
            192.168.3.90:5000/convocate/openbao:latest \
            server -config=/openbao/config/config.hcl
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Wait for secrets-a HTTP to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://192.168.3.160:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Initialize secrets-a and create pdv-test user
      ansible.builtin.shell:
        cmd: |
          BAO=http://192.168.3.160:8200
          HEALTH=$(curl -sf $BAO/v1/sys/health 2>/dev/null || echo '{}')
          INIT=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("initialized",False))' 2>/dev/null)
          if [ "$INIT" = "False" ]; then
            RESULT=$(curl -sf -d '{"secret_shares":1,"secret_threshold":1}' $BAO/v1/sys/init)
            UNSEAL_KEY=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["keys"][0])')
            ROOT=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["root_token"])')
            curl -sf -d "{\"key\":\"$UNSEAL_KEY\"}" $BAO/v1/sys/unseal

            # Enable userpass + KV
            curl -sf -d '{"type":"userpass"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/auth/userpass
            curl -sf -d '{"type":"kv","options":{"version":"2"}}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/secret

            # Create pdv-test policy (CRUD on pdv-test/ namespace only)
            curl -sf -X PUT \
              -d '{"policy":"path \"secret/data/pdv-test/*\" { capabilities = [\"create\",\"read\",\"update\",\"delete\",\"list\"] }\npath \"secret/metadata/pdv-test/*\" { capabilities = [\"list\",\"read\",\"delete\"] }\npath \"auth/token/lookup-self\" { capabilities = [\"read\"] }"}' \
              -H "X-Vault-Token:$ROOT" $BAO/v1/sys/policies/acl/pdv-test-policy

            # Create pdv-test user
            curl -sf -d '{"password":"PdvTest-2026-Secure","policies":"pdv-test-policy"}' \
              -H "X-Vault-Token:$ROOT" $BAO/v1/auth/userpass/users/pdv-test

            # Store unseal key for post-TLS-restart unseal
            echo "$UNSEAL_KEY" > /var/openbao/tls/secrets-a/.unseal-key
            chmod 0400 /var/openbao/tls/secrets-a/.unseal-key

            echo "secrets-a initialized with pdv-test user"
          fi
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Stop secrets-a HTTP bootstrap container
      ansible.builtin.shell:
        cmd: |
          docker stop secrets-a-bootstrap 2>/dev/null || true
          docker rm secrets-a-bootstrap 2>/dev/null || true
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Deploy secrets-a with TLS (recreate)
      ansible.builtin.command:
        cmd: docker compose -f {{ secrets_dir }}/docker-compose.yml up -d --force-recreate secrets-a
      changed_when: true
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Wait for secrets-a TLS to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.160:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    - name: Unseal secrets-a after TLS restart
      ansible.builtin.shell:
        cmd: |
          UNSEAL_KEY=$(cat /var/openbao/tls/secrets-a/.unseal-key 2>/dev/null)
          if [ -n "$UNSEAL_KEY" ]; then
            curl -sf -k -d "{\"key\":\"$UNSEAL_KEY\"}" https://192.168.3.160:8200/v1/sys/unseal
            echo "secrets-a unsealed after TLS restart"
          fi
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-a"

    # =========================================================================
    # secrets-b — production (non-destructive)
    # =========================================================================

    - name: Deploy secrets-b with TLS (pull new image, restart)
      ansible.builtin.shell:
        cmd: |
          docker compose -f {{ secrets_dir }}/docker-compose.yml pull secrets-b
          docker compose -f {{ secrets_dir }}/docker-compose.yml up -d secrets-b
      changed_when: true
      when: deploy_target == "all" or deploy_target == "secrets-b"

    - name: Wait for secrets-b TLS to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.161:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-b"

    - name: Unseal secrets-b after deploy
      ansible.builtin.shell:
        cmd: |
          BAO=https://192.168.3.161:8200
          HEALTH=$(curl -sf -k $BAO/v1/sys/health 2>/dev/null || echo '{}')
          SEALED=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("sealed",True))' 2>/dev/null)
          if [ "$SEALED" = "True" ]; then
            UNSEAL_KEY=$(cat /var/openbao/tls/secrets-b/.unseal-key 2>/dev/null)
            if [ -n "$UNSEAL_KEY" ]; then
              curl -sf -k -d "{\"key\":\"$UNSEAL_KEY\"}" $BAO/v1/sys/unseal
              echo "secrets-b unsealed"
            else
              echo "ERROR: secrets-b is sealed and no unseal key available"
              exit 1
            fi
          else
            echo "secrets-b is already unsealed"
          fi
      changed_when: false
      when: deploy_target == "all" or deploy_target == "secrets-b"
