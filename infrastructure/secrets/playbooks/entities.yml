---
# Create/update identity entities on OpenBao instances.
# Non-destructive — safe to run on any instance at any time.
- name: Configure OpenBao identity entities
  hosts: svr00
  become: true
  gather_facts: false
  vars:
    entities:
      - name: pdv-test
        email: pdv-test@asymmetric-effort.com
        userpass: true
      - name: samcaldwell
        email: sam@asymmetric-effort.com
        userpass: false
      - name: admin
        email: admin@asymmetric-effort.com
        userpass: false
    instances:
      - name: secrets-a
        url: https://192.168.3.160:443
        token_path: /var/openbao/tls/secrets-a/.root-token
      - name: secrets-b
        url: https://192.168.3.161:443
        token_path: /var/openbao/tls/secrets-b/.root-token
  tasks:
    - name: Create/update entities on {{ item.0.name }} ({{ item.1.name }})
      ansible.builtin.shell:
        cmd: |
          BAO={{ item.1.url }}
          TOKEN=$(cat {{ item.1.token_path }} 2>/dev/null)
          if [ -z "$TOKEN" ]; then
            echo "SKIP: No token for {{ item.1.name }}"
            exit 0
          fi
          H="X-Vault-Token:$TOKEN"

          # Create/update entity with metadata
          curl -sf -k -X PUT \
            -d '{"name":"{{ item.0.name }}","metadata":{"email":"{{ item.0.email }}"}}' \
            -H "$H" $BAO/v1/identity/entity/name/{{ item.0.name }}

          # Get entity ID
          ENTITY_ID=$(curl -sf -k -H "$H" $BAO/v1/identity/entity/name/{{ item.0.name }} \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["id"])' 2>/dev/null)

          if [ -z "$ENTITY_ID" ]; then
            echo "ERROR: Failed to get entity ID for {{ item.0.name }} on {{ item.1.name }}"
            exit 1
          fi

          # Check if alias already exists for this entity
          EXISTING_ALIASES=$(curl -sf -k -H "$H" $BAO/v1/identity/entity/name/{{ item.0.name }} \
            | python3 -c 'import sys,json; aliases=json.load(sys.stdin)["data"].get("aliases") or []; print(len(aliases))' 2>/dev/null)

          if [ "$EXISTING_ALIASES" = "0" ]; then
            # Only create alias if entity has a userpass account
            # Check if userpass account exists
            UP_CHECK=$(curl -sf -k -H "$H" $BAO/v1/auth/userpass/users/{{ item.0.name }} 2>/dev/null)
            if [ -n "$UP_CHECK" ] && ! echo "$UP_CHECK" | grep -q '"errors"'; then
              ACCESSOR=$(curl -sf -k -H "$H" $BAO/v1/sys/auth \
                | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["userpass/"]["accessor"])' 2>/dev/null)

              if [ -n "$ACCESSOR" ]; then
                curl -sf -k -X PUT \
                  -d "{\"name\":\"{{ item.0.name }}\",\"canonical_id\":\"$ENTITY_ID\",\"mount_accessor\":\"$ACCESSOR\"}" \
                  -H "$H" $BAO/v1/identity/entity-alias
                echo "{{ item.0.name }}: entity + alias created on {{ item.1.name }}"
              fi
            else
              echo "{{ item.0.name }}: entity created (no userpass account on {{ item.1.name }})"
            fi
          else
            echo "{{ item.0.name }}: entity exists with alias on {{ item.1.name }}"
          fi
      loop: "{{ entities | product(instances) | list }}"
      loop_control:
        label: "{{ item.0.name }} on {{ item.1.name }}"
      changed_when: false
