apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: convocate
  namespace: convocate
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/websocket-services: "convocate-api"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.convocate.asymmetric-effort.com
      secretName: convocate-tls
  rules:
    - host: app.convocate.asymmetric-effort.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: convocate-api
                port:
                  number: 8443
          - path: /
            pathType: Prefix
            backend:
              service:
                name: convocate-ui
                port:
                  number: 8080
