apiVersion: batch/v1
kind: Job
metadata:
  name: verify-minio
  namespace: data-layer
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: verify-minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: verify
          image: ghcr.io/asymmetric-effort/convocate/openbao:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/busybox/sh", "-c"]
          args:
            - |
              echo "=== MinIO Verification ==="
              RESULT=$(/busybox/wget -qO- http://minio.data-layer.svc:9000/minio/health/live 2>&1) || true
              if echo "$RESULT" | /busybox/grep -qi "error"; then
                echo "FAIL: MinIO health check failed"
                exit 1
              fi
              echo "PASS: MinIO is reachable and healthy"
      restartPolicy: OnFailure
