# fluentbit-audit-credentials Secret is created by the OpenBao secret-sync CronJob.
# Token injected from OpenBao secret sync.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-audit-fluentbit
  namespace: security
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  /fluent-bit/etc/parsers.conf

    [INPUT]
        Name          tail
        Tag           openbao.audit
        Path          /openbao/audit/audit.log
        DB            /tmp/flb_audit.db
        Parser        json
        Mem_Buf_Limit 5MB
        Refresh_Interval 5

    [OUTPUT]
        Name                 influxdb
        Match                openbao.audit
        Host                 influxdb.o11y.svc
        Port                 8086
        HTTP_Token           ${HTTP_TOKEN}
        Bucket               logs
        Org                  convocate
        Sequence_Tag         _seq
        tls                  on
        tls.verify           off
        Tag_Keys             type

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
