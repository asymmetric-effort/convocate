---
# Install Traefik ingress controller via Helm.
# Binds to hostPort 443 on the designated traefik_node.
# Non-blocking: failures here do not stop the rest of the cluster deploy.

- name: Add Traefik Helm repository
  ansible.builtin.shell:
    cmd: /usr/local/bin/helm repo add traefik https://traefik.github.io/charts 2>/dev/null || true
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Update Helm repos
  ansible.builtin.shell:
    cmd: /usr/local/bin/helm repo update 2>/dev/null || true
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Render Traefik Helm values
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/traefik-values.yml.j2"
    dest: /tmp/traefik-values.yaml
    mode: "0600"

- name: Install Traefik via Helm
  ansible.builtin.shell:
    cmd: >-
      /usr/local/bin/helm upgrade --install traefik traefik/traefik
      --namespace traefik
      --create-namespace
      --values /tmp/traefik-values.yaml
      --version 41.0.2
      --timeout 5m0s 2>&1 || true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Wait for Traefik pods to be ready
  ansible.builtin.shell:
    cmd: |
      for i in $(seq 1 30); do
        READY=$(kubectl get pods -n traefik -l app.kubernetes.io/name=traefik --no-headers 2>/dev/null | grep "1/1" | wc -l)
        if [ "$READY" -ge 1 ]; then
          echo "Traefik is ready"
          exit 0
        fi
        sleep 5
      done
      echo "WARNING: Traefik not ready after 150s"
  changed_when: false
  failed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Clean up temporary files
  ansible.builtin.file:
    path: /tmp/traefik-values.yaml
    state: absent
