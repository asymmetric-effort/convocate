---
# Install External Secrets Operator and configure OpenBao backend.
# ESO fetches secrets from OpenBao (secrets-b) and creates K8s secrets.

- name: Ensure Helm is installed
  ansible.builtin.shell:
    cmd: |
      if [ -x /usr/local/bin/helm ]; then
        echo "Helm already installed"
        /usr/local/bin/helm version --short
        exit 0
      fi
      export TMPDIR=/var/tmp
      cd /var/tmp
      curl -fsSL https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz -o helm.tar.gz
      tar xzf helm.tar.gz
      mv linux-amd64/helm /usr/local/bin/helm
      chmod 755 /usr/local/bin/helm
      rm -rf helm.tar.gz linux-amd64
      /usr/local/bin/helm version --short

- name: Add External Secrets Helm repository
  ansible.builtin.shell:
    cmd: /usr/local/bin/helm repo add external-secrets https://charts.external-secrets.io 2>/dev/null || true
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Update Helm repos
  ansible.builtin.shell:
    cmd: /usr/local/bin/helm repo update 2>/dev/null || true
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Create external-secrets namespace
  ansible.builtin.command:
    cmd: kubectl create namespace external-secrets --dry-run=client -o yaml
  register: eso_ns_yaml
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Apply external-secrets namespace
  ansible.builtin.shell:
    cmd: echo '{{ eso_ns_yaml.stdout }}' | kubectl apply -f -
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Install External Secrets Operator via Helm
  ansible.builtin.shell:
    cmd: >-
      /usr/local/bin/helm upgrade --install external-secrets
      external-secrets/external-secrets
      --namespace external-secrets
      --set installCRDs=true
      --set webhook.port=9443
      --timeout 5m0s
      --wait
  register: eso_helm_result
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Show ESO Helm install result
  ansible.builtin.debug:
    msg: "{{ eso_helm_result.stdout_lines }}"

- name: Wait for ESO pods to be ready
  ansible.builtin.shell:
    cmd: >-
      kubectl wait --for=condition=Ready pod
      -l app.kubernetes.io/name=external-secrets
      -n external-secrets --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  retries: 3
  delay: 15

- name: Fetch OpenBao CA cert for ESO
  ansible.builtin.shell:
    cmd: >-
      curl -sk {{ openbao_addr }}/v1/pki/ca/pem > /tmp/openbao-eso-ca.pem
  changed_when: false

- name: Create openbao-ca ConfigMap with real CA cert
  ansible.builtin.shell:
    cmd: |
      kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
      kubectl create configmap openbao-ca \
        --namespace external-secrets \
        --from-file=ca.crt=/tmp/openbao-eso-ca.pem \
        --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Render ESO SecretStore configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/eso-secretstore.yml.j2"
    dest: /tmp/eso-secretstore.yaml
    mode: "0600"

- name: Wait for ESO CRDs to be registered
  ansible.builtin.shell:
    cmd: |
      for i in $(seq 1 60); do
        if kubectl get crd clustersecretstores.external-secrets.io >/dev/null 2>&1; then
          echo "CRD found"
          exit 0
        fi
        echo "Waiting for CRD... ($i)"
        sleep 5
      done
      echo "CRD not found after 5 minutes"
      kubectl get crd 2>/dev/null | grep external || true
      exit 1
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Apply ClusterSecretStore for OpenBao
  ansible.builtin.shell:
    cmd: kubectl apply -f /tmp/eso-secretstore.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  retries: 3
  delay: 10

- name: Verify ESO status
  ansible.builtin.shell:
    cmd: kubectl get pods -n external-secrets --no-headers
  register: eso_pods
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Show ESO pods
  ansible.builtin.debug:
    msg: "{{ eso_pods.stdout_lines }}"

- name: Clean up temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/eso-secretstore.yaml
    - /tmp/openbao-eso-ca.pem
