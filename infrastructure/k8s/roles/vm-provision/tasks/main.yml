---
# Provision VMs on svr00 hypervisor using virt-install.
# Each VM gets 3 disks: 100GB root (vda), 10GB /var/log (vdb), 5GB /tmp (vdc).
# VMs attach to the host bridge (br0) and get static LAN IPs via cloud-init.

- name: Ensure libvirt is running
  ansible.builtin.service:
    name: libvirtd
    state: started
    enabled: true

- name: Remove VM IPs from host interfaces (prevent IP conflicts)
  ansible.builtin.shell:
    cmd: |
      for IP in {{ vm_nodes | map(attribute='ip') | join(' ') }}; do
        ip addr del $IP/24 dev br0 2>/dev/null || true
        ip addr del $IP/24 dev enp4s0f0 2>/dev/null || true
      done
  changed_when: false

- name: Check cloud image exists
  ansible.builtin.stat:
    path: "{{ cloud_image_path }}"
  register: cloud_image_stat

- name: Download Ubuntu cloud image if missing
  ansible.builtin.get_url:
    url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
    dest: "{{ cloud_image_path }}"
    mode: "0644"
  when: not cloud_image_stat.stat.exists

- name: Destroy existing cluster VMs (canary clusters get wiped)
  ansible.builtin.shell:
    cmd: |
      virsh destroy {{ item.name }} 2>/dev/null || true
      virsh undefine {{ item.name }} --remove-all-storage 2>/dev/null || true
      rm -f {{ vm_pool_path }}/{{ item.name }}-* 2>/dev/null || true
  loop: "{{ vm_nodes }}"
  when: cluster_name is match("cluster-a")

- name: Get list of existing VMs
  community.libvirt.virt:
    command: list_vms
  register: existing_vms

- name: Create root disk (100GB) from cloud image
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -F qcow2
      -b {{ cloud_image_path }}
      {{ vm_pool_path }}/{{ item.name }}.qcow2
      100G
    creates: "{{ vm_pool_path }}/{{ item.name }}.qcow2"
  loop: "{{ vm_nodes }}"

- name: Create log disk (10GB)
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2
      {{ vm_pool_path }}/{{ item.name }}-log.qcow2
      10G
    creates: "{{ vm_pool_path }}/{{ item.name }}-log.qcow2"
  loop: "{{ vm_nodes }}"

- name: Create tmp disk (5GB)
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2
      {{ vm_pool_path }}/{{ item.name }}-tmp.qcow2
      5G
    creates: "{{ vm_pool_path }}/{{ item.name }}-tmp.qcow2"
  loop: "{{ vm_nodes }}"

- name: Generate cloud-init meta-data
  ansible.builtin.copy:
    content: |
      instance-id: {{ item.name }}-{{ ansible_date_time.epoch }}
      local-hostname: {{ item.name }}
    dest: "{{ vm_pool_path }}/{{ item.name }}-meta-data"
    mode: "0644"
  loop: "{{ vm_nodes }}"

- name: Generate cloud-init network-config (static IP on LAN)
  ansible.builtin.copy:
    content: |
      version: 2
      ethernets:
        enp1s0:
          addresses:
            - {{ item.ip }}/24
          routes:
            - to: default
              via: 192.168.3.1
          nameservers:
            addresses:
              - 192.168.3.1
    dest: "{{ vm_pool_path }}/{{ item.name }}-network-config"
    mode: "0644"
  loop: "{{ vm_nodes }}"

- name: Generate cloud-init user-data
  ansible.builtin.copy:
    content: |
      #cloud-config
      hostname: {{ item.name }}
      manage_etc_hosts: true
      ssh_pwauth: true
      users:
        - name: {{ vm_user }}
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: false
          passwd: {{ vm_password_hash | default('!') }}
          ssh_authorized_keys:
            - {{ ssh_public_key | default('ssh-ed25519 PLACEHOLDER') }}
        - name: sam-caldwell
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: true
          ssh_import_id:
            - gh:sam-caldwell
      package_update: false
      package_upgrade: false
      runcmd:
        - apt-get update -qq && apt-get install -y -qq qemu-guest-agent && systemctl enable --now qemu-guest-agent || true
        - mkdir -p /home/sam-caldwell/.ssh && curl -sfL https://github.com/sam-caldwell.keys > /home/sam-caldwell/.ssh/authorized_keys && chmod 600 /home/sam-caldwell/.ssh/authorized_keys && chown -R sam-caldwell:sam-caldwell /home/sam-caldwell/.ssh || true
    dest: "{{ vm_pool_path }}/{{ item.name }}-user-data"
    mode: "0644"
  loop: "{{ vm_nodes }}"

- name: Create cloud-init ISO with network-config
  ansible.builtin.shell:
    cmd: |
      TMPDIR=$(mktemp -d)
      cp {{ vm_pool_path }}/{{ item.name }}-user-data "$TMPDIR/user-data"
      cp {{ vm_pool_path }}/{{ item.name }}-meta-data "$TMPDIR/meta-data"
      cp {{ vm_pool_path }}/{{ item.name }}-network-config "$TMPDIR/network-config"
      genisoimage -output {{ vm_pool_path }}/{{ item.name }}-cidata.iso \
        -volid cidata -joliet -rock \
        "$TMPDIR/user-data" "$TMPDIR/meta-data" "$TMPDIR/network-config"
      rm -rf "$TMPDIR"
    creates: "{{ vm_pool_path }}/{{ item.name }}-cidata.iso"
  loop: "{{ vm_nodes }}"

- name: Create VMs on host bridge with 3-disk layout
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ item.name }}
      --ram {{ vm_memory_mb }}
      --vcpus {{ vm_cpus }}
      --disk path={{ vm_pool_path }}/{{ item.name }}.qcow2,format=qcow2,bus=virtio
      --disk path={{ vm_pool_path }}/{{ item.name }}-log.qcow2,format=qcow2,bus=virtio
      --disk path={{ vm_pool_path }}/{{ item.name }}-tmp.qcow2,format=qcow2,bus=virtio
      --disk path={{ vm_pool_path }}/{{ item.name }}-cidata.iso,device=cdrom
      --os-variant {{ vm_os_variant }}
      --network bridge={{ host_bridge }},model=virtio
      --graphics none
      --console pty,target_type=serial
      --noautoconsole
      --import
  when: item.name not in existing_vms.list_vms
  loop: "{{ vm_nodes }}"

- name: Wait for VMs to boot and SSH to be ready
  ansible.builtin.shell:
    cmd: |
      for i in $(seq 1 90); do
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=3 -o BatchMode=yes \
            {{ vm_user }}@{{ item.ip }} 'test -f /var/lib/cloud/instance/boot-finished && echo ready' 2>/dev/null && {
          echo "READY:{{ item.ip }}"
          exit 0
        }
        sleep 5
      done
      echo "TIMEOUT waiting for {{ item.name }} at {{ item.ip }}"
      exit 1
  register: vm_ready
  loop: "{{ vm_nodes }}"

- name: Print VM status
  ansible.builtin.debug:
    msg: "{{ item.item.name }} ({{ item.item.ip }}): {{ item.stdout }}"
  loop: "{{ vm_ready.results }}"
