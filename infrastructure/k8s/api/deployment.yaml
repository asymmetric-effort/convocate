apiVersion: apps/v1
kind: Deployment
metadata:
  name: convocate-api
  namespace: convocate
  labels:
    app: convocate-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: convocate-api
  template:
    metadata:
      labels:
        app: convocate-api
    spec:
      serviceAccountName: convocate-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/asymmetric-effort/convocate/convocate-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          env:
            - name: OTEL_SERVICE_NAME
              value: "convocate-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://ginger.o11y.svc:4318"
            - name: OPENBAO_ADDR
              value: "http://openbao.security.svc:8200"
            - name: OPENBAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openbao-root-token
                  key: token
            - name: OPENBAO_MFA_METHOD_ID
              value: "be724fc0-04d7-3597-40a4-18e284acdc3f"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: DATABASE_URL
          ports:
            - containerPort: 8443
              name: api
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: 8443
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 20
