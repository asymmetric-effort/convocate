apiVersion: v1
kind: ServiceAccount
metadata:
  name: convocate-agent
  namespace: convocate-agents
---
# Minimal role for agent pods — only read own pod status
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: convocate-agent
  namespace: convocate-agents
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: convocate-agent
  namespace: convocate-agents
subjects:
  - kind: ServiceAccount
    name: convocate-agent
    namespace: convocate-agents
roleRef:
  kind: Role
  name: convocate-agent
  apiGroup: rbac.authorization.k8s.io
