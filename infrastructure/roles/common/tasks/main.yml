---
- name: Disable swap
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: false

- name: Remove swap from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kernel_modules }}"

- name: Persist kernel modules
  ansible.builtin.copy:
    content: |
      {% for mod in kernel_modules %}
      {{ mod }}
      {% endfor %}
    dest: /etc/modules-load.d/kubernetes.conf
    mode: "0644"

- name: Set sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: true
  loop: "{{ sysctl_settings | dict2items }}"

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - socat
      - conntrack
      - ipset
- name: Install Helm
  ansible.builtin.shell:
    cmd: |
      if ! command -v helm &>/dev/null; then
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      fi
  args:
    creates: /usr/local/bin/helm
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Kubernetes apt key
  ansible.builtin.shell:
    cmd: >-
      curl -fsSL {{ kube_apt_key_url }} |
      gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] {{ kube_apt_repo }} /"
    filename: kubernetes
    state: present

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name:
      - "kubelet={{ kube_package_version }}"
      - "kubeadm={{ kube_package_version }}"
      - "kubectl={{ kube_package_version }}"
    state: present
    update_cache: true

- name: Hold Kubernetes packages at pinned version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubelet service
  ansible.builtin.service:
    name: kubelet
    enabled: true
