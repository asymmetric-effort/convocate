---
- name: Ensure libvirt is running
  ansible.builtin.service:
    name: libvirtd
    state: started
    enabled: true

- name: Check if libvirt network exists
  ansible.builtin.shell:
    cmd: virsh net-info {{ vm_network }} 2>/dev/null
  register: net_check
  changed_when: false
  failed_when: false

- name: Create libvirt network if missing
  ansible.builtin.shell:
    cmd: |
      cat > /tmp/{{ vm_network }}.xml <<XML
      <network>
        <name>{{ vm_network }}</name>
        <forward mode="nat"><nat><port start="1024" end="65535"/></nat></forward>
        <bridge name="virbr-{{ cluster_name }}" stp="on" delay="0"/>
        <ip address="{{ cluster_cidr | ansible.utils.ipaddr('1') | ansible.utils.ipaddr('address') }}" netmask="{{ cluster_cidr | ansible.utils.ipaddr('netmask') }}">
          <dhcp>
            <range start="{{ cluster_cidr | ansible.utils.ipaddr('100') | ansible.utils.ipaddr('address') }}" end="{{ cluster_cidr | ansible.utils.ipaddr('199') | ansible.utils.ipaddr('address') }}"/>
          </dhcp>
        </ip>
      </network>
      XML
      virsh net-define /tmp/{{ vm_network }}.xml
      virsh net-start {{ vm_network }}
      virsh net-autostart {{ vm_network }}
      rm -f /tmp/{{ vm_network }}.xml
  when: net_check.rc != 0

- name: Ensure libvirt network has DHCP for initial boot
  ansible.builtin.shell:
    cmd: >-
      virsh net-dumpxml {{ vm_network }} | grep -q '<dhcp>' ||
      virsh net-update {{ vm_network }} add ip-dhcp-range
      '<range start="{{ cluster_cidr | ansible.utils.ipaddr("100") | ansible.utils.ipaddr("address") }}"
      end="{{ cluster_cidr | ansible.utils.ipaddr("199") | ansible.utils.ipaddr("address") }}"/>'
      --live --config
  changed_when: false
  failed_when: false

- name: Check cloud image exists
  ansible.builtin.stat:
    path: "{{ cloud_image_path }}"
  register: cloud_image_stat

- name: Fail if cloud image is missing
  ansible.builtin.fail:
    msg: "Cloud image not found at {{ cloud_image_path }}"
  when: not cloud_image_stat.stat.exists

- name: Create VM disks from cloud image
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -F qcow2
      -b {{ cloud_image_path }}
      {{ vm_pool_path }}/{{ item }}.qcow2
      {{ vm_disk_gb }}G
    creates: "{{ vm_pool_path }}/{{ item }}.qcow2"
  loop: "{{ vm_nodes }}"

- name: Inject user and SSH key into disk image
  ansible.builtin.shell:
    cmd: >-
      virt-customize -a {{ vm_pool_path }}/{{ item }}.qcow2
      --run-command 'useradd -m -s /bin/bash -G sudo {{ vm_user }} || true'
      --run-command 'echo "{{ vm_user }} ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/{{ vm_user }}'
      --run-command 'mkdir -p /home/{{ vm_user }}/.ssh && chmod 700 /home/{{ vm_user }}/.ssh'
      --run-command 'echo "{{ ssh_public_key }}" > /home/{{ vm_user }}/.ssh/authorized_keys'
      --run-command 'chmod 600 /home/{{ vm_user }}/.ssh/authorized_keys'
      --run-command 'chown -R $(id -u {{ vm_user }}):$(id -g {{ vm_user }}) /home/{{ vm_user }}/.ssh'
      --run-command 'sed -i "s/^#*PasswordAuthentication.*/PasswordAuthentication yes/" /etc/ssh/sshd_config'
      --hostname {{ item }}
  loop: "{{ vm_nodes }}"

- name: Generate cloud-init meta-data
  ansible.builtin.copy:
    content: |
      instance-id: {{ item }}-{{ ansible_date_time.epoch }}
      local-hostname: {{ item }}
    dest: "{{ vm_pool_path }}/{{ item }}-meta-data"
    mode: "0644"
  loop: "{{ vm_nodes }}"

- name: Calculate VM IP address
  ansible.builtin.set_fact:
    vm_ips: >-
      {{ vm_ips | default({}) | combine({
        item: cluster_cidr | ansible.utils.ipaddr('network') | ansible.utils.ipmath(vm_ip_offset + idx)
      }) }}
  loop: "{{ vm_nodes }}"
  loop_control:
    index_var: idx

- name: Generate cloud-init user-data
  ansible.builtin.copy:
    content: |
      #cloud-config
      hostname: {{ item }}
      manage_etc_hosts: true
      ssh_pwauth: true
      users:
        - name: {{ vm_user }}
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: false
          passwd: {{ vm_password_hash | default('!') }}
          ssh_authorized_keys:
            - {{ ssh_public_key | default('ssh-ed25519 PLACEHOLDER') }}
      package_update: false
      package_upgrade: false
      runcmd:
        - apt-get update -qq && apt-get install -y -qq qemu-guest-agent && systemctl enable --now qemu-guest-agent || true
    dest: "{{ vm_pool_path }}/{{ item }}-user-data"
    mode: "0644"
  loop: "{{ vm_nodes }}"

- name: Generate cloud-init network-config
  ansible.builtin.copy:
    content: |
      version: 2
      ethernets:
        id0:
          match:
            name: en*
          dhcp4: false
          addresses:
            - {{ vm_ips[item] }}/{{ cluster_cidr | ansible.utils.ipaddr('prefix') }}
          routes:
            - to: default
              via: {{ cluster_cidr | ansible.utils.ipaddr('1') | ansible.utils.ipaddr('address') }}
          nameservers:
            addresses:
              - 1.1.1.1
              - 8.8.8.8
    dest: "{{ vm_pool_path }}/{{ item }}-network-config"
    mode: "0644"
  loop: "{{ vm_nodes }}"

- name: Create cloud-init ISO
  ansible.builtin.command:
    cmd: >-
      genisoimage -output {{ vm_pool_path }}/{{ item }}-cidata.iso
      -volid cidata -joliet -rock
      {{ vm_pool_path }}/{{ item }}-user-data
      {{ vm_pool_path }}/{{ item }}-meta-data
      {{ vm_pool_path }}/{{ item }}-network-config
  loop: "{{ vm_nodes }}"

- name: Check if VM already exists
  community.libvirt.virt:
    command: list_vms
  register: existing_vms

- name: Create VMs
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ item }}
      --ram {{ vm_memory_mb }}
      --vcpus {{ vm_cpus }}
      --disk path={{ vm_pool_path }}/{{ item }}.qcow2,format=qcow2,bus=virtio
      --disk path={{ vm_pool_path }}/{{ item }}-cidata.iso,device=cdrom
      --os-variant {{ vm_os_variant }}
      --network network={{ vm_network }},model=virtio
      --graphics none
      --console pty,target_type=serial
      --noautoconsole
      --import
  when: item not in existing_vms.list_vms
  loop: "{{ vm_nodes }}"

- name: Wait for VMs to get DHCP leases
  ansible.builtin.shell:
    cmd: >-
      virsh domifaddr {{ item }} 2>/dev/null | grep -oP '192\.\d+\.\d+\.\d+' | head -1
  register: vm_ip_check
  until: vm_ip_check.stdout | length > 0
  retries: 30
  delay: 10
  loop: "{{ vm_nodes }}"

- name: Build VM IP map from DHCP
  ansible.builtin.set_fact:
    vm_ips: >-
      {{ vm_ips | default({}) | combine({
        item.item: item.stdout | trim
      }) }}
  loop: "{{ vm_ip_check.results }}"

- name: Wait for VMs to be reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ vm_ips[item] }}"
    port: 22
    delay: 5
    timeout: 300
    state: started
  loop: "{{ vm_nodes }}"

- name: Print VM IP assignments
  ansible.builtin.debug:
    msg: "{{ item }}: {{ vm_ips[item] }}"
  loop: "{{ vm_nodes }}"

- name: Update inventory host_vars with discovered IPs
  ansible.builtin.add_host:
    name: "{{ item }}"
    ansible_host: "{{ vm_ips[item] }}"
    ansible_user: "{{ vm_user }}"
  loop: "{{ vm_nodes }}"
