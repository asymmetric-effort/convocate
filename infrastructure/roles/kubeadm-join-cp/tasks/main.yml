---
- name: Check if node has already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Get join parameters from primary control plane
  ansible.builtin.set_fact:
    join_token: "{{ hostvars[groups['control_plane_primary'][0]]['kubeadm_token'] }}"
    join_ca_hash: "{{ hostvars[groups['control_plane_primary'][0]]['kubeadm_ca_hash'] }}"
    join_endpoint: "{{ hostvars[groups['control_plane_primary'][0]]['kubeadm_api_endpoint'] }}"
    join_cert_key: "{{ hostvars[groups['control_plane_primary'][0]]['kubeadm_cert_key'] }}"

- name: Copy audit policy file
  ansible.builtin.copy:
    src: "{{ role_path }}/../cis-hardening/files/audit-policy.yaml"
    dest: /etc/kubernetes/audit-policy.yaml
    mode: "0600"
  when: not admin_conf.stat.exists

- name: Create audit log directory
  ansible.builtin.file:
    path: /var/log/kubernetes
    state: directory
    mode: "0750"
    owner: root
    group: root
  when: not admin_conf.stat.exists

- name: Join cluster as control plane node
  ansible.builtin.command:
    cmd: >-
      kubeadm join {{ join_endpoint }}
      --token {{ join_token }}
      --discovery-token-ca-cert-hash {{ join_ca_hash }}
      --control-plane
      --certificate-key {{ join_cert_key }}
  when: not admin_conf.stat.exists

- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy admin.conf to root .kube
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"
