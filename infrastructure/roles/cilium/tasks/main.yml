---
- name: Check if Cilium CLI is installed
  ansible.builtin.command:
    cmd: cilium version --client
  register: cilium_cli_check
  failed_when: false
  changed_when: false

- name: Download Cilium CLI
  ansible.builtin.get_url:
    url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-amd64.tar.gz"
    dest: /tmp/cilium-cli.tar.gz
    mode: "0644"
  when: cilium_cli_check.rc != 0

- name: Install Cilium CLI
  ansible.builtin.unarchive:
    src: /tmp/cilium-cli.tar.gz
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
  when: cilium_cli_check.rc != 0

- name: Check if Cilium is already installed
  ansible.builtin.command:
    cmd: cilium status
  register: cilium_status_check
  failed_when: false
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Install Cilium CNI
  ansible.builtin.command:
    cmd: >-
      cilium install
      --version {{ cilium_version }}
      --set hubble.enabled={{ cilium_hubble_enabled | lower }}
      --set hubble.relay.enabled={{ cilium_hubble_relay_enabled | lower }}
      --set hubble.ui.enabled={{ cilium_hubble_ui_enabled | lower }}
      --set kubeProxyReplacement=true
      --set k8sServiceHost={{ api_vip }}
      --set k8sServicePort=6443
  when: cilium_status_check.rc != 0
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Wait for Cilium to be ready
  ansible.builtin.command:
    cmd: "cilium status --wait --wait-duration {{ cilium_install_timeout }}"
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Clean up Cilium CLI tarball
  ansible.builtin.file:
    path: /tmp/cilium-cli.tar.gz
    state: absent
