---
- name: Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Create audit log directory
  ansible.builtin.file:
    path: /var/log/kubernetes
    state: directory
    mode: "0750"
    owner: root
    group: root
  when: not admin_conf.stat.exists

- name: Copy audit policy file
  ansible.builtin.copy:
    src: "{{ role_path }}/../cis-hardening/files/audit-policy.yaml"
    dest: /etc/kubernetes/audit-policy.yaml
    mode: "0600"
  when: not admin_conf.stat.exists

- name: Render kubeadm configuration
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: "{{ kubeadm_config_path }}"
    mode: "0600"
  when: not admin_conf.stat.exists

- name: Add API VIP to primary control plane interface (for kubeadm init)
  ansible.builtin.command:
    cmd: ip addr add {{ api_vip }}/{{ cluster_cidr | ansible.utils.ipaddr('prefix') }} dev {{ ansible_default_ipv4.interface }}
  when: not admin_conf.stat.exists
  failed_when: false

- name: Initialize Kubernetes cluster
  ansible.builtin.command:
    cmd: >-
      kubeadm init
      --config {{ kubeadm_config_path }}
      --upload-certs
  register: kubeadm_init
  when: not admin_conf.stat.exists

- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy admin.conf to root .kube
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"

- name: Generate bootstrap token
  ansible.builtin.command:
    cmd: kubeadm token create
  register: bootstrap_token_result
  changed_when: false

- name: Get CA certificate hash
  ansible.builtin.shell:
    cmd: >-
      openssl x509 -pubkey -in /etc/kubernetes/pki/ca.crt |
      openssl rsa -pubin -outform der 2>/dev/null |
      openssl dgst -sha256 -hex | awk '{print $NF}'
  register: ca_hash_result
  changed_when: false

- name: Generate certificate key for control plane join
  ansible.builtin.command:
    cmd: kubeadm init phase upload-certs --upload-certs
  register: cert_key_result
  changed_when: false

- name: Extract certificate key
  ansible.builtin.set_fact:
    kubeadm_certificate_key: "{{ cert_key_result.stdout_lines | last }}"

- name: Set cluster join facts
  ansible.builtin.set_fact:
    kubeadm_token: "{{ bootstrap_token_result.stdout }}"
    kubeadm_ca_hash: "sha256:{{ ca_hash_result.stdout }}"
    kubeadm_api_endpoint: "{{ api_vip }}:6443"
    kubeadm_cert_key: "{{ kubeadm_certificate_key }}"

- name: Clean up kubeadm config file
  ansible.builtin.file:
    path: "{{ kubeadm_config_path }}"
    state: absent
