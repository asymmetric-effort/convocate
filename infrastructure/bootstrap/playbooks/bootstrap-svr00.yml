---
# Redeploy from scratch — GHCR images
- name: Bootstrap svr00 — base OS, network, firewall
  hosts: svr00
  become: true
  gather_facts: true
  roles:
    - svr00-base

- name: Bootstrap svr00 — Docker
  hosts: svr00
  become: true
  gather_facts: true
  roles:
    - svr00-docker

- name: Bootstrap svr00 — KVM/libvirt
  hosts: svr00
  become: true
  gather_facts: true
  roles:
    - svr00-libvirt

- name: Bootstrap svr00 — Cloudflared tunnel
  hosts: svr00
  become: true
  gather_facts: true
  vars:
    cloudflare_tunnel_id: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_ID') }}"
    cloudflare_tunnel_secret: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_SECRET') }}"
  roles:
    - svr00-cloudflared

- name: Bootstrap svr00 — OpenBao secrets infrastructure
  hosts: svr00
  become: true
  gather_facts: false
  roles:
    - svr00-openbao

- name: Bootstrap svr00 — Grafana monitoring
  hosts: svr00
  become: true
  gather_facts: false
  roles:
    - svr00-grafana

- name: Bootstrap svr00 — Node Exporter
  hosts: svr00
  become: true
  gather_facts: false
  roles:
    - svr00-node-exporter

- name: Bootstrap svr00 — Prometheus monitoring
  hosts: svr00
  become: true
  gather_facts: false
  roles:
    - svr00-prometheus

- name: Bootstrap svr00 — VictoriaLogs log aggregation
  hosts: svr00
  become: true
  gather_facts: false
  roles:
    - svr00-victorialogs

- name: Bootstrap svr00 — Fluent Bit log collection
  hosts: svr00
  become: true
  gather_facts: false
  roles:
    - svr00-fluent-bit
