---
- name: Install KVM and libvirt packages
  ansible.builtin.apt:
    name:
      - qemu-kvm
      - libvirt-daemon-system
      - virtinst
      - libguestfs-tools
    state: present
    update_cache: true

- name: Create VM storage directory
  ansible.builtin.file:
    path: /var/vms
    state: directory
    mode: "0755"
    owner: libvirt-qemu
    group: libvirt-qemu

- name: Add samcaldwell to libvirt and kvm groups
  ansible.builtin.user:
    name: samcaldwell
    groups:
      - libvirt
      - kvm
    append: true

- name: Enable and start libvirtd
  ansible.builtin.service:
    name: libvirtd
    enabled: true
    state: started

# --- Storage pool ---

- name: Check if default storage pool exists
  ansible.builtin.command:
    cmd: virsh pool-info default
  register: pool_check
  failed_when: false
  changed_when: false

- name: Destroy existing default pool if it exists
  ansible.builtin.command:
    cmd: virsh pool-destroy default
  when: pool_check.rc == 0
  failed_when: false
  changed_when: true

- name: Undefine existing default pool if it exists
  ansible.builtin.command:
    cmd: virsh pool-undefine default
  when: pool_check.rc == 0
  failed_when: false
  changed_when: true

- name: Define default storage pool at /var/vms
  ansible.builtin.command:
    cmd: virsh pool-define-as default dir --target /var/vms
  changed_when: true

- name: Build the default storage pool
  ansible.builtin.command:
    cmd: virsh pool-build default
  changed_when: true

- name: Start the default storage pool
  ansible.builtin.command:
    cmd: virsh pool-start default
  changed_when: true

- name: Set default storage pool to autostart
  ansible.builtin.command:
    cmd: virsh pool-autostart default
  changed_when: true

# --- Remove default NAT network (virbr0 / 192.168.122.0/24) ---

- name: Check if default network exists
  ansible.builtin.command:
    cmd: virsh net-info default
  register: default_net_check
  failed_when: false
  changed_when: false

- name: Destroy default network
  ansible.builtin.command:
    cmd: virsh net-destroy default
  when: default_net_check.rc == 0
  failed_when: false
  changed_when: true

- name: Undefine default network
  ansible.builtin.command:
    cmd: virsh net-undefine default
  when: default_net_check.rc == 0
  failed_when: false
  changed_when: true

# --- Cluster A network: 192.168.55.0/24 ---

- name: Check if cluster-a network exists
  ansible.builtin.command:
    cmd: virsh net-info cluster-a
  register: cluster_a_net_check
  failed_when: false
  changed_when: false

- name: Define cluster-a network
  ansible.builtin.shell:
    cmd: |
      cat > /tmp/cluster-a-net.xml << 'XML'
      <network>
        <name>cluster-a</name>
        <forward mode="nat">
          <nat>
            <port start="1024" end="65535"/>
          </nat>
        </forward>
        <bridge name="cluster-a" stp="on" delay="0"/>
        <ip address="192.168.55.1" netmask="255.255.255.0">
          <dhcp>
            <range start="192.168.55.100" end="192.168.55.199"/>
          </dhcp>
        </ip>
      </network>
      XML
      virsh net-define /tmp/cluster-a-net.xml
      rm -f /tmp/cluster-a-net.xml
  when: cluster_a_net_check.rc != 0

- name: Start cluster-a network
  ansible.builtin.command:
    cmd: virsh net-start cluster-a
  when: cluster_a_net_check.rc != 0
  failed_when: false

- name: Autostart cluster-a network
  ansible.builtin.command:
    cmd: virsh net-autostart cluster-a
  changed_when: false

