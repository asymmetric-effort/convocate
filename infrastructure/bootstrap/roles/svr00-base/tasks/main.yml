---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - wget
      - jq
      - git
      - python3
      - python3-pip
      - net-tools
      - htop
      - tmux
      - gnupg
      - lsb-release
      - apt-transport-https
      - software-properties-common
      - ufw
      - iputils-ping
      - dnsutils
      - iptables-persistent
    state: present

- name: Import SSH keys from GitHub for samcaldwell
  ansible.builtin.authorized_key:
    user: samcaldwell
    key: https://github.com/sam-caldwell.keys
    state: present

- name: Deploy netplan configuration
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/01-svr00.yaml
    mode: "0600"
    owner: root
    group: root
  notify: Apply netplan

- name: Find conflicting netplan configs
  ansible.builtin.find:
    paths: /etc/netplan
    patterns: "*.yaml,*.yml"
    excludes: "01-svr00.yaml"
  register: netplan_conflicts

- name: Remove conflicting netplan configs
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ netplan_conflicts.files }}"
  notify: Apply netplan
  changed_when: false

- name: Enable IP forwarding (required for cloudflared private network routing)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Configure UFW — default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Configure UFW — default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH from local subnet
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    from_ip: 192.168.3.0/24

- name: Allow HTTPS from local subnet
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    from_ip: 192.168.3.0/24

- name: Allow OpenBao (8200) from local subnet
  community.general.ufw:
    rule: allow
    port: "8200"
    proto: tcp
    from_ip: 192.168.3.0/24

- name: Allow HTTPS on OpenBao IPs (443) from local subnet
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    from_ip: 192.168.3.0/24
    to_ip: "{{ item }}"
  loop:
    - 192.168.3.160
    - 192.168.3.161

- name: Allow HTTPS on Grafana IPs (443) from local subnet
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    from_ip: 192.168.3.0/24
    to_ip: "{{ item }}"
  loop:
    - 192.168.3.162
    - 192.168.3.163

- name: Allow Grafana (3000) from local subnet
  community.general.ufw:
    rule: allow
    port: "3000"
    proto: tcp
    from_ip: 192.168.3.0/24
    to_ip: "{{ item }}"
  loop:
    - 192.168.3.162
    - 192.168.3.163

- name: Redirect tcp/443 → 8200 on OpenBao IPs (DNAT, before DOCKER chain)
  ansible.builtin.shell:
    cmd: |
      iptables -t nat -C PREROUTING -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 8200 2>/dev/null || \
      iptables -t nat -I PREROUTING 1 -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 8200 -m comment --comment "Redirect HTTPS to OpenBao {{ item }}"
  loop:
    - 192.168.3.160
    - 192.168.3.161

- name: Redirect tcp/443 → 8200 on OpenBao IPs (OUTPUT for local access)
  ansible.builtin.shell:
    cmd: |
      iptables -t nat -C OUTPUT -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 8200 2>/dev/null || \
      iptables -t nat -I OUTPUT 1 -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 8200 -m comment --comment "Redirect local HTTPS to OpenBao {{ item }}"
  loop:
    - 192.168.3.160
    - 192.168.3.161

- name: Redirect tcp/443 → 3000 on Grafana IPs (DNAT, before DOCKER chain)
  ansible.builtin.shell:
    cmd: |
      iptables -t nat -C PREROUTING -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 3000 2>/dev/null || \
      iptables -t nat -I PREROUTING 1 -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 3000 -m comment --comment "Redirect HTTPS to Grafana {{ item }}"
  loop:
    - 192.168.3.162
    - 192.168.3.163

- name: Redirect tcp/443 → 3000 on Grafana IPs (OUTPUT for local access)
  ansible.builtin.shell:
    cmd: |
      iptables -t nat -C OUTPUT -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 3000 2>/dev/null || \
      iptables -t nat -I OUTPUT 1 -p tcp -d {{ item }} --dport 443 -j REDIRECT --to-ports 3000 -m comment --comment "Redirect local HTTPS to Grafana {{ item }}"
  loop:
    - 192.168.3.162
    - 192.168.3.163

- name: Persist iptables rules
  ansible.builtin.shell:
    cmd: iptables-save > /etc/iptables/rules.v4
  changed_when: true

- name: Allow UFW forwarding for cloudflared private network
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  notify: Reload UFW

- name: Enable UFW
  community.general.ufw:
    state: enabled
