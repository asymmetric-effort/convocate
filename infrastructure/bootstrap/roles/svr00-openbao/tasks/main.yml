---
# Bootstrap OpenBao secrets infrastructure on svr00
# Creates directories, starts instances on HTTP, initializes,
# enables PKI, issues TLS certs, restarts with TLS.

- name: Create OpenBao directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - /opt/openbao
    - /opt/openbao/config
    - /var/openbao/secrets-a
    - /var/openbao/secrets-b
    - /var/openbao/tls/secrets-a
    - /var/openbao/tls/secrets-b

- name: Set data and TLS directory ownership for distroless (nobody:nobody)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "65534"
    group: "65534"
  loop:
    - /var/openbao/secrets-a
    - /var/openbao/secrets-b
    - /var/openbao/tls/secrets-a
    - /var/openbao/tls/secrets-b

- name: Copy OpenBao configs
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
    owner: root
    group: root
  loop:
    - src: "{{ playbook_dir }}/../../secrets/docker-compose.yml"
      dest: /opt/openbao/docker-compose.yml
    - src: "{{ playbook_dir }}/../../secrets/config/openbao-config.hcl"
      dest: /opt/openbao/config/openbao-config-http.hcl
    - src: "{{ playbook_dir }}/../../secrets/config/openbao-config-secrets-a.hcl"
      dest: /opt/openbao/config/openbao-config-secrets-a.hcl
    - src: "{{ playbook_dir }}/../../secrets/config/openbao-config-secrets-b.hcl"
      dest: /opt/openbao/config/openbao-config-secrets-b.hcl

- name: Login to GHCR
  ansible.builtin.shell:
    cmd: echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_user }}" --password-stdin
  changed_when: false
  no_log: true

- name: Pull OpenBao image
  ansible.builtin.command:
    cmd: docker pull ghcr.io/asymmetric-effort/convocate/openbao:latest
  changed_when: true

# =========================================================================
# secrets-a — test instance
# =========================================================================

- name: Check if secrets-a has TLS certs
  ansible.builtin.stat:
    path: /var/openbao/tls/secrets-a/cert.pem
  register: secrets_a_cert

- name: Bootstrap secrets-a (HTTP → init → PKI → TLS)
  when: not secrets_a_cert.stat.exists or secrets_a_cert.stat.size == 0
  block:
    - name: Stop and remove existing secrets-a containers
      ansible.builtin.shell:
        cmd: |
          docker compose -f /opt/openbao/docker-compose.yml stop secrets-a 2>/dev/null || true
          docker compose -f /opt/openbao/docker-compose.yml rm -f secrets-a 2>/dev/null || true
          docker stop secrets-a secrets-a-bootstrap 2>/dev/null || true
          docker rm secrets-a secrets-a-bootstrap 2>/dev/null || true

    - name: Wipe secrets-a data (test instance — need fresh init for PKI)
      ansible.builtin.shell:
        cmd: |
          rm -rf /var/openbao/secrets-a/*
          rm -rf /var/openbao/tls/secrets-a/*
          chown 65534:65534 /var/openbao/secrets-a /var/openbao/tls/secrets-a

    - name: Start secrets-a on HTTP for bootstrap
      ansible.builtin.shell:
        cmd: |
          docker run -d --name secrets-a-bootstrap \
            --cap-add IPC_LOCK \
            -p 192.168.3.160:8200:8200 \
            -v /var/openbao/secrets-a:/openbao/data \
            -v /opt/openbao/config/openbao-config-http.hcl:/openbao/config/config.hcl:ro \
            -e BAO_API_ADDR=http://192.168.3.160:8200 \
            -e BAO_CLUSTER_ADDR=http://192.168.3.160:8201 \
            ghcr.io/asymmetric-effort/convocate/openbao:latest \
            server -config=/openbao/config/config.hcl

    - name: Wait for secrets-a HTTP to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://192.168.3.160:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false

    - name: Initialize secrets-a, enable auth + KV + PKI, issue TLS cert
      ansible.builtin.shell:
        cmd: |
          BAO=http://192.168.3.160:8200

          HEALTH=$(curl -sf $BAO/v1/sys/health 2>/dev/null || echo '{}')
          INIT=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("initialized",False))' 2>/dev/null)
          if [ "$INIT" != "False" ]; then
            echo "secrets-a already initialized — skipping"
            exit 0
          fi

          RESULT=$(curl -sf -d '{"secret_shares":1,"secret_threshold":1}' $BAO/v1/sys/init)
          UNSEAL_KEY=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["keys"][0])')
          ROOT=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["root_token"])')
          curl -sf -d "{\"key\":\"$UNSEAL_KEY\"}" $BAO/v1/sys/unseal

          # Enable userpass + KV v2
          curl -sf -d '{"type":"userpass"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/auth/userpass
          curl -sf -d '{"type":"kv","options":{"version":"2"}}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/secret

          # Create pdv-test policy (CRUD on pdv-test/ namespace only)
          curl -sf -X PUT \
            -d '{"policy":"path \"secret/data/pdv-test/*\" { capabilities = [\"create\",\"read\",\"update\",\"delete\",\"list\"] }\npath \"secret/metadata/pdv-test/*\" { capabilities = [\"list\",\"read\",\"delete\"] }\npath \"auth/token/lookup-self\" { capabilities = [\"read\"] }"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/sys/policies/acl/pdv-test-policy

          # Create pdv-test user
          curl -sf -d '{"password":"PdvTest-2026-Secure","policies":"pdv-test-policy"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/auth/userpass/users/pdv-test

          # Enable PKI engine
          curl -sf -d '{"type":"pki"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/pki
          curl -sf -d '{"max_lease_ttl":"87600h"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/pki/tune

          # Generate root CA (ECDSA P-256, 10 year TTL)
          curl -sf \
            -d '{"common_name":"Convocate Secrets-A Root CA","ttl":"87600h","key_type":"ec","key_bits":256}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/pki/root/generate/internal

          # Create server cert role (all asymmetric-effort.com subdomains + LAN IPs)
          curl -sf \
            -d '{"allowed_domains":"asymmetric-effort.com","allow_subdomains":true,"allow_bare_domains":true,"allow_ip_sans":true,"allowed_other_sans":"","max_ttl":"8760h","key_type":"ec","key_bits":256}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/pki/roles/server

          # Issue TLS cert for dev.auth.asymmetric-effort.com
          curl -sf \
            -d '{"common_name":"dev.auth.asymmetric-effort.com","alt_names":"dev.auth.asymmetric-effort.com","ip_sans":"192.168.3.160","ttl":"8760h"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/pki/issue/server > /tmp/cert-resp-a.json

          if [ ! -s /tmp/cert-resp-a.json ]; then
            echo "ERROR: PKI cert issuance returned empty response"
            exit 1
          fi

          # Write cert chain and key to TLS directory
          python3 -c '
          import json
          data = json.load(open("/tmp/cert-resp-a.json"))["data"]
          cert = data["certificate"]
          if "ca_chain" in data and data["ca_chain"]:
              cert += "\n" + "\n".join(data["ca_chain"])
          elif "issuing_ca" in data:
              cert += "\n" + data["issuing_ca"]
          print(cert)
          ' > /var/openbao/tls/secrets-a/cert.pem

          python3 -c '
          import json
          print(json.load(open("/tmp/cert-resp-a.json"))["data"]["private_key"])
          ' > /var/openbao/tls/secrets-a/key.pem

          rm -f /tmp/cert-resp-a.json

          # Verify certs are non-empty
          if [ ! -s /var/openbao/tls/secrets-a/cert.pem ] || [ ! -s /var/openbao/tls/secrets-a/key.pem ]; then
            echo "ERROR: TLS cert or key is empty after extraction"
            rm -f /var/openbao/tls/secrets-a/cert.pem /var/openbao/tls/secrets-a/key.pem
            exit 1
          fi

          chown 65534:65534 /var/openbao/tls/secrets-a/cert.pem /var/openbao/tls/secrets-a/key.pem
          chmod 0400 /var/openbao/tls/secrets-a/key.pem
          chmod 0444 /var/openbao/tls/secrets-a/cert.pem

          # --- Enable OIDC Identity Provider ---
          # Create default key for OIDC tokens
          curl -sf -X PUT \
            -d '{"rotation_period":"24h","verification_ttl":"24h","allowed_client_ids":["*"],"algorithm":"ES256"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/key/default

          # Create default OIDC scope (openid is implicit)
          curl -sf -X PUT \
            -d '{"template":"{\"username\":{{ '{{' }}identity.entity.name{{ '}}' }}}"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/scope/profile

          curl -sf -X PUT \
            -d '{"template":"{\"email\":{{ '{{' }}identity.entity.metadata.email{{ '}}' }}}"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/scope/email

          # Create default OIDC provider
          curl -sf -X PUT \
            -d '{"issuer":"https://dev.auth.asymmetric-effort.com","scopes_supported":["profile","email"]}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/provider/default

          echo "secrets-a OIDC provider configured"

          # Store unseal key and root token
          echo "$UNSEAL_KEY" > /var/openbao/tls/secrets-a/.unseal-key
          echo "$ROOT" > /var/openbao/tls/secrets-a/.root-token
          chmod 0400 /var/openbao/tls/secrets-a/.unseal-key /var/openbao/tls/secrets-a/.root-token
          chmod 0400 /var/openbao/tls/secrets-a/.unseal-key

          echo "secrets-a initialized with KV, PKI, OIDC and TLS cert"
      changed_when: false

    - name: Stop secrets-a HTTP bootstrap container
      ansible.builtin.shell:
        cmd: |
          docker stop secrets-a-bootstrap 2>/dev/null || true
          docker rm secrets-a-bootstrap 2>/dev/null || true

    - name: Start secrets-a with TLS
      ansible.builtin.command:
        cmd: docker compose -f /opt/openbao/docker-compose.yml up -d --force-recreate secrets-a
      changed_when: true

    - name: Wait for secrets-a TLS to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.160:443/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false

    - name: Unseal secrets-a after TLS restart
      ansible.builtin.shell:
        cmd: |
          UNSEAL_KEY=$(cat /var/openbao/tls/secrets-a/.unseal-key 2>/dev/null)
          if [ -n "$UNSEAL_KEY" ]; then
            curl -sf -k -d "{\"key\":\"$UNSEAL_KEY\"}" https://192.168.3.160:443/v1/sys/unseal
            echo "secrets-a unsealed"
          fi
      changed_when: false

- name: Create TOTP MFA method on secrets-a
  ansible.builtin.shell:
    cmd: |
      BAO=https://192.168.3.160:443
      ROOT_TOKEN=$(cat /var/openbao/tls/secrets-a/.root-token 2>/dev/null)
      if [ -z "$ROOT_TOKEN" ]; then
        echo "No root token for secrets-a — skipping TOTP setup"
        exit 0
      fi

      # Check if TOTP method already exists
      EXISTING=$(curl -sf -k \
        -H "X-Vault-Token:$ROOT_TOKEN" \
        $BAO/v1/identity/mfa/method/totp 2>/dev/null \
        | python3 -c 'import sys,json; d=json.load(sys.stdin).get("data",{}); methods=d.get("methods",[]); print(methods[0] if methods else "")' 2>/dev/null || echo "")

      if [ -n "$EXISTING" ]; then
        echo "TOTP method already exists: $EXISTING"
        echo "$EXISTING" > /var/openbao/tls/secrets-a/.totp-method-id
      else
        TOTP_RESP=$(curl -sf -k -X POST \
          -d '{"method_name":"totp","issuer":"Convocate","period":30,"key_size":20,"digits":6,"algorithm":"SHA1","qr_size":200}' \
          -H "X-Vault-Token:$ROOT_TOKEN" \
          -H "Content-Type: application/json" \
          $BAO/v1/identity/mfa/method/totp)

        METHOD_ID=$(echo "$TOTP_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["method_id"])')
        echo "$METHOD_ID" > /var/openbao/tls/secrets-a/.totp-method-id
        chmod 0400 /var/openbao/tls/secrets-a/.totp-method-id
        echo "TOTP method created: $METHOD_ID"
      fi
  changed_when: false

# =========================================================================
# secrets-b — production instance
# =========================================================================

- name: Check if secrets-b has TLS certs
  ansible.builtin.stat:
    path: /var/openbao/tls/secrets-b/cert.pem
  register: secrets_b_cert

- name: Bootstrap secrets-b (HTTP → init → PKI → TLS)
  when: not secrets_b_cert.stat.exists or secrets_b_cert.stat.size == 0
  block:
    - name: Stop and remove existing secrets-b containers
      ansible.builtin.shell:
        cmd: |
          docker compose -f /opt/openbao/docker-compose.yml stop secrets-b 2>/dev/null || true
          docker compose -f /opt/openbao/docker-compose.yml rm -f secrets-b 2>/dev/null || true
          docker stop secrets-b secrets-b-bootstrap 2>/dev/null || true
          docker rm secrets-b secrets-b-bootstrap 2>/dev/null || true

    - name: Start secrets-b on HTTP for bootstrap
      ansible.builtin.shell:
        cmd: |
          docker run -d --name secrets-b-bootstrap \
            --cap-add IPC_LOCK \
            -p 192.168.3.161:8200:8200 \
            -v /var/openbao/secrets-b:/openbao/data \
            -v /opt/openbao/config/openbao-config-http.hcl:/openbao/config/config.hcl:ro \
            -e BAO_API_ADDR=http://192.168.3.161:8200 \
            -e BAO_CLUSTER_ADDR=http://192.168.3.161:8201 \
            ghcr.io/asymmetric-effort/convocate/openbao:latest \
            server -config=/openbao/config/config.hcl

    - name: Wait for secrets-b HTTP to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://192.168.3.161:8200/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false

    - name: Initialize secrets-b, enable auth + KV + PKI, issue TLS cert
      ansible.builtin.shell:
        cmd: |
          BAO=http://192.168.3.161:8200

          HEALTH=$(curl -sf $BAO/v1/sys/health 2>/dev/null || echo '{}')
          INIT=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("initialized",False))' 2>/dev/null)
          if [ "$INIT" != "False" ]; then
            echo "secrets-b already initialized — skipping"
            exit 0
          fi

          RESULT=$(curl -sf -d '{"secret_shares":1,"secret_threshold":1}' $BAO/v1/sys/init)
          UNSEAL_KEY=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["keys"][0])')
          ROOT=$(echo "$RESULT" | python3 -c 'import sys,json; print(json.load(sys.stdin)["root_token"])')
          curl -sf -d "{\"key\":\"$UNSEAL_KEY\"}" $BAO/v1/sys/unseal

          # Enable userpass + KV v2
          curl -sf -d '{"type":"userpass"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/auth/userpass
          curl -sf -d '{"type":"kv","options":{"version":"2"}}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/secret

          # Create pdv-test policy
          curl -sf -X PUT \
            -d '{"policy":"path \"secret/data/pdv-test/*\" { capabilities = [\"create\",\"read\",\"update\",\"delete\",\"list\"] }\npath \"secret/metadata/pdv-test/*\" { capabilities = [\"list\",\"read\",\"delete\"] }\npath \"auth/token/lookup-self\" { capabilities = [\"read\"] }"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/sys/policies/acl/pdv-test-policy

          # Create pdv-test user
          curl -sf -d '{"password":"PdvTest-2026-Secure","policies":"pdv-test-policy"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/auth/userpass/users/pdv-test

          # Enable PKI engine
          curl -sf -d '{"type":"pki"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/pki
          curl -sf -d '{"max_lease_ttl":"87600h"}' -H "X-Vault-Token:$ROOT" $BAO/v1/sys/mounts/pki/tune

          # Generate root CA (ECDSA P-256, 10 year TTL)
          curl -sf \
            -d '{"common_name":"Convocate Secrets-B Root CA","ttl":"87600h","key_type":"ec","key_bits":256}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/pki/root/generate/internal

          # Create server cert role (all asymmetric-effort.com subdomains + LAN IPs)
          curl -sf \
            -d '{"allowed_domains":"asymmetric-effort.com","allow_subdomains":true,"allow_bare_domains":true,"allow_ip_sans":true,"allowed_other_sans":"","max_ttl":"8760h","key_type":"ec","key_bits":256}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/pki/roles/server

          # Issue TLS cert for auth.asymmetric-effort.com
          curl -sf \
            -d '{"common_name":"auth.asymmetric-effort.com","alt_names":"auth.asymmetric-effort.com","ip_sans":"192.168.3.161","ttl":"8760h"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/pki/issue/server > /tmp/cert-resp-b.json

          if [ ! -s /tmp/cert-resp-b.json ]; then
            echo "ERROR: PKI cert issuance returned empty response"
            exit 1
          fi

          # Write cert chain and key to TLS directory
          python3 -c '
          import json
          data = json.load(open("/tmp/cert-resp-b.json"))["data"]
          cert = data["certificate"]
          if "ca_chain" in data and data["ca_chain"]:
              cert += "\n" + "\n".join(data["ca_chain"])
          elif "issuing_ca" in data:
              cert += "\n" + data["issuing_ca"]
          print(cert)
          ' > /var/openbao/tls/secrets-b/cert.pem

          python3 -c '
          import json
          print(json.load(open("/tmp/cert-resp-b.json"))["data"]["private_key"])
          ' > /var/openbao/tls/secrets-b/key.pem

          rm -f /tmp/cert-resp-b.json

          # Verify certs are non-empty
          if [ ! -s /var/openbao/tls/secrets-b/cert.pem ] || [ ! -s /var/openbao/tls/secrets-b/key.pem ]; then
            echo "ERROR: TLS cert or key is empty after extraction"
            rm -f /var/openbao/tls/secrets-b/cert.pem /var/openbao/tls/secrets-b/key.pem
            exit 1
          fi

          chown 65534:65534 /var/openbao/tls/secrets-b/cert.pem /var/openbao/tls/secrets-b/key.pem
          chmod 0400 /var/openbao/tls/secrets-b/key.pem
          chmod 0444 /var/openbao/tls/secrets-b/cert.pem

          # --- Enable OIDC Identity Provider ---
          # Create default key for OIDC tokens
          curl -sf -X PUT \
            -d '{"rotation_period":"24h","verification_ttl":"24h","allowed_client_ids":["*"],"algorithm":"ES256"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/key/default

          # Create OIDC scopes
          curl -sf -X PUT \
            -d '{"template":"{\"username\":{{ '{{' }}identity.entity.name{{ '}}' }}}"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/scope/profile

          curl -sf -X PUT \
            -d '{"template":"{\"email\":{{ '{{' }}identity.entity.metadata.email{{ '}}' }}}"}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/scope/email

          # Create default OIDC provider
          curl -sf -X PUT \
            -d '{"issuer":"https://auth.asymmetric-effort.com","scopes_supported":["profile","email"]}' \
            -H "X-Vault-Token:$ROOT" $BAO/v1/identity/oidc/provider/default

          echo "secrets-b OIDC provider configured"

          # Store unseal key for post-TLS-restart unseal
          echo "$UNSEAL_KEY" > /var/openbao/tls/secrets-b/.unseal-key
          chmod 0400 /var/openbao/tls/secrets-b/.unseal-key

          # Store root token for downstream bootstrap roles (grafana, etc.)
          mkdir -p /var/grafana/tls
          echo "$ROOT" > /var/grafana/tls/.secrets-b-token
          chmod 0400 /var/grafana/tls/.secrets-b-token

          # Also store root token persistently for re-runs
          echo "$ROOT" > /var/openbao/tls/secrets-b/.root-token
          chmod 0400 /var/openbao/tls/secrets-b/.root-token

          echo "secrets-b initialized with KV, PKI, OIDC and TLS cert"
      changed_when: false

    - name: Stop secrets-b HTTP bootstrap container
      ansible.builtin.shell:
        cmd: |
          docker stop secrets-b-bootstrap 2>/dev/null || true
          docker rm secrets-b-bootstrap 2>/dev/null || true

    - name: Start secrets-b with TLS
      ansible.builtin.command:
        cmd: docker compose -f /opt/openbao/docker-compose.yml up -d --force-recreate secrets-b
      changed_when: true

    - name: Wait for secrets-b TLS to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.161:443/v1/sys/health 2>/dev/null)
            [ -n "$STATUS" ] && [ "$STATUS" != "000" ] && break
            sleep 2
          done
      changed_when: false

    - name: Unseal secrets-b after TLS restart
      ansible.builtin.shell:
