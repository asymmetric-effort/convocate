- name: Create TOTP MFA method on secrets-b
  ansible.builtin.shell:
    cmd: |
      BAO=https://192.168.3.161:443
      ROOT_TOKEN=$(cat /var/openbao/tls/secrets-b/.root-token 2>/dev/null)
      if [ -z "$ROOT_TOKEN" ]; then
        echo "No root token for secrets-b — skipping TOTP setup"
        exit 0
      fi

      # Check if TOTP method already exists
      EXISTING=$(curl -sf -k \
        -H "X-Vault-Token:$ROOT_TOKEN" \
        $BAO/v1/identity/mfa/method/totp 2>/dev/null \
        | python3 -c 'import sys,json; d=json.load(sys.stdin).get("data",{}); methods=d.get("methods",[]); print(methods[0] if methods else "")' 2>/dev/null || echo "")

      if [ -n "$EXISTING" ]; then
        echo "TOTP method already exists: $EXISTING"
        echo "$EXISTING" > /var/openbao/tls/secrets-b/.totp-method-id
      else
        TOTP_RESP=$(curl -sf -k -X POST \
          -d '{"method_name":"totp","issuer":"Convocate","period":30,"key_size":20,"digits":6,"algorithm":"SHA1","qr_size":200}' \
          -H "X-Vault-Token:$ROOT_TOKEN" \
          -H "Content-Type: application/json" \
          $BAO/v1/identity/mfa/method/totp)

        METHOD_ID=$(echo "$TOTP_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["method_id"])')
        echo "$METHOD_ID" > /var/openbao/tls/secrets-b/.totp-method-id
        chmod 0400 /var/openbao/tls/secrets-b/.totp-method-id
        echo "TOTP method created: $METHOD_ID"
      fi
  changed_when: false

# =========================================================================
# Ensure bootstrap token is available for downstream roles (grafana, etc.)
# =========================================================================

- name: Check if secrets-b bootstrap token exists for downstream roles
  ansible.builtin.stat:
    path: /var/grafana/tls/.secrets-b-token
  register: secrets_b_token

- name: Ensure bootstrap token available for downstream roles
  when: not secrets_b_token.stat.exists or secrets_b_token.stat.size == 0
  ansible.builtin.shell:
    cmd: |
      BAO=https://192.168.3.161:443
      mkdir -p /var/grafana/tls

      # Source 1: persistent root token from init
      if [ -f /var/openbao/tls/secrets-b/.root-token ]; then
        cp /var/openbao/tls/secrets-b/.root-token /var/grafana/tls/.secrets-b-token
        chmod 0400 /var/grafana/tls/.secrets-b-token
        echo "Root token copied for downstream roles"
        exit 0
      fi

      # Source 2: generate a new root token via unseal key
      if [ -f /var/openbao/tls/secrets-b/.unseal-key ]; then
        UNSEAL_KEY=$(cat /var/openbao/tls/secrets-b/.unseal-key)
        NONCE=$(curl -sf -k -d '{}' $BAO/v1/sys/generate-root/attempt | python3 -c 'import sys,json; print(json.load(sys.stdin).get("nonce",""))' 2>/dev/null)
        if [ -n "$NONCE" ]; then
          ROOT=$(curl -sf -k -d "{\"key\":\"$UNSEAL_KEY\",\"nonce\":\"$NONCE\"}" $BAO/v1/sys/generate-root/update | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("encoded_root_token","")) if d.get("complete") else print("")' 2>/dev/null)
          if [ -n "$ROOT" ]; then
            # Decode the encoded token (base64 XOR with OTP)
            OTP=$(curl -sf -k -d '{}' $BAO/v1/sys/generate-root/attempt | python3 -c 'import sys,json; print(json.load(sys.stdin).get("otp",""))' 2>/dev/null)
            echo "$ROOT" > /var/grafana/tls/.secrets-b-token
            echo "$ROOT" > /var/openbao/tls/secrets-b/.root-token
            chmod 0400 /var/grafana/tls/.secrets-b-token /var/openbao/tls/secrets-b/.root-token
            echo "Generated new root token for downstream roles"
            exit 0
          fi
        fi
      fi

      echo "ERROR: Cannot obtain OpenBao root token for downstream roles"
      echo "Neither .root-token nor .unseal-key found in /var/openbao/tls/secrets-b/"
      exit 1
  changed_when: false
