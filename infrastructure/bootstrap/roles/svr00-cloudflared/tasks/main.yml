---
- name: Create cloudflared directory
  ansible.builtin.file:
    path: /opt/cloudflared
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Deploy tunnel credentials
  ansible.builtin.copy:
    content: "{{ cloudflare_tunnel_secret }}"
    dest: /opt/cloudflared/credentials.json
    mode: "0600"
    owner: root
    group: root

- name: Deploy cloudflared config
  ansible.builtin.template:
    src: config.yml.j2
    dest: /opt/cloudflared/config.yml
    mode: "0640"
    owner: root
    group: root
  notify: Restart cloudflared

- name: Deploy cloudflared docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/cloudflared/docker-compose.yml
    mode: "0640"
    owner: root
    group: root
  notify: Restart cloudflared

- name: Start cloudflared via docker compose
  ansible.builtin.command:
    cmd: docker compose -f /opt/cloudflared/docker-compose.yml up -d
  changed_when: true
