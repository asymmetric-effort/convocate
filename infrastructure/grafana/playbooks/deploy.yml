---
# Deploy Grafana — application-level only.
# Assumes bootstrap has already run (directories, TLS certs, OIDC config).
- name: Deploy Grafana monitoring infrastructure
  hosts: svr00
  become: true
  gather_facts: false
  vars:
    grafana_dir: /opt/grafana
    deploy_target: "all"
  tasks:
    - name: Copy docker-compose.yml to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ grafana_dir }}/docker-compose.yml"
        mode: "0644"
        owner: root
        group: root

    - name: Copy provisioning directory to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../provisioning/"
        dest: "{{ grafana_dir }}/provisioning/"
        mode: "0644"
        owner: root
        group: root
        directory_mode: "0755"

    - name: Pull latest Grafana image
      ansible.builtin.command:
        cmd: docker pull 192.168.3.90:5000/convocate/grafana:latest
      changed_when: true

    # =========================================================================
    # Create/update admin user in OpenBao for OIDC login
    # =========================================================================

    - name: Create admin user in OpenBao userpass with GF_SECURITY_ADMIN_PASSWORD
      ansible.builtin.shell:
        cmd: |
          BAO=https://192.168.3.161:443
          TOKEN=$(cat /var/openbao/tls/secrets-b/.root-token 2>/dev/null || cat /var/grafana/tls/a/.vault-token 2>/dev/null)
          if [ -z "$TOKEN" ] || [ -z "{{ admin_password | default('') }}" ]; then
            echo "SKIP: No token or admin_password available"
            exit 0
          fi
          H="X-Vault-Token:$TOKEN"

          # Create/update admin user in userpass
          curl -sf -k -X PUT \
            -d '{"password":"{{ admin_password }}","policies":"default"}' \
            -H "$H" $BAO/v1/auth/userpass/users/admin

          # Write admin password to file for Grafana
          echo -n "{{ admin_password }}" > /var/grafana/tls/a/admin-password
          echo -n "{{ admin_password }}" > /var/grafana/tls/b/admin-password
          chown 65534:0 /var/grafana/tls/a/admin-password /var/grafana/tls/b/admin-password
          chmod 0400 /var/grafana/tls/a/admin-password /var/grafana/tls/b/admin-password

          # Create identity entity for admin if not exists
          ENTITY=$(curl -sf -k -H "$H" $BAO/v1/identity/entity/name/admin 2>/dev/null)
          if [ -z "$ENTITY" ] || echo "$ENTITY" | grep -q '"errors"'; then
            curl -sf -k -X PUT \
              -d '{"name":"admin","metadata":{"email":"admin@asymmetric-effort.com"}}' \
              -H "$H" $BAO/v1/identity/entity/name/admin
          fi

          # Get the userpass accessor for alias creation
          ACCESSOR=$(curl -sf -k -H "$H" $BAO/v1/sys/auth | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["userpass/"]["accessor"])' 2>/dev/null)
          ENTITY_ID=$(curl -sf -k -H "$H" $BAO/v1/identity/entity/name/admin | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["id"])' 2>/dev/null)

          # Create alias linking admin entity to userpass/admin
          if [ -n "$ACCESSOR" ] && [ -n "$ENTITY_ID" ]; then
            curl -sf -k -X PUT \
              -d "{\"name\":\"admin\",\"canonical_id\":\"$ENTITY_ID\",\"mount_accessor\":\"$ACCESSOR\"}" \
              -H "$H" $BAO/v1/identity/entity-alias 2>/dev/null || true
          fi

          echo "admin user configured in OpenBao"
      changed_when: false
      failed_when: false

    # =========================================================================
    # Fetch OIDC client secrets from secrets-b before starting containers
    # =========================================================================

    - name: Fetch OIDC client secret for grafana-a from secrets-b KV
      ansible.builtin.shell:
        cmd: |
          SECRET=$(curl -sf -k \
            -H "X-Vault-Token:$(cat /var/grafana/tls/a/.vault-token 2>/dev/null)" \
            https://192.168.3.161:443/v1/secret/data/grafana/oidc-client-secret-a \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["data"]["secret"])' 2>/dev/null)
          if [ -n "$SECRET" ]; then
            echo -n "$SECRET" > /var/grafana/tls/a/oidc-client-secret
            chown 65534:0 /var/grafana/tls/a/oidc-client-secret
            chmod 0400 /var/grafana/tls/a/oidc-client-secret
          fi
      changed_when: false
      failed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Fetch OIDC client secret for grafana-b from secrets-b KV
      ansible.builtin.shell:
        cmd: |
          SECRET=$(curl -sf -k \
            -H "X-Vault-Token:$(cat /var/grafana/tls/b/.vault-token 2>/dev/null)" \
            https://192.168.3.161:443/v1/secret/data/grafana/oidc-client-secret-b \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["data"]["secret"])' 2>/dev/null)
          if [ -n "$SECRET" ]; then
            echo -n "$SECRET" > /var/grafana/tls/b/oidc-client-secret
            chown 65534:0 /var/grafana/tls/b/oidc-client-secret
            chmod 0400 /var/grafana/tls/b/oidc-client-secret
          fi
      changed_when: false
      failed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-b"

    # =========================================================================
    # grafana-a — pre-production (wiped each deploy)
    # =========================================================================

    - name: Stop grafana-a before wipe
      ansible.builtin.command:
        cmd: docker compose -f {{ grafana_dir }}/docker-compose.yml stop grafana-a
      changed_when: true
      failed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Wipe grafana-a data (pre-production — full reset each deploy)
      ansible.builtin.shell:
        cmd: |
          rm -rf /var/grafana/a/*
          chown 65534:0 /var/grafana/a
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Fix TLS file ownership for grafana-a (65534 = distroless nobody)
      ansible.builtin.shell:
        cmd: |
          chown -R 65534:0 /var/grafana/tls/a/ /var/grafana/a/
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Deploy grafana-a (recreate)
      ansible.builtin.command:
        cmd: docker compose -f {{ grafana_dir }}/docker-compose.yml up -d --force-recreate grafana-a
      changed_when: true
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Wait for grafana-a to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.162:443/api/health 2>/dev/null)
            [ "$STATUS" = "200" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-a"

    # =========================================================================
    # grafana-b — production (non-destructive)
    # =========================================================================

    - name: Fix TLS file ownership for grafana-b (65534 = distroless nobody)
      ansible.builtin.shell:
        cmd: |
          chown -R 65534:0 /var/grafana/tls/b/ /var/grafana/b/
      when: deploy_target == "all" or deploy_target == "grafana-b"

    - name: Deploy grafana-b (pull new image, restart)
      ansible.builtin.shell:
        cmd: |
          docker compose -f {{ grafana_dir }}/docker-compose.yml pull grafana-b
          docker compose -f {{ grafana_dir }}/docker-compose.yml up -d grafana-b
      changed_when: true
      when: deploy_target == "all" or deploy_target == "grafana-b"

    - name: Wait for grafana-b to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.163:443/api/health 2>/dev/null)
            [ "$STATUS" = "200" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-b"

    - name: Verify grafana-b is healthy
      ansible.builtin.shell:
        cmd: |
          HEALTH=$(curl -sf -k https://192.168.3.163:443/api/health 2>/dev/null || echo '{}')
          DB=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("database","error"))' 2>/dev/null)
          if [ "$DB" != "ok" ]; then
            echo "ERROR: grafana-b health check failed — database: $DB"
            exit 1
          fi
          echo "grafana-b is running and healthy"
      changed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-b"
