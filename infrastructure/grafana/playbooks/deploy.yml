---
# Deploy Grafana — application-level only.
# Assumes bootstrap has already run (directories, TLS certs, OIDC config).
- name: Deploy Grafana monitoring infrastructure
  hosts: svr00
  become: true
  gather_facts: false
  vars:
    grafana_dir: /opt/grafana
    deploy_target: "all"
  tasks:
    - name: Copy docker-compose.yml to svr00
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ grafana_dir }}/docker-compose.yml"
        mode: "0644"
        owner: root
        group: root

    - name: Pull latest Grafana image
      ansible.builtin.command:
        cmd: docker pull grafana/grafana-oss:11.6.0
      changed_when: true

    # =========================================================================
    # Fetch OIDC client secrets from secrets-b before starting containers
    # =========================================================================

    - name: Fetch OIDC client secret for grafana-a from secrets-b KV
      ansible.builtin.shell:
        cmd: |
          SECRET=$(curl -sf -k \
            -H "X-Vault-Token:$(cat /var/grafana/tls/a/.vault-token 2>/dev/null)" \
            https://192.168.3.161:8200/v1/secret/data/grafana/oidc-client-secret-a \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["data"]["secret"])' 2>/dev/null)
          if [ -n "$SECRET" ]; then
            echo -n "$SECRET" > /var/grafana/tls/a/oidc-client-secret
            chown 472:0 /var/grafana/tls/a/oidc-client-secret
            chmod 0400 /var/grafana/tls/a/oidc-client-secret
          fi
      changed_when: false
      failed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Fetch OIDC client secret for grafana-b from secrets-b KV
      ansible.builtin.shell:
        cmd: |
          SECRET=$(curl -sf -k \
            -H "X-Vault-Token:$(cat /var/grafana/tls/b/.vault-token 2>/dev/null)" \
            https://192.168.3.161:8200/v1/secret/data/grafana/oidc-client-secret-b \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["data"]["secret"])' 2>/dev/null)
          if [ -n "$SECRET" ]; then
            echo -n "$SECRET" > /var/grafana/tls/b/oidc-client-secret
            chown 472:0 /var/grafana/tls/b/oidc-client-secret
            chmod 0400 /var/grafana/tls/b/oidc-client-secret
          fi
      changed_when: false
      failed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-b"

    # =========================================================================
    # grafana-a — pre-production (wiped each deploy)
    # =========================================================================

    - name: Stop grafana-a before wipe
      ansible.builtin.command:
        cmd: docker compose -f {{ grafana_dir }}/docker-compose.yml stop grafana-a
      changed_when: true
      failed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Wipe grafana-a data (pre-production — full reset each deploy)
      ansible.builtin.shell:
        cmd: |
          rm -rf /var/grafana/a/*
          chown 472:0 /var/grafana/a
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Deploy grafana-a (recreate)
      ansible.builtin.command:
        cmd: docker compose -f {{ grafana_dir }}/docker-compose.yml up -d --force-recreate grafana-a
      changed_when: true
      when: deploy_target == "all" or deploy_target == "grafana-a"

    - name: Wait for grafana-a to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.162:3000/api/health 2>/dev/null)
            [ "$STATUS" = "200" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-a"

    # =========================================================================
    # grafana-b — production (non-destructive)
    # =========================================================================

    - name: Deploy grafana-b (pull new image, restart)
      ansible.builtin.shell:
        cmd: |
          docker compose -f {{ grafana_dir }}/docker-compose.yml pull grafana-b
          docker compose -f {{ grafana_dir }}/docker-compose.yml up -d grafana-b
      changed_when: true
      when: deploy_target == "all" or deploy_target == "grafana-b"

    - name: Wait for grafana-b to be ready
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' -k https://192.168.3.163:3000/api/health 2>/dev/null)
            [ "$STATUS" = "200" ] && break
            sleep 2
          done
      changed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-b"

    - name: Verify grafana-b is healthy
      ansible.builtin.shell:
        cmd: |
          HEALTH=$(curl -sf -k https://192.168.3.163:3000/api/health 2>/dev/null || echo '{}')
          DB=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("database","error"))' 2>/dev/null)
          if [ "$DB" != "ok" ]; then
            echo "ERROR: grafana-b health check failed — database: $DB"
            exit 1
          fi
          echo "grafana-b is running and healthy"
      changed_when: false
      when: deploy_target == "all" or deploy_target == "grafana-b"
