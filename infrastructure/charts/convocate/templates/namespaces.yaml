apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "convocate.namespace.app" . }}
  labels:
    {{- include "convocate.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "convocate.namespace.o11y" . }}
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    {{- include "convocate.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "convocate.namespace.security" . }}
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    {{- include "convocate.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "convocate.namespace.data" . }}
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    {{- include "convocate.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.agents | default "convocate-agents" }}
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    {{- include "convocate.labels" . | nindent 4 }}
