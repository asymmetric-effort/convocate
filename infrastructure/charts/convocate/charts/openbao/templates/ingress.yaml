apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-tls
  namespace: {{ .Values.global.namespace | default "security" }}
spec:
  secretName: openbao-tls
  issuerRef:
    name: openbao-pki
    kind: ClusterIssuer
  dnsNames:
    - auth.{{ .Values.global.domain | default "asymmetric-effort.com" }}
  duration: 24h
  renewBefore: 12h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openbao-oidc
  namespace: {{ .Values.global.namespace | default "security" }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.{{ .Values.global.domain | default "asymmetric-effort.com" }}
      secretName: openbao-tls
  rules:
    - host: auth.{{ .Values.global.domain | default "asymmetric-effort.com" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openbao
                port:
                  number: 8200
