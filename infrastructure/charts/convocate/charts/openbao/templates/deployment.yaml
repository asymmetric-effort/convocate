apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: {{ .Values.global.namespace | default "security" }}
  labels:
    app: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao
  template:
    metadata:
      labels:
        app: openbao
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openbao
          image: "{{ .Values.global.registry }}/convocate/openbao:{{ .Values.global.imageTag }}"
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - containerPort: 8200
              name: api
          env:
            - name: BAO_ADDR
              value: "http://127.0.0.1:8200"
          volumeMounts:
            - name: data
              mountPath: /openbao/data
            - name: audit
              mountPath: /openbao/audit
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 20
            failureThreshold: 5
        # Audit log forwarder sidecar
        - name: audit-forwarder
          image: "{{ .Values.global.registry }}/convocate/fluentbit:{{ .Values.global.imageTag }}"
          args:
            - "-c"
            - "/fluent-bit/etc/fluent-bit.conf"
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.auditForwarder.resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: fluentbit-audit-credentials
          volumeMounts:
            - name: audit
              mountPath: /openbao/audit
              readOnly: true
            - name: audit-config
              mountPath: /fluent-bit/etc/
        # Auto-unseal sidecar
        - name: auto-unseal
          image: "{{ .Values.global.registry }}/convocate/openbao:{{ .Values.global.imageTag }}"
          command: ["/busybox/sh", "-c"]
          args:
            - |
              echo "Waiting for OpenBao to start..."
              UNSEAL_KEY=$(cat /unseal/key)
              while true; do
                STATUS=$(/busybox/wget -q -O - "http://127.0.0.1:8200/v1/sys/health?sealedcode=200&uninitcode=200" 2>&1)
                if echo "$STATUS" | /busybox/grep -q '"sealed":true'; then
                  echo "OpenBao is sealed, unsealing..."
                  /busybox/wget -q -O - --post-data="{\"key\":\"$UNSEAL_KEY\"}" \
                    --header="Content-Type: application/json" \
                    http://127.0.0.1:8200/v1/sys/unseal 2>&1
                  echo "Unseal request sent"
                fi
                if echo "$STATUS" | /busybox/grep -q '"sealed":false'; then
                  echo "OpenBao is unsealed"
                  break
                fi
                /busybox/sleep 2
              done
              echo "Auto-unseal complete, sleeping..."
              /busybox/sleep infinity
          volumeMounts:
            - name: unseal-key
              mountPath: /unseal
              readOnly: true
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.autoUnseal.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openbao-data
        - name: audit
          emptyDir: {}
        - name: audit-config
          configMap:
            name: openbao-audit-fluentbit
        - name: unseal-key
          secret:
            secretName: openbao-unseal-key
