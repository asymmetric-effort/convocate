apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: {{ .Values.global.namespace | default "o11y" }}
spec:
  secretName: grafana-tls
  issuerRef:
    name: openbao-pki
    kind: ClusterIssuer
  dnsNames:
    - grafana.{{ .Values.global.domain | default "asymmetric-effort.com" }}
  duration: 24h
  renewBefore: 12h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.global.namespace | default "o11y" }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.{{ .Values.global.domain | default "asymmetric-effort.com" }}
      secretName: grafana-tls
  rules:
    - host: grafana.{{ .Values.global.domain | default "asymmetric-effort.com" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
