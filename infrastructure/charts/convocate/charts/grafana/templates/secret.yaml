{{/*
NOTE: In production, these secrets are managed by OpenBao secret-sync.
This template provides initial defaults; override via values or let
the openbao secret-sync CronJob manage them.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: {{ .Values.global.namespace | default "o11y" }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: "PLACEHOLDER"
  INFLUXDB_TOKEN: "PLACEHOLDER"
  OPENBAO_OIDC_CLIENT_ID: "PLACEHOLDER"
  OPENBAO_OIDC_CLIENT_SECRET: "PLACEHOLDER"
