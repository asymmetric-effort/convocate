apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-metrics
  namespace: {{ .Values.global.namespace | default "o11y" }}
  labels:
    app: node-metrics
spec:
  selector:
    matchLabels:
      app: node-metrics
  template:
    metadata:
      labels:
        app: node-metrics
    spec:
      serviceAccountName: node-metrics
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: node-metrics
          image: "{{ .Values.global.registry }}/convocate/metrics:{{ .Values.global.imageTag }}"
          imagePullPolicy: Always
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: API_URL
              value: "http://convocate-api.convocate.svc:8443"
            - name: METRICS_API_KEY
              value: ""
            - name: PROC_PREFIX
              value: "/host/proc"
            - name: ROOT_PREFIX
              value: "/host/root"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-root
              mountPath: /host/root
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-root
          hostPath:
            path: /
            type: Directory
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
