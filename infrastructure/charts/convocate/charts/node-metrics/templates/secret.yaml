{{/*
Shared METRICS_API_KEY secret — created in both the o11y namespace
(for node-metrics DaemonSet) and the convocate namespace (for the API).

In production, OpenBao secret-sync overwrites these with the vault-managed
value.  This template ensures a working key exists on first deploy so
metrics ingestion is not blocked by the fail-closed InternalAuth middleware.

The lookup guard prevents Helm from regenerating the key on every upgrade
(which would rotate the secret and break the API/node-metrics pairing
until both pods restart).
*/}}
{{- $existingO11y := (lookup "v1" "Secret" (.Values.global.namespace | default "o11y") "metrics-api-key") -}}
{{- $key := "" -}}
{{- if $existingO11y -}}
  {{- $key = index $existingO11y.data "METRICS_API_KEY" | b64dec -}}
{{- else -}}
  {{- $key = randAlphaNum 64 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: metrics-api-key
  namespace: {{ .Values.global.namespace | default "o11y" }}
  labels:
    managed-by: helm
type: Opaque
stringData:
  METRICS_API_KEY: {{ $key | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: metrics-api-key
  namespace: convocate
  labels:
    managed-by: helm
type: Opaque
stringData:
  METRICS_API_KEY: {{ $key | quote }}
