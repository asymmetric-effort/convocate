apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls
  namespace: {{ .Values.global.namespace | default "o11y" }}
spec:
  secretName: prometheus-tls
  issuerRef:
    name: openbao-pki-internal
    kind: ClusterIssuer
  dnsNames:
    - prometheus
    - prometheus.{{ .Values.global.namespace | default "o11y" }}.svc
    - prometheus.{{ .Values.global.namespace | default "o11y" }}.svc.cluster.local
  duration: 24h
  renewBefore: 12h
