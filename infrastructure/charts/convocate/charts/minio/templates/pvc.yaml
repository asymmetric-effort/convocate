apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-pv
spec:
  capacity:
    storage: {{ .Values.storage | default "10Gi" }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ .Values.hostPath | default "/mnt/data-layer/minio" }}
    type: DirectoryOrCreate
  storageClassName: local
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ .Values.nodeAffinity | default "convocate06" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: {{ .Values.global.namespace | default "data-layer" }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local
  volumeName: minio-pv
  resources:
    requests:
      storage: {{ .Values.storage | default "10Gi" }}
