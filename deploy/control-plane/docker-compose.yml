services:
  router-api:
    image: convocate-router-api:${VERSION:-latest}
    container_name: convocate-router-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:443:443"
      - "127.0.0.1:8443:8443"
    environment:
      - CONVOCATE_PUBLIC_URL=${CONVOCATE_PUBLIC_URL}
      - CONVOCATE_REDIS_URL=rediss://redis:6379
      - CONVOCATE_OPENBAO_URL=https://openbao:8200
    depends_on:
      redis:
        condition: service_healthy
      openbao:
        condition: service_healthy
    volumes:
      - router-data:/var/lib/convocate
    networks:
      - control-plane

  ui:
    image: convocate-ui:${VERSION:-latest}
    container_name: convocate-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8444:443"
    environment:
      - CONVOCATE_ROUTER_API_URL=https://router-api:443
    depends_on:
      - router-api
    networks:
      - control-plane

  redis:
    image: convocate-redis:latest
    container_name: convocate-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --bind 127.0.0.1
      --tls-port 6379
      --port 0
      --tls-cert-file /tls/redis.crt
      --tls-key-file /tls/redis.key
      --tls-ca-cert-file /tls/ca.crt
      --tls-auth-clients optional
    volumes:
      - redis-data:/data
      - tls-certs:/tls:ro
    healthcheck:
      test: >
        redis-cli -h 127.0.0.1 --tls
        --cert /tls/redis.crt
        --key /tls/redis.key
        --cacert /tls/ca.crt ping
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - control-plane

  openbao:
    image: convocate-openbao:latest
    container_name: convocate-openbao
    restart: unless-stopped
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      - BAO_ADDR=https://127.0.0.1:8200
    volumes:
      - openbao-data:/var/lib/openbao
      - tls-certs:/tls:ro
    cap_add:
      - IPC_LOCK
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "bao status -tls-skip-verify || true"
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - control-plane

volumes:
  router-data:
  redis-data:
  openbao-data:
  tls-certs:

networks:
  control-plane:
    driver: bridge
