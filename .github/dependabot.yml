version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/src/api"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "gomod"
    directory: "/src/agent"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "gomod"
    directory: "/src/gatekeeper"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "gomod"
    directory: "/src/ui/cmd/serve"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "gomod"
    directory: "/o11y/metrics"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "npm"
    directory: "/src/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "asymmetric-effort/convocate"
    labels:
      - "dependencies"
      - "ci"
