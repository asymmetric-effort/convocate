# Continuous Deployment pipeline for Convocate.
#
# Triggered on push to main (after CI passes) or manual dispatch.
#
# Flow:
#   1. Build and push all Docker images tagged with the git SHA.
#   2. Deploy to Cluster A (staging) via Helm, run full PDV suite.
#   3. Deploy to Cluster B (production) with manual approval gate,
#      run smoke PDV tests, auto-rollback on failure.
#
# Required GitHub Environments:
#   - cluster-a    : no protection rules
#   - production   : requires manual approval from a designated reviewer
#
# Required secrets (set per-environment or org-wide):
#   - REGISTRY_HOST       : container registry address (e.g. 192.168.3.90:5000)
#   - CLUSTER_A_HOST      : Cluster A control-plane address
#   - CLUSTER_B_HOST      : Cluster B control-plane address
#   - OPENBAO_ADDR        : OpenBao server address
#   - OPENBAO_TOKEN       : OpenBao root/operator token for TOTP seed management

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  build-and-tag:
    name: Build and Tag Images
    runs-on: [self-hosted, linux, x64]
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set IMAGE_TAG
        id: tag
        run: |
          TAG="sha-$(git rev-parse --short HEAD)"
          echo "IMAGE_TAG=$TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
      - name: Build and push all images
        env:
          REGISTRY: ${{ secrets.REGISTRY_HOST }}
        run: make build push IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}

  deploy-cluster-a:
    name: Deploy to Cluster A
    needs: build-and-tag
    runs-on: [self-hosted, linux, x64]
    environment: cluster-a
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl for Cluster A
        run: |
          # kubeconfig for Cluster A set up by Ansible during provisioning
          export KUBECONFIG=$HOME/.kube/cluster-a.conf
      - name: Deploy via Helm
        env:
          REGISTRY: ${{ secrets.REGISTRY_HOST }}
        run: |
          helm upgrade --install convocate infrastructure/charts/convocate \
            -f infrastructure/charts/convocate/values-cluster-a.yaml \
            --set global.imageTag=${{ needs.build-and-tag.outputs.image_tag }} \
            --set global.registry=$REGISTRY \
            --wait --timeout 5m
      - name: OpenBao bootstrap (generate pdv-test TOTP seed)
        run: |
          # Generate TOTP seed for pdv-test
          # Store in OpenBao, read back for test use
          echo "TOTP seed generation for pdv-test"
          # TODO: actual implementation via ansible-playbook or kubectl exec
      - name: Run full PDV suite
        run: |
          cd test/pdv
          npx playwright test
      - name: Destroy pdv-test TOTP seed
        if: always()
        run: |
          echo "Destroying pdv-test TOTP seed"
          # TODO: actual implementation

  deploy-cluster-b:
    name: Deploy to Cluster B
    needs: [build-and-tag, deploy-cluster-a]
    runs-on: [self-hosted, linux, x64]
    environment:
      name: production
      # Manual approval required
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl for Cluster B
        run: |
          export KUBECONFIG=$HOME/.kube/cluster-b.conf
      - name: Deploy via Helm
        env:
          REGISTRY: ${{ secrets.REGISTRY_HOST }}
        run: |
          helm upgrade --install convocate infrastructure/charts/convocate \
            -f infrastructure/charts/convocate/values-cluster-b.yaml \
            --set global.imageTag=${{ needs.build-and-tag.outputs.image_tag }} \
            --set global.registry=$REGISTRY \
            --wait --timeout 5m
      - name: Generate pdv-test TOTP seed
        run: echo "TOTP seed generation"
      - name: Run smoke PDV tests
        run: |
          cd test/pdv
          npx playwright test tests/k8s-infrastructure.spec.ts tests/convocate-auth.spec.ts
      - name: Destroy pdv-test TOTP seed
        if: always()
        run: echo "Destroying TOTP seed"
      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=$HOME/.kube/cluster-b.conf
          helm rollback convocate
