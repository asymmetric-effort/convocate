name: Provision Cluster B

on:
  workflow_dispatch:

jobs:
  provision:
    name: Provision Cluster B
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7
      - name: Run leakdetector
        run: leakdetector --skip-history --exit-code 0
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/requirements.yml
      - name: Provision Cluster B
        env:
          CLUSTER_B_HOST: ${{ secrets.CLUSTER_B_HOST }}
          CLUSTER_B_CIDR: ${{ secrets.CLUSTER_B_CIDR }}
          HYPERVISOR_USER: ${{ secrets.HYPERVISOR_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          DNS_DOMAIN: ${{ secrets.DNS_DOMAIN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          VM_PASSWORD_HASH: ${{ secrets.VM_PASSWORD_HASH }}
        working-directory: infrastructure
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          cp ~/.ssh/ansible_key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key

          ansible-playbook playbooks/recycle.yml \
            -i inventory/cluster-b.yml \
            -e "ssh_public_key='$SSH_PUBLIC_KEY'" \
            -e "vm_password_hash='$VM_PASSWORD_HASH'" \
            -e "skip_nginx=true"
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ansible_key ~/.ssh/id_ed25519
