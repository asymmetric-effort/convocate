  #     - uses: actions/checkout@v7
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version: "1.26"
  #     - name: Run integration tests
  #       working-directory: api
  #       env:
  #         TEST_DATABASE_URL: "postgres://postgres@postgresql.data-layer.svc:5432/convocate_test?sslmode=disable"
  #         TEST_REDIS_URL: "redis.data-layer.svc:6379"
  #       run: go test -tags=integration ./internal/db/... -v -cover

