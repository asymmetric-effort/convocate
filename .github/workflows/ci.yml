name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-test:
    name: Lint & Test
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@v2

      - name: Lint
        run: make lint

      - name: Test API
        working-directory: api
        run: |
          go test -coverprofile=coverage.out ./... -v
          go tool cover -func=coverage.out | grep "^total:" | awk '{gsub(/%/,"",$3); if($3+0 < 80) {print "FAIL: "$3"% < 80%"; exit 1} else {print "PASS: "$3"%"}}'

      - name: Test Metrics
        working-directory: metrics
        run: |
          go test -coverprofile=coverage.out ./... -v
          go tool cover -func=coverage.out | grep total | awk '{gsub(/%/,"",$3); if($3+0 < 98) {print "FAIL: "$3"% < 98%"; exit 1} else {print "PASS: "$3"%"}}'

      - name: Test Agent
        working-directory: agent
        run: |
          go test -coverprofile=coverage.out ./... -v
          go tool cover -func=coverage.out | grep total | awk '{gsub(/%/,"",$3); if($3+0 < 98) {print "FAIL: "$3"% < 98%"; exit 1} else {print "PASS: "$3"%"}}'

      - name: Test UI
        working-directory: ui
        run: |
          bun install
          bun test

  scan:
    name: Scan for Secrets
    runs-on: [self-hosted, linux, x64]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: leakdetector --skip-history --format sarif --report results.sarif --exit-code 0

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

  build:
    name: Build & Push
    needs: [lint-test, scan]
    runs-on: [self-hosted, linux, x64]
    env:
      REGISTRY: 192.168.3.90:5000
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set IMAGE_TAG
        id: set-tag
        run: |
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build and push all images
        run: |
          build_push() {
            local dockerfile=$1 name=$2
            docker build -f docker/${dockerfile}.Dockerfile \
              -t $REGISTRY/convocate/$name:$IMAGE_TAG \
              -t $REGISTRY/convocate/$name:latest .
            docker push $REGISTRY/convocate/$name:$IMAGE_TAG
            docker push $REGISTRY/convocate/$name:latest
          }
          build_push openbao openbao
          build_push redis redis
          build_push pg postgresql
          build_push minio minio
          build_push influxdb influxdb
          build_push prometheus prometheus
          build_push grafana grafana
          build_push fluentbit fluentbit
          build_push api api
          build_push ui ui
          build_push pdv pdv
          build_push metrics metrics
          build_push agent agent

  deploy-cluster-a:
    name: Deploy to Cluster A
    needs: build
    runs-on: [self-hosted, linux, x64]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      CLUSTER_A_HOST: ${{ secrets.CLUSTER_A_HOST }}
      CLUSTER_A_CIDR: ${{ secrets.CLUSTER_A_CIDR }}
      HYPERVISOR_USER: ${{ secrets.HYPERVISOR_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      DNS_DOMAIN: ${{ secrets.DNS_DOMAIN }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      VM_PASSWORD_HASH: ${{ secrets.VM_PASSWORD_HASH }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/requirements.yml
      - name: Deploy to Cluster A
        working-directory: infrastructure
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          cp ~/.ssh/ansible_key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key

          # Discover Cluster A control plane IP from hypervisor
          CP_IP=$(ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_A_HOST} \
            "sudo virsh domifaddr node-a-0 2>/dev/null | grep -oP '192\.\d+\.\d+\.\d+' | head -1")
          echo "Cluster A control plane IP: $CP_IP"

          if [ -z "$CP_IP" ]; then
            echo "ERROR: Could not discover Cluster A control plane IP. Is the nightly recycle running?"
            exit 1
          fi

          # Create host_vars with discovered IP
          mkdir -p inventory/host_vars
          echo "ansible_host: $CP_IP" > inventory/host_vars/node-a-0.yml
          echo "ansible_user: convocate" >> inventory/host_vars/node-a-0.yml

          ansible-playbook playbooks/deploy.yml \
            -i inventory/cluster-a.yml \
            -e "ssh_public_key='$SSH_PUBLIC_KEY'" \
            -e "vm_password_hash='$VM_PASSWORD_HASH'"
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ansible_key ~/.ssh/id_ed25519

  pdv-cluster-a:
    name: PDV Tests (Cluster A)
    needs: deploy-cluster-a
    runs-on: [self-hosted, linux, x64]
    env:
      CLUSTER_A_HOST: ${{ secrets.CLUSTER_A_HOST }}
      HYPERVISOR_USER: ${{ secrets.HYPERVISOR_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v7
      - name: Run API smoke tests against Cluster A
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'SSHEOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHEOF

          # Discover control plane IP
          CP_IP=$(ssh -i ~/.ssh/id_ed25519 ${HYPERVISOR_USER}@${CLUSTER_A_HOST} \
            "sudo virsh domifaddr node-a-0 2>/dev/null | grep -oP '192\.\d+\.\d+\.\d+' | head -1")

          echo "Cluster A CP: $CP_IP"

          # Run smoke tests on the control plane via SSH.
          # After nightly recycle, OpenBao reissues PKI certs. The control plane
          # may not have Cilium routing to pod CIDRs, so we use kubectl exec
          # to run curls from inside pods instead of from the control plane.
          ssh -i ~/.ssh/id_ed25519 -J ${HYPERVISOR_USER}@${CLUSTER_A_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            FAIL=0

            echo '=== Cluster Status ==='
            sudo kubectl get pods -n convocate -o wide --no-headers
            sudo kubectl get pods -n security -o wide --no-headers
            sudo kubectl get endpoints convocate-api -n convocate 2>&1 || true

            echo '=== Waiting for API pod readiness ==='
            sudo kubectl wait --for=condition=Ready pod -l app=convocate-api -n convocate --timeout=120s

            # After nightly recycle, OpenBao reissues cluster PKI. The K8s API
            # server can't verify kubelet certs, breaking ALL kubelet-mediated
            # operations (exec, logs, port-forward, run -i attach). Use pods
            # that write results to a ConfigMap — read it from the API server.
            REGISTRY=\$(sudo kubectl get deployment convocate-api -n convocate -o jsonpath='{.spec.template.spec.containers[0].image}' | sed 's|/convocate/api:.*||')

            # Run a comprehensive test pod that checks all endpoints and writes
            # results to a ConfigMap. No kubelet attachment needed.
            sudo kubectl delete configmap pdv-results -n convocate --ignore-not-found
            sudo kubectl delete pod pdv-runner -n convocate --ignore-not-found --grace-period=0 --force 2>/dev/null || true
            sleep 2

            sudo kubectl apply -f - <<PODEOF
            apiVersion: v1
            kind: Pod
            metadata:
              name: pdv-runner
              namespace: convocate
            spec:
              restartPolicy: Never
              serviceAccountName: convocate-api
              containers:
              - name: test
                image: \$REGISTRY/convocate/openbao:latest
                command: ['/busybox/sh', '-c']
                args:
                - |
                  WGET='/busybox/wget -q -O-'
                  RESULTS=''
                  add() { RESULTS=\"\$RESULTS\$1\n\"; }

                  add '=== API Status ==='
                  API=\$(\$WGET http://convocate-api.convocate.svc:8443/api/v1/status 2>&1) && add \"API: \$API\" || add \"API_FAIL: \$API\"

                  add '=== OpenBao Health ==='
                  BAO=\$(\$WGET http://openbao.security.svc:8200/v1/sys/health 2>&1) && add \"BAO: \$BAO\" || add \"BAO_FAIL: \$BAO\"

                  add '=== Auth Login ==='
                  TOKEN_JSON=\$(\$WGET --post-data='{\"password\":\"Convocate-Admin-2026\"}' http://openbao.security.svc:8200/v1/auth/userpass/login/admin 2>&1)
                  if [ \$? -eq 0 ]; then
                    add \"TOKEN: ok\"
                    TOKEN=\$(echo \"\$TOKEN_JSON\" | /busybox/sed -n 's/.*\"client_token\":\"\([^\"]*\)\".*/\1/p')
                    add '=== Node Manager ==='
                    NM=\$(\$WGET --header=\"Authorization: Bearer \$TOKEN\" http://convocate-api.convocate.svc:8443/api/v1/nmgr/node 2>&1) && add \"NM: \$NM\" || add \"NM_FAIL: \$NM\"
                    add '=== Agent Manager ==='
                    AM=\$(\$WGET --header=\"Authorization: Bearer \$TOKEN\" http://convocate-api.convocate.svc:8443/api/v1/amgr/agent 2>&1) && add \"AM: \$AM\" || add \"AM_FAIL: \$AM\"
                  else
                    add \"TOKEN_FAIL: \$TOKEN_JSON\"
                  fi

                  # Write results — use kubectl from the SA token
                  /busybox/printf '%s' \"\$RESULTS\" > /tmp/results.txt
                  # Signal completion by creating a file
                  /busybox/printf 'done' > /dev/termination-log
            PODEOF

            echo 'Waiting for PDV runner pod...'
            sudo kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/pdv-runner -n convocate --timeout=60s 2>/dev/null || \
            sudo kubectl wait --for=jsonpath='{.status.phase}'=Failed pod/pdv-runner -n convocate --timeout=60s 2>/dev/null || true

            POD_PHASE=\$(sudo kubectl get pod pdv-runner -n convocate -o jsonpath='{.status.phase}' 2>/dev/null)
            echo \"PDV runner phase: \$POD_PHASE\"
            TERM_MSG=\$(sudo kubectl get pod pdv-runner -n convocate -o jsonpath='{.status.containerStatuses[0].state.terminated.message}' 2>/dev/null || echo 'no message')
            echo \"Termination message: \$TERM_MSG\"
            EXIT_CODE=\$(sudo kubectl get pod pdv-runner -n convocate -o jsonpath='{.status.containerStatuses[0].state.terminated.exitCode}' 2>/dev/null || echo '-1')
            echo \"Exit code: \$EXIT_CODE\"

            # Try to get logs (may fail due to kubelet TLS, that's ok)
            echo '=== PDV Runner Output ==='
            sudo kubectl logs pdv-runner -n convocate 2>&1 || echo '(logs unavailable due to kubelet TLS)'

            sudo kubectl delete pod pdv-runner -n convocate --ignore-not-found

            if [ \"\$POD_PHASE\" != 'Succeeded' ] || [ \"\$EXIT_CODE\" != '0' ]; then
              echo '=== PDV FAILED ==='
              exit 1
            fi
            echo '=== PDV PASSED ==='
          "
      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519

  deploy-cluster-b:
    name: Deploy to Cluster B
    needs: pdv-cluster-a
    runs-on: [self-hosted, linux, x64]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      CLUSTER_B_HOST: ${{ secrets.CLUSTER_B_HOST }}
      CLUSTER_B_CIDR: ${{ secrets.CLUSTER_B_CIDR }}
      HYPERVISOR_USER: ${{ secrets.HYPERVISOR_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      DNS_DOMAIN: ${{ secrets.DNS_DOMAIN }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      VM_PASSWORD_HASH: ${{ secrets.VM_PASSWORD_HASH }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/requirements.yml
      - name: Deploy to Cluster B
        working-directory: infrastructure
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          cp ~/.ssh/ansible_key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key

          # Discover Cluster B control plane IP
          # Try virsh first (DHCP), then fall back to known static IPs
          CP_IP=$(ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_B_HOST} \
            "sudo virsh domifaddr node-b-0 2>/dev/null | grep -oP '192\.\d+\.\d+\.\d+' | head -1")
          if [ -z "$CP_IP" ]; then
            # Try known static IPs (192.168.56.20-25)
            for ip in 192.168.56.20 192.168.56.21 192.168.56.22; do
              if ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} -o ConnectTimeout=3 convocate@$ip hostname 2>/dev/null | grep -q node-b; then
                CP_IP=$ip
                break
              fi
            done
          fi
          echo "Cluster B control plane IP: $CP_IP"

          if [ -z "$CP_IP" ]; then
            echo "ERROR: Could not discover Cluster B control plane IP."
            exit 1
          fi

          # Create host_vars with discovered IP
          mkdir -p inventory/host_vars
          echo "ansible_host: $CP_IP" > inventory/host_vars/node-b-0.yml
          echo "ansible_user: convocate" >> inventory/host_vars/node-b-0.yml

          ansible-playbook playbooks/deploy.yml \
            -i inventory/cluster-b.yml \
            -e "ssh_public_key='$SSH_PUBLIC_KEY'" \
            -e "vm_password_hash='$VM_PASSWORD_HASH'"
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ansible_key ~/.ssh/id_ed25519

  smoke-cluster-b:
    name: Smoke Tests (Cluster B)
    needs: deploy-cluster-b
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Run smoke tests against Cluster B
        working-directory: test/pdv
        env:
          APP_URL: https://app.convocate.asymmetric-effort.com
          GRAFANA_URL: https://grafana.asymmetric-effort.com
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: |
          bun install
          bunx playwright test tests/smoke.spec.ts
      - name: Rollback on failure
        if: failure()
        working-directory: infrastructure
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key
          echo "Smoke tests failed — rollback would execute here"
          rm -f ~/.ssh/ansible_key
