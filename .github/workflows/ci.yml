name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Go fmt check
        working-directory: api
        run: |
          UNFMT=$(gofmt -l .)
          if [ -n "$UNFMT" ]; then
            echo "Files not formatted:"
            echo "$UNFMT"
            exit 1
          fi
      - name: Go vet
        working-directory: api
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run Go tests
        working-directory: api
        run: go test ./... -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build API
        working-directory: api
        run: CGO_ENABLED=0 go build -o ../build/convocate-api .
      - name: Build UI server
        working-directory: ui/cmd/serve
        run: CGO_ENABLED=0 go build -o ../../../build/convocate-ui .
