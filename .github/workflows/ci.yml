name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-go v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
      - name: Build Web UI (for embed in convocate-ui)
        run: cd internal/webui && npm install && npm run build
      - name: Go lint (golangci-lint)
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --config .golangci-lint.yml ./...
      - name: YAML lint
        run: |
          pip install yamllint
          find . -name '*.yml' -o -name '*.yaml' \
            | grep -v vendor | grep -v node_modules \
            | grep -v .dev \
            | xargs yamllint -s
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-go v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
      - name: Build Web UI (for embed in convocate-ui)
        run: cd internal/webui && npm install && npm run build
      - name: Unit tests with coverage
        run: |
          go test -v -race -count=1 \
            -coverprofile=coverage.out ./internal/...
      - name: Enforce coverage threshold (98%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' | awk '{print $NF}' \
            | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 98.0" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 98% threshold"
            exit 1
          fi
      # actions/upload-artifact v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-go v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
      - name: Build Web UI (required for embed in convocate-ui)
        run: cd internal/webui && npm install && npm run build
      - name: Build all binaries
        run: make build

  webui-typecheck:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-node v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
      - name: Install dependencies
        run: cd internal/webui && npm install
      - name: TypeScript typecheck
        run: cd internal/webui && npx tsc --noEmit
