name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install yamllint
        run: pip install yamllint

      - name: Install jsonlint
        run: npm install -g jsonlint

      - name: Run Go linter
        run: make lint-go

      - name: Run YAML linter
        run: make lint-yaml

      - name: Run JSON linter
        run: make lint-json

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        run: make test-integration

      - name: Check coverage
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COVERAGE}"

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          PCT="${COVERAGE%%%*}"
          if (( $(echo "$PCT >= 90" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$PCT >= 80" | bc -l) )); then COLOR="green"
          elif (( $(echo "$PCT >= 70" | bc -l) )); then COLOR="yellowgreen"
          elif (( $(echo "$PCT >= 60" | bc -l) )); then COLOR="yellow"
          else COLOR="red"; fi
          mkdir -p .badges
          printf '{"schemaVersion":1,"label":"coverage",' > .badges/coverage.json
          printf '"message":"%s","color":"%s"}\n' "${COVERAGE}" "${COLOR}" >> .badges/coverage.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git fetch origin badges 2>/dev/null && git checkout badges || git checkout --orphan badges
          git rm -rf . 2>/dev/null || true
          git checkout stash -- .badges/coverage.json
          git add .badges/coverage.json
          git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
          git push origin badges

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos:
          - linux
        goarch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.Version=${{ github.ref_name }}" \
            -o dist/claude-shell-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/claude-shell/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-shell-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum claude-shell-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/claude-shell-*
            dist/checksums.txt
