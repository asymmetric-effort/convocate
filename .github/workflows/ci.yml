name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: make lint
        run: make lint

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run Go tests with coverage
        working-directory: api
        run: go test -coverprofile=coverage.out ./... -v
      - name: Coverage check (98% minimum)
        working-directory: api
        run: |
          go tool cover -func=coverage.out | grep total | awk '{gsub(/%/,"",$3); if($3+0 < 98) {print "FAIL: "$3"% < 98%"; exit 1} else {print "PASS: "$3"%"}}'
      # - name: Push test metrics to InfluxDB
      #   if: always()
      #   # Requires INFLUXDB_TOKEN secret configured in repository settings
      #   env:
      #     INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
      #     INFLUXDB_URL: https://influxdb.o11y.svc:8086
      #   run: ./scripts/test-metrics.sh

  test-metrics:
    name: Test Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run Go tests with coverage
        working-directory: metrics
        run: go test -coverprofile=coverage.out ./... -v
      - name: Coverage check (98% minimum)
        working-directory: metrics
        run: |
          go tool cover -func=coverage.out | grep total | awk '{gsub(/%/,"",$3); if($3+0 < 98) {print "FAIL: "$3"% < 98%"; exit 1} else {print "PASS: "$3"%"}}'
      # - name: Push test metrics to InfluxDB
      #   if: always()
      #   # Requires INFLUXDB_TOKEN secret configured in repository settings
      #   env:
      #     INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
      #     INFLUXDB_URL: https://influxdb.o11y.svc:8086
      #   run: ./scripts/test-metrics.sh

  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run Go tests with coverage
        working-directory: agent
        run: go test -coverprofile=coverage.out ./... -v
      - name: Coverage check (98% minimum)
        working-directory: agent
        run: |
          go tool cover -func=coverage.out | grep total | awk '{gsub(/%/,"",$3); if($3+0 < 98) {print "FAIL: "$3"% < 98%"; exit 1} else {print "PASS: "$3"%"}}'
      # - name: Push test metrics to InfluxDB
      #   if: always()
      #   # Requires INFLUXDB_TOKEN secret configured in repository settings
      #   env:
      #     INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
      #     INFLUXDB_URL: https://influxdb.o11y.svc:8086
      #   run: ./scripts/test-metrics.sh

  test-ui:
    name: Test UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install and test
        working-directory: ui
        run: |
          bun install
          bun test
      # - name: Push test metrics to InfluxDB
      #   if: always()
      #   # Requires INFLUXDB_TOKEN secret configured in repository settings
      #   env:
      #     INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}
      #     INFLUXDB_URL: https://influxdb.o11y.svc:8086
      #   run: ./scripts/test-metrics.sh

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-api, test-metrics, test-agent, test-ui]
    steps:
      - uses: actions/checkout@v7
      - name: Build openbao
        run: docker build -f docker/openbao.Dockerfile -t convocate/openbao:ci .
      - name: Build redis
        run: docker build -f docker/redis.Dockerfile -t convocate/redis:ci .
      - name: Build postgresql
        run: docker build -f docker/pg.Dockerfile -t convocate/postgresql:ci .
      - name: Build minio
        run: docker build -f docker/minio.Dockerfile -t convocate/minio:ci .
      - name: Build influxdb
        run: docker build -f docker/influxdb.Dockerfile -t convocate/influxdb:ci .
      - name: Build prometheus
        run: docker build -f docker/prometheus.Dockerfile -t convocate/prometheus:ci .
      - name: Build grafana
        run: docker build -f docker/grafana.Dockerfile -t convocate/grafana:ci .
      - name: Build jaeger
        run: docker build -f docker/jaeger.Dockerfile -t convocate/jaeger:ci .
      - name: Build fluentbit
        run: docker build -f docker/fluentbit.Dockerfile -t convocate/fluentbit:ci .
      - name: Build api
        run: docker build -f docker/api.Dockerfile -t convocate/api:ci .
      - name: Build ui
        run: docker build -f docker/ui.Dockerfile -t convocate/ui:ci .
      - name: Build pdv
        run: docker build -f docker/pdv.Dockerfile -t convocate/pdv:ci .
      - name: Build metrics
        run: docker build -f docker/metrics.Dockerfile -t convocate/metrics:ci .
      - name: Build agent
        run: docker build -f docker/agent.Dockerfile -t convocate/agent:ci .

  # Integration tests run against real PostgreSQL and Redis in the K8s cluster.
