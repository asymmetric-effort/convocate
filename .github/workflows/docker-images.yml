name: Docker Images
on:
  push:
    branches: [main]
    paths: ['infrastructure/docker/**', 'src/**']
    tags: ['v*']
  workflow_run:
    workflows: ['Fetch Dependencies']
    types: [completed]
    branches: [main]
  workflow_dispatch:
jobs:
  verify-deps:
    name: Verify deps release exists
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      deps_tag: ${{ steps.deps.outputs.deps_tag }}
      deps_url: ${{ steps.deps.outputs.deps_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute deps tag and verify release
        id: deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPS_TAG="deps-$(git log -1 --format=%h -- infrastructure/DEPENDENCIES.json)"
          echo "deps_tag=${DEPS_TAG}" >> "$GITHUB_OUTPUT"
          echo "deps_url=https://github.com/asymmetric-effort/convocate/releases/download/${DEPS_TAG}" >> "$GITHUB_OUTPUT"
          echo "Verifying release ${DEPS_TAG} exists..."
          if ! gh release view "$DEPS_TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "::error::Dependencies release '${DEPS_TAG}' not found. Update infrastructure/DEPENDENCIES.json and push to main to trigger the fetch-deps workflow."
            exit 1
          fi
          echo "Release ${DEPS_TAG} verified."

  enumerate:
    name: Enumerate Dockerfiles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      semver_tag: ${{ steps.meta.outputs.semver_tag }}
      is_tagged: ${{ steps.meta.outputs.is_tagged }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: List Dockerfiles (excluding base images)
        id: list
        run: |
          NAMES=$(ls infrastructure/docker/*.Dockerfile | xargs -I{} basename {} .Dockerfile | grep -v -E '^(ubuntu-base|runner-base)$' | jq -R . | jq -sc .)
          echo "matrix=${NAMES}" >> "$GITHUB_OUTPUT"

      - name: Generate tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          SEMVER_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$SEMVER_TAG" ]; then
            echo "is_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tagged=false" >> "$GITHUB_OUTPUT"
          fi

  build-ubuntu-base:
    name: Build ubuntu-base
    needs: verify-deps
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Generate sha tag
        id: tag
        run: echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Pull existing for cache
        run: docker pull ghcr.io/asymmetric-effort/convocate/ubuntu-base:latest 2>/dev/null || true
      - name: Build and push (sha only)
        run: |
          IMAGE=ghcr.io/asymmetric-effort/convocate/ubuntu-base
          DEPS_TAG="${{ needs.verify-deps.outputs.deps_tag }}"
          docker build \
            --build-arg DEPS_URL=https://github.com/asymmetric-effort/convocate/releases/download/${DEPS_TAG} \
            -t "${IMAGE}:${{ steps.tag.outputs.sha_tag }}" \
            -f infrastructure/docker/ubuntu-base.Dockerfile .
          docker push "${IMAGE}:${{ steps.tag.outputs.sha_tag }}"

  build-runner-base:
    name: Build runner-base
    needs: [build-ubuntu-base, verify-deps]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Pull existing for cache
        run: docker pull ghcr.io/asymmetric-effort/convocate/runner-base:latest 2>/dev/null || true
      - name: Build and push (sha only)
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          IMAGE=ghcr.io/asymmetric-effort/convocate/runner-base
          SHA_TAG="${{ needs.build-ubuntu-base.outputs.sha_tag }}"
          DEPS_TAG="${{ needs.verify-deps.outputs.deps_tag }}"
          docker build \
            --build-arg DEPS_URL=https://github.com/asymmetric-effort/convocate/releases/download/${DEPS_TAG} \
            --build-arg UBUNTU_BASE_TAG=${SHA_TAG} \
            -t "${IMAGE}:${SHA_TAG}" \
            -f infrastructure/docker/runner-base.Dockerfile .
          docker push "${IMAGE}:${SHA_TAG}"

  lint:
    name: Lint ${{ matrix.name }}
    needs: [enumerate, verify-deps]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: ${{ fromJson(needs.enumerate.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - name: Install hadolint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v hadolint &>/dev/null; then
            DEPS_TAG="${{ needs.verify-deps.outputs.deps_tag }}"
            curl -fsSL -o /usr/local/bin/hadolint \
              "https://github.com/asymmetric-effort/convocate/releases/download/${DEPS_TAG}/hadolint-2.12.0-linux-x86_64"
            chmod +x /usr/local/bin/hadolint
          fi
      - name: Lint ${{ matrix.name }}.Dockerfile
        run: hadolint --failure-threshold error infrastructure/docker/${{ matrix.name }}.Dockerfile

  build:
    name: Build ${{ matrix.name }}
    needs: [enumerate, lint, build-ubuntu-base, build-runner-base, verify-deps]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        name: ${{ fromJson(needs.enumerate.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Pull existing for cache
        run: docker pull ghcr.io/asymmetric-effort/convocate/${{ matrix.name }}:latest 2>/dev/null || true
      - name: Build and push (sha only)
        run: |
          IMAGE=ghcr.io/asymmetric-effort/convocate/${{ matrix.name }}
          SHA_TAG="${{ needs.enumerate.outputs.sha_tag }}"
          DEPS_TAG="${{ needs.verify-deps.outputs.deps_tag }}"
          UBUNTU_BASE_SHA="${{ needs.build-ubuntu-base.outputs.sha_tag }}"
          docker build \
            --build-arg DEPS_URL=https://github.com/asymmetric-effort/convocate/releases/download/${DEPS_TAG} \
            --build-arg UBUNTU_BASE_TAG=${UBUNTU_BASE_SHA} \
            --build-arg RUNNER_BASE_TAG=${SHA_TAG} \
            -t "${IMAGE}:${SHA_TAG}" \
            -f infrastructure/docker/${{ matrix.name }}.Dockerfile .
          docker push "${IMAGE}:${SHA_TAG}"

  test-ubuntu-base:
    name: Test ubuntu-base
    needs: build-ubuntu-base
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v7
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Test
        run: |
          chmod +x infrastructure/docker/tests/test-ubuntu-base.sh
          infrastructure/docker/tests/test-ubuntu-base.sh "ghcr.io/asymmetric-effort/convocate/ubuntu-base:${{ needs.build-ubuntu-base.outputs.sha_tag }}"

  test-runner-base:
    name: Test runner-base
    needs: [build-ubuntu-base, build-runner-base]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v7
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Test
        run: |
          chmod +x infrastructure/docker/tests/test-runner-base.sh
          infrastructure/docker/tests/test-runner-base.sh "ghcr.io/asymmetric-effort/convocate/runner-base:${{ needs.build-ubuntu-base.outputs.sha_tag }}"

  test:
    name: Test ${{ matrix.name }}
    needs: [enumerate, build]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    strategy:
      matrix:
        name: ${{ fromJson(needs.enumerate.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Test ${{ matrix.name }}
        run: |
          chmod +x infrastructure/docker/tests/test-${{ matrix.name }}.sh
          infrastructure/docker/tests/test-${{ matrix.name }}.sh "ghcr.io/asymmetric-effort/convocate/${{ matrix.name }}:${{ needs.enumerate.outputs.sha_tag }}"

  tag:
    name: Tag all images
    needs: [enumerate, build-ubuntu-base, build-runner-base, test-ubuntu-base, test-runner-base, test]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Promote all images to latest
        run: |
          GHCR=ghcr.io/asymmetric-effort/convocate
          SHA_TAG="${{ needs.enumerate.outputs.sha_tag }}"
          SEMVER_TAG="${{ needs.enumerate.outputs.semver_tag }}"
          IMAGES='${{ needs.enumerate.outputs.matrix }}'

          # Tag base images
          for BASE in ubuntu-base runner-base; do
            docker pull "${GHCR}/${BASE}:${SHA_TAG}"
            docker tag "${GHCR}/${BASE}:${SHA_TAG}" "${GHCR}/${BASE}:latest"
            docker push "${GHCR}/${BASE}:latest"
            if [ -n "$SEMVER_TAG" ]; then
              docker tag "${GHCR}/${BASE}:${SHA_TAG}" "${GHCR}/${BASE}:${SEMVER_TAG}"
              docker push "${GHCR}/${BASE}:${SEMVER_TAG}"
            fi
            echo "Tagged ${BASE}:latest"
          done

          # Tag all other images
          for NAME in $(echo "$IMAGES" | jq -r '.[]'); do
            docker pull "${GHCR}/${NAME}:${SHA_TAG}"
            docker tag "${GHCR}/${NAME}:${SHA_TAG}" "${GHCR}/${NAME}:latest"
            docker push "${GHCR}/${NAME}:latest"
            if [ -n "$SEMVER_TAG" ]; then
              docker tag "${GHCR}/${NAME}:${SHA_TAG}" "${GHCR}/${NAME}:${SEMVER_TAG}"
              docker push "${GHCR}/${NAME}:${SEMVER_TAG}"
            fi
            echo "Tagged ${NAME}:latest"
          done

  trigger-deploys:
    name: Trigger downstream deploys
    needs: [tag, enumerate]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect changed images and trigger deploys
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine which Dockerfiles changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- infrastructure/docker/ src/ 2>/dev/null | \
            sed -n 's|infrastructure/docker/\(.*\)\.Dockerfile|\1|p' || true)

          # If triggered by workflow_run (Fetch Dependencies) or dispatch, all images rebuilt
          if [ -z "$CHANGED" ] || [ "${{ github.event_name }}" = "workflow_run" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(echo '${{ needs.enumerate.outputs.matrix }}' | jq -r '.[]')
            CHANGED="ubuntu-base runner-base $CHANGED"
          fi

          echo "Changed images: $CHANGED"

          # Map images to downstream workflows
          DEPLOY_APPS=false
          DEPLOY_OPENBAO=false
          DEPLOY_GRAFANA=false
          DEPLOY_VICTORIALOGS=false
          DEPLOY_BOOTSTRAP=false
          DEPLOY_SAML_SCIM_AGENT=false
          DEPLOY_K8S=false

          for IMG in $CHANGED; do
            case "$IMG" in
              convocate-api|pg|redis|ubuntu-base)
                DEPLOY_APPS=true ;;
              openbao)
                DEPLOY_OPENBAO=true ;;
              grafana)
                DEPLOY_GRAFANA=true ;;
              victorialogs)
                DEPLOY_VICTORIALOGS=true ;;
              cloudflared)
                DEPLOY_BOOTSTRAP=true ;;
              saml-scim-agent)
                DEPLOY_SAML_SCIM_AGENT=true ;;
              traefik)
                DEPLOY_K8S=true ;;
            esac
          done

          REPO="${{ github.repository }}"

          if [ "$DEPLOY_APPS" = "true" ]; then
            echo "Triggering Deploy Applications..."
            gh workflow run deploy-apps.yml --repo "$REPO" --ref main
          fi

          if [ "$DEPLOY_OPENBAO" = "true" ]; then
            echo "Triggering OpenBao deploy..."
            gh workflow run openbao.yml --repo "$REPO" --ref main
          fi

          if [ "$DEPLOY_GRAFANA" = "true" ]; then
            echo "Triggering Grafana deploy..."
            gh workflow run grafana.yml --repo "$REPO" --ref main
          fi

          if [ "$DEPLOY_VICTORIALOGS" = "true" ]; then
            echo "Triggering VictoriaLogs deploy..."
            gh workflow run victorialogs.yml --repo "$REPO" --ref main
          fi

          if [ "$DEPLOY_BOOTSTRAP" = "true" ]; then
            echo "Triggering Bootstrap svr00..."
            gh workflow run bootstrap-svr00.yml --repo "$REPO" --ref main
          fi

          if [ "$DEPLOY_SAML_SCIM_AGENT" = "true" ]; then
            echo "Triggering SAML/SCIM Agent deploy..."
            gh workflow run saml-scim-agent.yml --repo "$REPO" --ref main
          fi

          if [ "$DEPLOY_K8S" = "true" ]; then
            echo "Triggering K8s Clusters rebuild..."
            gh workflow run k8s.yml --repo "$REPO" --ref main
          fi

          echo "Done. Triggered deploys based on changed images."
