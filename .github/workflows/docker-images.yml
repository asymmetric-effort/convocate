name: Docker Images
on:
  push:
    branches: [main]
    paths: ['infrastructure/docker/**']
    tags: ['v*']
  workflow_dispatch:
jobs:
  enumerate:
    name: Enumerate Dockerfiles
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      semver_tag: ${{ steps.meta.outputs.semver_tag }}
      is_tagged: ${{ steps.meta.outputs.is_tagged }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: List Dockerfiles (excluding ubuntu-base)
        id: list
        run: |
          NAMES=$(ls infrastructure/docker/*.Dockerfile | xargs -I{} basename {} .Dockerfile | grep -v ubuntu-base | jq -R . | jq -sc .)
          echo "matrix=${NAMES}" >> "$GITHUB_OUTPUT"

      - name: Generate tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          SEMVER_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$SEMVER_TAG" ]; then
            echo "is_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tagged=false" >> "$GITHUB_OUTPUT"
          fi

  build-base:
    name: Build ubuntu-base
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate sha tag
        id: tag
        run: echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install hadolint
        run: |
          if ! command -v hadolint &>/dev/null; then
            curl -fsSL -o /usr/local/bin/hadolint \
              https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
            chmod +x /usr/local/bin/hadolint
          fi

      - name: Lint ubuntu-base.Dockerfile
        run: hadolint --failure-threshold error infrastructure/docker/ubuntu-base.Dockerfile

      - name: Pull existing base for cache
        run: docker pull ghcr.io/asymmetric-effort/convocate/ubuntu-base:latest 2>/dev/null || true

      - name: Build and push ubuntu-base (sha tag only)
        run: |
          IMAGE=ghcr.io/asymmetric-effort/convocate/ubuntu-base
          SHA_TAG="${{ steps.tag.outputs.sha_tag }}"
          docker build -t "${IMAGE}:${SHA_TAG}" -f infrastructure/docker/ubuntu-base.Dockerfile .
          docker push "${IMAGE}:${SHA_TAG}"

  lint:
    name: Lint ${{ matrix.name }}
    needs: enumerate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: ${{ fromJson(needs.enumerate.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Install hadolint
        run: |
          if ! command -v hadolint &>/dev/null; then
            curl -fsSL -o /usr/local/bin/hadolint \
              https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
            chmod +x /usr/local/bin/hadolint
          fi

      - name: Lint ${{ matrix.name }}.Dockerfile
        run: hadolint --failure-threshold error infrastructure/docker/${{ matrix.name }}.Dockerfile

  build:
    name: Build ${{ matrix.name }}
    needs: [enumerate, lint, build-base]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        name: ${{ fromJson(needs.enumerate.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull existing image for cache
        run: docker pull ghcr.io/asymmetric-effort/convocate/${{ matrix.name }}:latest 2>/dev/null || true

      - name: Build and push ${{ matrix.name }} (sha tag only)
        run: |
          IMAGE=ghcr.io/asymmetric-effort/convocate/${{ matrix.name }}
          SHA_TAG="${{ needs.enumerate.outputs.sha_tag }}"
          docker build -t "${IMAGE}:${SHA_TAG}" -f infrastructure/docker/${{ matrix.name }}.Dockerfile .
          docker push "${IMAGE}:${SHA_TAG}"

  test-base:
    name: Test ubuntu-base
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Test ubuntu-base
        run: |
          chmod +x infrastructure/docker/tests/test-ubuntu-base.sh
          infrastructure/docker/tests/test-ubuntu-base.sh "ghcr.io/asymmetric-effort/convocate/ubuntu-base:${{ needs.build-base.outputs.sha_tag }}"

  test:
    name: Test ${{ matrix.name }}
    needs: [enumerate, build]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    strategy:
      matrix:
        name: ${{ fromJson(needs.enumerate.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Test ${{ matrix.name }}
        run: |
          chmod +x infrastructure/docker/tests/test-${{ matrix.name }}.sh
          infrastructure/docker/tests/test-${{ matrix.name }}.sh "ghcr.io/asymmetric-effort/convocate/${{ matrix.name }}:${{ needs.enumerate.outputs.sha_tag }}"

  tag:
    name: Tag all images
    needs: [enumerate, build-base, build, test-base, test]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Promote ubuntu-base to latest
        run: |
          IMAGE=ghcr.io/asymmetric-effort/convocate/ubuntu-base
          SHA_TAG="${{ needs.build-base.outputs.sha_tag }}"
          docker pull "${IMAGE}:${SHA_TAG}"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"
          SEMVER_TAG="${{ needs.enumerate.outputs.semver_tag }}"
          if [ -n "$SEMVER_TAG" ]; then
            docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:${SEMVER_TAG}"
            docker push "${IMAGE}:${SEMVER_TAG}"
          fi

      - name: Promote all images to latest
        run: |
          GHCR=ghcr.io/asymmetric-effort/convocate
          SHA_TAG="${{ needs.enumerate.outputs.sha_tag }}"
          SEMVER_TAG="${{ needs.enumerate.outputs.semver_tag }}"
          IMAGES='${{ needs.enumerate.outputs.matrix }}'

          for NAME in $(echo "$IMAGES" | jq -r '.[]'); do
            IMAGE="${GHCR}/${NAME}"
            docker pull "${IMAGE}:${SHA_TAG}"
            docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
            if [ -n "$SEMVER_TAG" ]; then
              docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:${SEMVER_TAG}"
              docker push "${IMAGE}:${SEMVER_TAG}"
            fi
            echo "Tagged ${NAME}:latest"
          done
