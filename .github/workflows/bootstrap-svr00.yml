name: Bootstrap svr00
on:
  push:
    branches: [main]
    paths: ['infrastructure/bootstrap/**']
  workflow_dispatch:
jobs:
  verify-deps:
    name: Verify deps release exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute deps tag and verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPS_TAG="deps-$(git log -1 --format=%h -- infrastructure/DEPENDENCIES.json)"
          echo "Verifying release ${DEPS_TAG} exists..."
          if ! gh release view "$DEPS_TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "::error::Dependencies release '${DEPS_TAG}' not found. Update infrastructure/DEPENDENCIES.json and push to trigger fetch-deps."
            exit 1
          fi
          echo "Release ${DEPS_TAG} verified"

  bootstrap:
    needs: verify-deps
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v7

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/requirements.yml

      - name: Validate and build credentials
        env:
          CLOUDFLARE_TUNNEL_SECRET: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          CLOUDFLARE_TUNNEL_ACCOUNT_TAG: ${{ secrets.CLOUDFLARE_TUNNEL_ACCOUNT_TAG }}
        run: |
          [ -n "$CLOUDFLARE_TUNNEL_SECRET" ] || { echo "FAIL: CLOUDFLARE_TUNNEL_SECRET is empty"; exit 1; }
          [ -n "$CLOUDFLARE_TUNNEL_ID" ] || { echo "FAIL: CLOUDFLARE_TUNNEL_ID is empty"; exit 1; }
          [ -n "$CLOUDFLARE_TUNNEL_ACCOUNT_TAG" ] || { echo "FAIL: CLOUDFLARE_TUNNEL_ACCOUNT_TAG is empty"; exit 1; }

          # Build credentials JSON from individual secrets
          python3 -c "
          import json, os
          creds = {
              'AccountTag': os.environ['CLOUDFLARE_TUNNEL_ACCOUNT_TAG'],
              'TunnelSecret': os.environ['CLOUDFLARE_TUNNEL_SECRET'],
              'TunnelID': os.environ['CLOUDFLARE_TUNNEL_ID']
          }
          with open('/tmp/cloudflared-credentials.json', 'w') as f:
              json.dump(creds, f)
          print('Credentials file built')
          "

          # Validate the result
          python3 -c "import json; json.load(open('/tmp/cloudflared-credentials.json'))"
          echo "Credentials validated"

      - name: Run bootstrap
        env:
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          ssh-keygen -f ~/.ssh/known_hosts -R 192.168.3.159 2>/dev/null || true

          ANSIBLE_HOST_KEY_CHECKING=False \
          ANSIBLE_ROLES_PATH=infrastructure/bootstrap/roles \
          ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key \
          ansible-playbook infrastructure/bootstrap/playbooks/bootstrap-svr00.yml \
            -e "ghcr_token=${{ secrets.GITHUB_TOKEN }}" -e "ghcr_user=${{ github.actor }}" \
            -i infrastructure/bootstrap/inventory/svr00.yml \
            -e "cloudflared_credentials_file=/tmp/cloudflared-credentials.json"
          rm -f ~/.ssh/ansible_key /tmp/cloudflared-credentials.json
