name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript]
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # github/codeql-action v3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@78ed0c7291d93e40c51b085850dc669a4c3ab73b

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          category: "/language:${{ matrix.language }}"
