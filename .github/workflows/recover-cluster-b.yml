name: Recover Cluster B

on:
  workflow_dispatch:

jobs:
  recover:
    name: Recover Cluster B
    runs-on: [self-hosted, linux, x64]
    env:
      CLUSTER_B_HOST: ${{ secrets.CLUSTER_B_HOST }}
      CLUSTER_B_CIDR: ${{ secrets.CLUSTER_B_CIDR }}
      HYPERVISOR_USER: ${{ secrets.HYPERVISOR_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      VM_PASSWORD_HASH: ${{ secrets.VM_PASSWORD_HASH }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      DNS_DOMAIN: ${{ secrets.DNS_DOMAIN }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/requirements.yml
      - name: Recover Cluster B
        working-directory: infrastructure
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          cp ~/.ssh/ansible_key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'SSHEOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHEOF
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key

          # Discover Cluster B control plane IP
          CP_IP=$(ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_B_HOST} \
            "sudo virsh domifaddr node-b-0 2>/dev/null | grep -oP '192\.\d+\.\d+\.\d+' | head -1")
          if [ -z "$CP_IP" ]; then
            for ip in 192.168.56.20 192.168.56.21 192.168.56.22 192.168.56.10; do
              if ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} -o ConnectTimeout=3 convocate@$ip hostname 2>/dev/null; then
                CP_IP=$ip; break
              fi
            done
          fi
          echo "Cluster B CP: $CP_IP"
          [ -n "$CP_IP" ] || { echo "ERROR: Cannot find Cluster B control plane"; exit 1; }

          mkdir -p inventory/host_vars
          echo "ansible_host: $CP_IP" > inventory/host_vars/node-b-0.yml
          echo "ansible_user: convocate" >> inventory/host_vars/node-b-0.yml

          # Step 1: Ensure sam-caldwell user on control plane
          echo "=== Step 1: sam-caldwell user ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            sudo useradd -m -s /bin/bash -G sudo sam-caldwell 2>/dev/null || true
            echo 'sam-caldwell ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/sam-caldwell >/dev/null
            sudo mkdir -p /home/sam-caldwell/.ssh
            curl -sfL https://github.com/sam-caldwell.keys | sudo tee /home/sam-caldwell/.ssh/authorized_keys >/dev/null
            sudo chmod 700 /home/sam-caldwell/.ssh
            sudo chmod 600 /home/sam-caldwell/.ssh/authorized_keys
            sudo chown -R sam-caldwell:sam-caldwell /home/sam-caldwell/.ssh
            echo 'done'
          "

          # Step 2: Check cluster health
          echo "=== Step 2: Cluster health ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            if ! sudo kubectl get nodes >/dev/null 2>&1; then
              echo 'API server down — restarting kubelet'
              sudo systemctl restart kubelet
              sleep 20
            fi
            sudo kubectl get nodes
          "

          # Step 3: Fix OpenBao — check sealed status, reinit if needed
          echo "=== Step 3: Fix OpenBao ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            BAO_IP=\$(sudo kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}')
            HEALTH=\$(curl -s http://\$BAO_IP:8200/v1/sys/health)
            echo \"Health: \$HEALTH\"

            SEALED=\$(echo \$HEALTH | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"sealed\",True))' 2>/dev/null || echo 'True')
            INIT=\$(echo \$HEALTH | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"initialized\",False))' 2>/dev/null || echo 'False')

            # Try unseal with stored key first
            UNSEAL_KEY=\$(sudo kubectl get secret openbao-unseal-key -n security -o jsonpath='{.data.key}' 2>/dev/null | base64 -d)
            # Also try old key name
            if [ -z \"\$UNSEAL_KEY\" ] || [ \"\$UNSEAL_KEY\" = 'placeholder' ]; then
              UNSEAL_KEY=\$(sudo kubectl get secret openbao-unseal-key -n security -o jsonpath='{.data.unseal-key}' 2>/dev/null | base64 -d)
            fi
            echo \"Unseal key: \${UNSEAL_KEY:0:8}... (init=\$INIT sealed=\$SEALED)\"

            if [ \"\$SEALED\" = 'True' ] && [ \"\$UNSEAL_KEY\" != 'placeholder' ] && [ -n \"\$UNSEAL_KEY\" ]; then
              echo 'Trying unseal with stored key...'
              RESULT=\$(curl -s -d \"{\\\"key\\\":\\\"\$UNSEAL_KEY\\\"}\" http://\$BAO_IP:8200/v1/sys/unseal)
              echo \"Unseal result: \$RESULT\"
              NEW_SEALED=\$(echo \$RESULT | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"sealed\",True))' 2>/dev/null)
              if [ \"\$NEW_SEALED\" = 'False' ]; then
                echo 'Unsealed successfully!'
                # Fix the secret key name for auto-unseal sidecar
                sudo kubectl create secret generic openbao-unseal-key -n security \
                  --from-literal=key=\$UNSEAL_KEY --dry-run=client -o yaml | sudo kubectl apply -f -
                # Restart so auto-unseal sidecar picks up correct key
                sudo kubectl rollout restart deployment openbao -n security
                sudo kubectl rollout status deployment openbao -n security --timeout=120s
                sleep 10
                # Verify
                HEALTH2=\$(curl -s http://\$BAO_IP:8200/v1/sys/health)
                echo \"Post-restart health: \$HEALTH2\"
              else
                echo 'Unseal failed — need reinit'
                UNSEAL_KEY=''
              fi
            fi

            if [ \"\$SEALED\" = 'True' ] && ([ -z \"\$UNSEAL_KEY\" ] || [ \"\$UNSEAL_KEY\" = 'placeholder' ]); then
              echo 'Reinitializing OpenBao (key lost)...'
              sudo kubectl scale deployment openbao -n security --replicas=0
              sleep 5

              # Wipe data on the correct node
              BAO_NODE=\$(sudo kubectl get pv openbao-pv -o jsonpath='{.spec.nodeAffinity.required.nodeSelectorTerms[0].matchExpressions[0].values[0]}' 2>/dev/null)
              echo \"Wiping data on \$BAO_NODE\"
              sudo kubectl delete pod openbao-wipe -n security --ignore-not-found --grace-period=0 --force 2>/dev/null || true
              sleep 2
              sudo kubectl run openbao-wipe -n security --restart=Never \
                --image=busybox:latest \
                --overrides='{\"spec\":{\"nodeSelector\":{\"kubernetes.io/hostname\":\"'\$BAO_NODE'\"},\"volumes\":[{\"name\":\"data\",\"hostPath\":{\"path\":\"/mnt/security/openbao\"}}],\"containers\":[{\"name\":\"wipe\",\"image\":\"busybox:latest\",\"command\":[\"sh\",\"-c\",\"rm -rf /data/* && echo WIPED\"],\"volumeMounts\":[{\"name\":\"data\",\"mountPath\":\"/data\"}]}]}}' \
                --command -- sh -c 'rm -rf /data/* && echo WIPED'
              sudo kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/openbao-wipe -n security --timeout=30s 2>/dev/null || true
              echo \"Wipe phase: \$(sudo kubectl get pod openbao-wipe -n security -o jsonpath='{.status.phase}')\"
              sudo kubectl delete pod openbao-wipe -n security --ignore-not-found

              # Delete and recreate secrets with correct key name
              for ns in security convocate data-layer o11y; do
                sudo kubectl delete secret openbao-root-token -n \$ns --ignore-not-found
                sudo kubectl create secret generic openbao-root-token -n \$ns --from-literal=token=placeholder
              done
              sudo kubectl delete secret openbao-unseal-key -n security --ignore-not-found
              sudo kubectl create secret generic openbao-unseal-key -n security --from-literal=key=placeholder

              sudo kubectl scale deployment openbao -n security --replicas=1
              sudo kubectl wait --for=condition=Ready pod -l app=openbao -n security --timeout=120s
              echo 'OpenBao ready for initialization'
            fi
          "

          # Step 4: Deploy (initializes OpenBao if needed, rolling upgrade for everything else)
          echo "=== Step 4: Deploy ==="
          ansible-playbook playbooks/deploy.yml \
            -i inventory/cluster-b.yml \
            -e "ssh_public_key='$SSH_PUBLIC_KEY'" \
            -e "vm_password_hash='$VM_PASSWORD_HASH'"

          # Step 5: Restart OpenBao so all pods auto-unseal with correct key
          echo "=== Step 5: Restart OpenBao ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            sudo kubectl rollout restart deployment openbao -n security
            sudo kubectl rollout status deployment openbao -n security --timeout=120s
            sleep 15
            BAO_IP=\$(sudo kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}')
            for i in \$(seq 1 12); do
              SEALED=\$(curl -s http://\$BAO_IP:8200/v1/sys/health | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"sealed\",True))' 2>/dev/null)
              echo \"Attempt \$i: sealed=\$SEALED\"
              [ \"\$SEALED\" = 'False' ] && break
              sleep 5
            done
          "

          # Step 6: Restart API for fresh SA token (rolling, zero-downtime)
          echo "=== Step 6: Restart API ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            sudo kubectl rollout restart deployment convocate-api -n convocate
            sudo kubectl rollout status deployment convocate-api -n convocate --timeout=120s
          "

          # Step 7: Verify ALL services
          echo "=== Step 7: Verify ALL services ==="

          # Internal checks
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            BAO_IP=\$(sudo kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}')

            echo '--- OpenBao internal ---'
            curl -s http://\$BAO_IP:8200/v1/sys/health | python3 -c 'import sys,json; d=json.load(sys.stdin); print(\"init:\", d[\"initialized\"], \"sealed:\", d[\"sealed\"])'

            echo '--- Login test ---'
            TOKEN=\$(curl -s -X POST http://\$BAO_IP:8200/v1/auth/userpass/login/admin -d '{\"password\":\"Convocate-Admin-2026\"}' 2>&1 | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"auth\",{}).get(\"client_token\",\"FAILED\"))' 2>/dev/null || echo 'FAILED')
            [ \"\$TOKEN\" != 'FAILED' ] && echo 'Admin login: OK' || { echo 'Admin login: FAILED'; exit 1; }

            echo '--- Pods ---'
            sudo kubectl get pods -A --no-headers | grep -v Running | grep -v Completed || echo 'All pods healthy'
          "

          # External checks
          echo '--- External: Convocate ---'
          curl -sfk --connect-timeout 5 --max-time 10 https://app.convocate.asymmetric-effort.com/api/v1/status && echo ' OK' || echo 'FAILED'

          echo '--- External: Grafana ---'
          curl -sfk --connect-timeout 5 --max-time 10 https://grafana.asymmetric-effort.com/api/health && echo ' OK' || echo 'FAILED'

          echo '--- External: OpenBao ---'
          AUTH_HEALTH=$(curl -sk --connect-timeout 5 --max-time 10 https://auth.asymmetric-effort.com/v1/sys/health 2>&1)
          AUTH_SEALED=$(echo "$AUTH_HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("sealed",True))' 2>/dev/null || echo 'True')
          echo "OpenBao external: sealed=$AUTH_SEALED"
          if [ "$AUTH_SEALED" = "True" ]; then
            echo "WARNING: External OpenBao still sealed — checking nginx proxy config..."
            ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_B_HOST} "
              echo '--- nginx config for auth ---'
              grep -A 20 'auth\.' /etc/nginx/sites-enabled/* /etc/nginx/conf.d/* 2>/dev/null || echo 'No auth config found'
              echo '--- nginx config for grafana ---'
              grep -A 20 'grafana\.' /etc/nginx/sites-enabled/* /etc/nginx/conf.d/* 2>/dev/null || echo 'No grafana config found'
            "
          fi

          # Step 8: Fix nginx proxy tunnels on hypervisor
          if [ "$AUTH_SEALED" = "True" ]; then
            echo "=== Step 8: Fix proxy tunnels ==="
            ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_B_HOST} "
              echo '--- What is on ports 38200/38300? ---'
              sudo ss -tlnp | grep -E '38200|38300' || echo 'Nothing listening'
              sudo ps aux | grep -E 'ssh.*38200|ssh.*38300|kubectl.*port-forward' | grep -v grep || echo 'No tunnels found'

              echo '--- Kill stale port-forwards by PID ---'
              # Kill specific kubectl port-forward processes (not pkill -f which kills our SSH)
              for pid in \$(sudo ss -tlnp | grep -E '38200|38300' | grep -oP 'pid=\K[0-9]+'); do
                echo \"Killing port-forward pid \$pid\"
                sudo kill \$pid 2>/dev/null || true
              done
              sleep 2

              echo '--- Restart port-forwards ---'
              # Use the same mechanism as the original: kubectl port-forward from hypervisor
              # Find the kubeconfig (sam-caldwell's or root's)
              KUBE_CFG=''
              for cfg in /home/sam-caldwell/.kube/config /root/.kube/config /etc/kubernetes/admin.conf; do
                [ -f \$cfg ] && KUBE_CFG=\$cfg && break
              done
              echo \"Using kubeconfig: \$KUBE_CFG\"
              if [ -n \"\$KUBE_CFG\" ]; then
                nohup kubectl --kubeconfig=\$KUBE_CFG port-forward --address 0.0.0.0 -n security svc/openbao 38200:8200 </dev/null >/dev/null 2>&1 &
                echo \"OpenBao port-forward started (pid \$!)\"
                nohup kubectl --kubeconfig=\$KUBE_CFG port-forward --address 0.0.0.0 -n o11y svc/grafana 38300:3000 </dev/null >/dev/null 2>&1 &
                echo \"Grafana port-forward started (pid \$!)\"
              else
                echo 'ERROR: No kubeconfig found'
              fi

              sleep 2
              echo '--- Verify tunnels ---'
              sudo ss -tlnp | grep -E '38200|38300'
            "

            # Re-check external services
            echo "=== Final external check ==="
            sleep 3
            echo "Convocate: $(curl -sfk --max-time 5 https://app.convocate.asymmetric-effort.com/api/v1/status >/dev/null 2>&1 && echo OK || echo FAILED)"
            echo "Grafana: $(curl -sfk --max-time 5 https://grafana.asymmetric-effort.com/api/health >/dev/null 2>&1 && echo OK || echo FAILED)"
            AUTH_CODE2=$(curl -sk --max-time 5 -o /dev/null -w '%{http_code}' https://auth.asymmetric-effort.com/v1/sys/health)
            echo "OpenBao: HTTP $AUTH_CODE2"
          fi

          # Step 9: Fix Grafana Pending pods (node-b-4 disk pressure)
          echo "=== Step 9: Fix Grafana ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf

            echo '--- Grafana pod events ---'
            GPOD=\$(sudo kubectl get pod -n o11y -l app=grafana --no-headers | grep Pending | head -1 | awk '{print \$1}')
            if [ -n \"\$GPOD\" ]; then
              sudo kubectl describe pod \$GPOD -n o11y | grep -A5 Events | tail -6
            fi

            echo '--- Check node-b-4 disk pressure ---'
            TAINTED=\$(sudo kubectl get node node-b-4 -o jsonpath='{.spec.taints}' 2>/dev/null)
            echo \"node-b-4 taints: \$TAINTED\"

            if echo \"\$TAINTED\" | grep -q disk-pressure; then
              echo 'node-b-4 has disk pressure — cleaning up...'
              # Clean up container images and dead containers on node-b-4
              NODE4_IP=\$(sudo kubectl get node node-b-4 -o jsonpath='{.status.addresses[?(@.type==\"InternalIP\")].address}')
              echo \"node-b-4 IP: \$NODE4_IP\"
              # Can't SSH to worker nodes, so use a cleanup pod
              sudo kubectl delete pod disk-cleanup -n kube-system --ignore-not-found --grace-period=0 --force 2>/dev/null || true
              sleep 2
              sudo kubectl run disk-cleanup -n kube-system --restart=Never \
                --image=busybox:latest \
                --overrides='{\"spec\":{\"nodeSelector\":{\"kubernetes.io/hostname\":\"node-b-4\"},\"volumes\":[{\"name\":\"var-log\",\"hostPath\":{\"path\":\"/var/log\"}},{\"name\":\"tmp\",\"hostPath\":{\"path\":\"/tmp\"}}],\"containers\":[{\"name\":\"cleanup\",\"image\":\"busybox:latest\",\"command\":[\"sh\",\"-c\",\"find /var-log -name \\\"*.log\\\" -size +100M -exec truncate -s 0 {} \\\\; 2>/dev/null; rm -rf /tmp-host/*.tmp /tmp-host/containerd-* 2>/dev/null; df -h / && echo CLEANUP DONE\"],\"volumeMounts\":[{\"name\":\"var-log\",\"mountPath\":\"/var-log\"},{\"name\":\"tmp\",\"mountPath\":\"/tmp-host\"}]}]}}' \
                --command -- sh -c 'find /var-log -name \"*.log\" -size +100M -exec truncate -s 0 {} \; 2>/dev/null; rm -rf /tmp-host/*.tmp /tmp-host/containerd-* 2>/dev/null; df -h / && echo CLEANUP DONE'
              sudo kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/disk-cleanup -n kube-system --timeout=30s 2>/dev/null || true
              echo \"Cleanup phase: \$(sudo kubectl get pod disk-cleanup -n kube-system -o jsonpath='{.status.phase}')\"
              sudo kubectl delete pod disk-cleanup -n kube-system --ignore-not-found

              echo 'Waiting for disk-pressure taint to clear...'
              for i in \$(seq 1 12); do
                TAINTS=\$(sudo kubectl get node node-b-4 -o jsonpath='{.spec.taints}' 2>/dev/null)
                if ! echo \"\$TAINTS\" | grep -q disk-pressure; then
                  echo 'Disk pressure cleared!'
                  break
                fi
                echo \"Still tainted (attempt \$i/12)\"
                sleep 10
              done
            fi

            echo '--- Grafana pods after fix ---'
            sudo kubectl get pods -n o11y -l app=grafana -o wide --no-headers
          "

          # Restart the Grafana port-forward since we killed it
          echo "=== Restart Grafana port-forward ==="
          ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_B_HOST} "
            # Check if grafana port-forward is still running
            if ! sudo ss -tlnp | grep -q 38300; then
              echo 'Grafana port-forward dead — restarting...'
              sudo -u sam-caldwell nohup kubectl --kubeconfig=/home/sam-caldwell/.kube/config port-forward --address 0.0.0.0 -n o11y svc/grafana 38300:3000 </dev/null >/dev/null 2>&1 &
              sleep 3
              sudo ss -tlnp | grep 38300 && echo 'Grafana port-forward restarted' || echo 'FAILED to restart'
            else
              echo 'Grafana port-forward already running'
            fi
          "

          echo "=== Recovery Complete ==="

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/ansible_key ~/.ssh/id_ed25519
