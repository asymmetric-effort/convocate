name: Recover Cluster B

on:
  workflow_dispatch:

jobs:
  recover:
    name: Recover Cluster B
    runs-on: [self-hosted, linux, x64]
    env:
      CLUSTER_B_HOST: ${{ secrets.CLUSTER_B_HOST }}
      CLUSTER_B_CIDR: ${{ secrets.CLUSTER_B_CIDR }}
      HYPERVISOR_USER: ${{ secrets.HYPERVISOR_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      VM_PASSWORD_HASH: ${{ secrets.VM_PASSWORD_HASH }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
      DNS_DOMAIN: ${{ secrets.DNS_DOMAIN }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r infrastructure/requirements.yml
      - name: Recover Cluster B
        working-directory: infrastructure
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          cp ~/.ssh/ansible_key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'SSHEOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          SSHEOF
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/ansible_key

          # Discover Cluster B control plane IP
          CP_IP=$(ssh -i ~/.ssh/ansible_key ${HYPERVISOR_USER}@${CLUSTER_B_HOST} \
            "sudo virsh domifaddr node-b-0 2>/dev/null | grep -oP '192\.\d+\.\d+\.\d+' | head -1")
          if [ -z "$CP_IP" ]; then
            for ip in 192.168.56.20 192.168.56.21 192.168.56.22 192.168.56.10; do
              if ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} -o ConnectTimeout=3 convocate@$ip hostname 2>/dev/null; then
                CP_IP=$ip; break
              fi
            done
          fi
          echo "Cluster B CP: $CP_IP"
          [ -n "$CP_IP" ] || { echo "ERROR: Cannot find Cluster B control plane"; exit 1; }

          # Create host_vars with discovered IP
          mkdir -p inventory/host_vars
          echo "ansible_host: $CP_IP" > inventory/host_vars/node-b-0.yml
          echo "ansible_user: convocate" >> inventory/host_vars/node-b-0.yml

          # Step 1: Ensure sam-caldwell user on all nodes
          echo "=== Adding sam-caldwell user to all nodes ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            for node_name in \$(sudo kubectl get nodes -o name 2>/dev/null | sed 's|node/||'); do
              echo \"Processing \$node_name...\"
            done

            # Add to this node (control plane)
            sudo useradd -m -s /bin/bash -G sudo sam-caldwell 2>/dev/null || true
            echo 'sam-caldwell ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/sam-caldwell >/dev/null
            sudo mkdir -p /home/sam-caldwell/.ssh
            curl -sfL https://github.com/sam-caldwell.keys | sudo tee /home/sam-caldwell/.ssh/authorized_keys >/dev/null
            sudo chmod 700 /home/sam-caldwell/.ssh
            sudo chmod 600 /home/sam-caldwell/.ssh/authorized_keys
            sudo chown -R sam-caldwell:sam-caldwell /home/sam-caldwell/.ssh
            echo 'sam-caldwell user ready on control plane'
          "

          # Step 2: Restart kubelet if API server is down
          echo "=== Checking API server ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            if ! sudo kubectl get nodes >/dev/null 2>&1; then
              echo 'API server down — restarting kubelet...'
              sudo systemctl restart kubelet
              sleep 20
            fi
            echo 'Waiting for API server...'
            for i in \$(seq 1 12); do
              if sudo kubectl get nodes >/dev/null 2>&1; then
                echo 'API server is up'
                sudo kubectl get nodes
                break
              fi
              echo \"Attempt \$i/12...\"
              sleep 10
            done
          "

          # Step 3: Check OpenBao seal status and reinitialize if needed
          echo "=== Checking OpenBao ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf

            # Wait for OpenBao pod
            sudo kubectl wait --for=condition=Ready pod -l app=openbao -n security --timeout=60s 2>/dev/null || true

            BAO_IP=\$(sudo kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}' 2>/dev/null)
            if [ -z \"\$BAO_IP\" ]; then
              echo 'OpenBao service not found'
              exit 1
            fi

            HEALTH=\$(curl -s http://\$BAO_IP:8200/v1/sys/health 2>/dev/null || echo '{}')
            echo \"OpenBao health: \$HEALTH\"

            INITIALIZED=\$(echo \$HEALTH | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"initialized\",False))' 2>/dev/null || echo 'False')
            SEALED=\$(echo \$HEALTH | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"sealed\",True))' 2>/dev/null || echo 'True')
            echo \"Initialized: \$INITIALIZED  Sealed: \$SEALED\"

            # Check if unseal key is real or placeholder
            UNSEAL_KEY=\$(sudo kubectl get secret openbao-unseal-key -n security -o jsonpath='{.data.key}' 2>/dev/null | base64 -d)

            if [ \"\$SEALED\" = 'True' ] && [ \"\$UNSEAL_KEY\" != 'placeholder' ] && [ -n \"\$UNSEAL_KEY\" ]; then
              echo 'OpenBao is sealed but we have the real unseal key — unsealing...'
              curl -s -d \"{\\\"key\\\":\\\"\$UNSEAL_KEY\\\"}\" http://\$BAO_IP:8200/v1/sys/unseal
              echo 'Unseal request sent'
            elif [ \"\$SEALED\" = 'True' ] || [ \"\$INITIALIZED\" = 'False' ] || [ \"\$UNSEAL_KEY\" = 'placeholder' ]; then
              echo 'OpenBao needs reinitializtion (sealed with lost key or not initialized)...'

              # Wipe data on the node where OpenBao PV lives (not the control plane)
              sudo kubectl scale deployment openbao -n security --replicas=0
              sleep 5
              BAO_NODE=\$(sudo kubectl get pv openbao-pv -o jsonpath='{.spec.nodeAffinity.required.nodeSelectorTerms[0].matchExpressions[0].values[0]}' 2>/dev/null || echo '')
              # Use a pod to wipe data on the correct node (can't SSH between nodes)
              BAO_NODE=\$(sudo kubectl get pv openbao-pv -o jsonpath='{.spec.nodeAffinity.required.nodeSelectorTerms[0].matchExpressions[0].values[0]}' 2>/dev/null || echo '')
              echo \"OpenBao data node: \$BAO_NODE\"
              sudo kubectl delete pod openbao-wipe -n security --ignore-not-found --grace-period=0 --force 2>/dev/null || true
              sleep 2
              if [ -n \"\$BAO_NODE\" ]; then
                echo \"Wiping /mnt/security/openbao on \$BAO_NODE via pod\"
                sudo kubectl run openbao-wipe -n security --restart=Never \
                  --image=busybox:latest \
                  --overrides='{\"spec\":{\"nodeSelector\":{\"kubernetes.io/hostname\":\"'\$BAO_NODE'\"},\"volumes\":[{\"name\":\"data\",\"hostPath\":{\"path\":\"/mnt/security/openbao\"}}],\"containers\":[{\"name\":\"wipe\",\"image\":\"busybox:latest\",\"command\":[\"sh\",\"-c\",\"rm -rf /data/* && echo WIPED\"],\"volumeMounts\":[{\"name\":\"data\",\"mountPath\":\"/data\"}]}]}}' \
                  --command -- sh -c 'rm -rf /data/* && echo WIPED'
                sudo kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/openbao-wipe -n security --timeout=30s 2>/dev/null || \
                  sudo kubectl wait --for=jsonpath='{.status.phase}'=Failed pod/openbao-wipe -n security --timeout=10s 2>/dev/null || true
                WIPE_PHASE=\$(sudo kubectl get pod openbao-wipe -n security -o jsonpath='{.status.phase}' 2>/dev/null)
                echo \"Wipe pod phase: \$WIPE_PHASE\"
                sudo kubectl delete pod openbao-wipe -n security --ignore-not-found
              else
                echo 'WARNING: Could not determine OpenBao node, wiping locally'
                sudo rm -rf /mnt/security/openbao/*
              fi

              # Delete and recreate placeholder secrets
              for ns in security convocate data-layer o11y; do
                sudo kubectl delete secret openbao-root-token -n \$ns --ignore-not-found
              done
              sudo kubectl delete secret openbao-unseal-key -n security --ignore-not-found
              for ns in security convocate data-layer o11y; do
                sudo kubectl create secret generic openbao-root-token -n \$ns --from-literal=token=placeholder
              done
              sudo kubectl create secret generic openbao-unseal-key -n security --from-literal=key=placeholder

              # Scale back up
              sudo kubectl scale deployment openbao -n security --replicas=1
              echo 'Waiting for OpenBao pod...'
              sudo kubectl wait --for=condition=Ready pod -l app=openbao -n security --timeout=120s

              echo 'OpenBao is uninitialized and ready for deploy.yml to initialize it'
            else
              echo 'OpenBao is initialized and unsealed — checking root token...'
              ROOT_TOKEN=\$(sudo kubectl get secret openbao-root-token -n security -o jsonpath='{.data.token}' 2>/dev/null | base64 -d)
              if [ \"\$ROOT_TOKEN\" = 'placeholder' ] || ! curl -sf -H \"X-Vault-Token:\$ROOT_TOKEN\" http://\$BAO_IP:8200/v1/auth/token/lookup-self >/dev/null 2>&1; then
                echo 'Root token is invalid — need to reinitialize'
                sudo kubectl scale deployment openbao -n security --replicas=0
                sleep 5
                BAO_NODE=\$(sudo kubectl get pv openbao-pv -o jsonpath='{.spec.nodeAffinity.required.nodeSelectorTerms[0].matchExpressions[0].values[0]}' 2>/dev/null || echo '')
                if [ -n \"\$BAO_NODE\" ]; then
                  BAO_NODE_IP=\$(sudo kubectl get node \$BAO_NODE -o jsonpath='{.status.addresses[?(@.type==\"InternalIP\")].address}')
                  ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \$BAO_NODE_IP 'sudo rm -rf /mnt/security/openbao/*'
                else
                  sudo rm -rf /mnt/security/openbao/*
                fi
                for ns in security convocate data-layer o11y; do
                  sudo kubectl delete secret openbao-root-token -n \$ns --ignore-not-found
                  sudo kubectl create secret generic openbao-root-token -n \$ns --from-literal=token=placeholder
                done
                sudo kubectl delete secret openbao-unseal-key -n security --ignore-not-found
                sudo kubectl create secret generic openbao-unseal-key -n security --from-literal=key=placeholder
                sudo kubectl scale deployment openbao -n security --replicas=1
                sudo kubectl wait --for=condition=Ready pod -l app=openbao -n security --timeout=120s
                echo 'OpenBao reinitialized — ready for deploy.yml'
              else
                echo 'Root token is valid — OpenBao is healthy'
              fi
            fi
          "

          # Step 4: Run deploy.yml to initialize OpenBao users/OIDC if needed
          echo "=== Running deploy playbook ==="
          ansible-playbook playbooks/deploy.yml \
            -i inventory/cluster-b.yml \
            -e "ssh_public_key='$SSH_PUBLIC_KEY'" \
            -e "vm_password_hash='$VM_PASSWORD_HASH'"

          # Step 4b: Restart OpenBao so all pods pick up the real unseal key
          echo "=== Restarting OpenBao for all pods to unseal ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf
            sudo kubectl rollout restart deployment openbao -n security
            sudo kubectl rollout status deployment openbao -n security --timeout=120s
            sleep 10
            BAO_IP=\$(sudo kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}')
            for i in \$(seq 1 6); do
              HEALTH=\$(curl -s http://\$BAO_IP:8200/v1/sys/health 2>/dev/null)
              SEALED=\$(echo \$HEALTH | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"sealed\",True))' 2>/dev/null)
              echo \"Attempt \$i: sealed=\$SEALED\"
              [ \"\$SEALED\" = 'False' ] && break
              sleep 5
            done
          "

          # Step 5: Verify everything works
          echo "=== Final Verification ==="
          ssh -i ~/.ssh/ansible_key -J ${HYPERVISOR_USER}@${CLUSTER_B_HOST} convocate@$CP_IP "
            export KUBECONFIG=/etc/kubernetes/admin.conf

            echo '=== Nodes ==='
            sudo kubectl get nodes

            echo '=== All Pods ==='
            sudo kubectl get pods -A --no-headers | grep -v Running | grep -v Completed || echo 'All pods healthy'

            echo '=== OpenBao Health ==='
            BAO_IP=\$(sudo kubectl get svc openbao -n security -o jsonpath='{.spec.clusterIP}')
            curl -s http://\$BAO_IP:8200/v1/sys/health | python3 -c 'import sys,json; d=json.load(sys.stdin); print(\"init:\", d[\"initialized\"], \"sealed:\", d[\"sealed\"])'

            echo '=== Login Test ==='
            TOKEN=\$(curl -s -X POST http://\$BAO_IP:8200/v1/auth/userpass/login/admin -d '{\"password\":\"Convocate-Admin-2026\"}' 2>&1 | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"auth\",{}).get(\"client_token\",\"FAILED\"))' 2>/dev/null || echo 'FAILED')
            if [ \"\$TOKEN\" != 'FAILED' ] && [ -n \"\$TOKEN\" ]; then
              echo 'Admin login: OK'
            else
              echo 'Admin login: FAILED'
              exit 1
            fi

            echo '=== Verify All Services (external) ==='
            echo 'Checking app.convocate.asymmetric-effort.com...'
            curl -sfk --connect-timeout 5 --max-time 10 https://app.convocate.asymmetric-effort.com/api/v1/status >/dev/null && echo 'Convocate: OK' || echo 'Convocate: FAILED'
            echo 'Checking grafana.asymmetric-effort.com...'
            curl -sfk --connect-timeout 5 --max-time 10 https://grafana.asymmetric-effort.com/api/health >/dev/null && echo 'Grafana: OK' || echo 'Grafana: FAILED'
            echo 'Checking auth.asymmetric-effort.com...'
            AUTH_CODE=\$(curl -sk --connect-timeout 5 --max-time 10 -o /dev/null -w '%{http_code}' https://auth.asymmetric-effort.com/v1/sys/health)
            [ \"\$AUTH_CODE\" = '200' ] && echo 'OpenBao: OK' || echo \"OpenBao: HTTP \$AUTH_CODE (200=ok, 503=sealed)\"

            echo '=== Recovery Complete ==='
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ansible_key ~/.ssh/id_ed25519
