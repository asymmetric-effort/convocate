name: Deploy Applications

on:
  push:
    branches: [main]
    paths: ['src/**', 'infrastructure/charts/**']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

concurrency:
  group: deploy-apps
  cancel-in-progress: true

jobs:
  verify:
    name: Verify prerequisites
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 2
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Verify Docker Images pipeline passed
        run: |
          LAST_RUN=$(curl -s \
            "https://api.github.com/repos/asymmetric-effort/convocate/actions/workflows/docker-images.yml/runs?per_page=1&status=completed" \
            | python3 -c 'import sys,json; runs=json.load(sys.stdin).get("workflow_runs",[]); print(runs[0]["conclusion"] if runs else "none")')
          echo "Docker Images last run: $LAST_RUN"
          if [ "$LAST_RUN" != "success" ]; then
            echo "::error::Last Docker Images run did not pass (status: $LAST_RUN)."
            exit 1
          fi

      - name: Verify Kubernetes Clusters pipeline passed
        run: |
          LAST_RUN=$(curl -s \
            "https://api.github.com/repos/asymmetric-effort/convocate/actions/workflows/k8s.yml/runs?per_page=1&status=completed" \
            | python3 -c 'import sys,json; runs=json.load(sys.stdin).get("workflow_runs",[]); print(runs[0]["conclusion"] if runs else "none")')
          echo "K8s Clusters last run: $LAST_RUN"
          if [ "$LAST_RUN" != "success" ]; then
            echo "::error::Last K8s Clusters run did not pass (status: $LAST_RUN)."
            exit 1
          fi

      - name: Verify OpenBao is accessible
        run: |
          SEAL_STATUS=$(curl -sf --connect-timeout 10 -k https://192.168.3.161:443/v1/sys/seal-status 2>/dev/null)
          if [ -z "$SEAL_STATUS" ]; then
            echo "::error::OpenBao not reachable"
            exit 1
          fi
          echo "OpenBao: reachable"

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ] || [ "$TAG" = "latest" ]; then
            TAG="latest"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

  deploy-cluster-a:
    name: Deploy to cluster-a (canary)
    needs: verify
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    env:
      KUBECONFIG_HOST: 192.168.3.170
      CLUSTER: cluster-a
      IMAGE_TAG: ${{ needs.verify.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        run: |
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz | tar xz -C /tmp
            sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          fi

      - name: Fetch kubeconfig
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/key \
            convocate@$KUBECONFIG_HOST sudo cat /etc/kubernetes/admin.conf > /tmp/kubeconfig
          rm -f ~/.ssh/key

      - name: Create namespaces and GHCR pull secret
        run: |
          KC="--kubeconfig=/tmp/kubeconfig"
          for NS in convocate data-layer convocate-agents; do
            kubectl $KC create namespace $NS --dry-run=client -o yaml | kubectl $KC apply -f -
            kubectl $KC label namespace $NS app.kubernetes.io/managed-by=Helm --overwrite
            kubectl $KC annotate namespace $NS meta.helm.sh/release-name=convocate meta.helm.sh/release-namespace=convocate --overwrite
          done
          for NS in convocate data-layer; do
            kubectl $KC -n $NS create secret docker-registry ghcr-pull \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | kubectl $KC apply -f -
          done

      - name: Create secrets from OpenBao
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Get OpenBao root token from svr00
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          BAO_TOKEN=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/key \
            samcaldwell@192.168.3.159 'sudo cat /var/openbao/tls/secrets-b/.root-token' 2>/dev/null)
          rm -f ~/.ssh/key
          BAO=https://192.168.3.161:443

          # Issue TLS cert for API
          CERT_RESP=$(curl -sf -k \
            -d '{"common_name":"api.dev.convocate.net","alt_names":"api.dev.convocate.net","ip_sans":"192.168.3.171","ttl":"8760h"}' \
            -H "X-Vault-Token:$BAO_TOKEN" $BAO/v1/pki/issue/server)

          CERT=$(echo "$CERT_RESP" | python3 -c '
          import sys,json
          d=json.load(sys.stdin)["data"]
          c=d["certificate"]
          if d.get("ca_chain"): c+="\n"+"\n".join(d["ca_chain"])
          elif d.get("issuing_ca"): c+="\n"+d["issuing_ca"]
          print(c)')
          KEY=$(echo "$CERT_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["private_key"])')

          # Create TLS secret
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret tls convocate-api-tls \
            --cert=<(echo "$CERT") --key=<(echo "$KEY") \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          # Create PostgreSQL credentials (all services in convocate namespace)
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret generic postgresql-credentials \
            --from-literal=DATABASE_URL="postgresql://convocate:convocate@postgresql.convocate.svc:5432/convocate?sslmode=disable" \
            --from-literal=POSTGRES_USER=convocate \
            --from-literal=POSTGRES_PASSWORD=convocate \
            --from-literal=POSTGRES_DB=convocate \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          # Create Redis credentials
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret generic redis-credentials \
            --from-literal=REDIS_URL="redis://redis.convocate.svc:6379" \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          # Create OpenBao token secret
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret generic openbao-root-token \
            --from-literal=token="$BAO_TOKEN" \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

      - name: Reset Helm release if stuck
        run: |
          STATUS=$(helm status convocate --kubeconfig /tmp/kubeconfig -n convocate -o json 2>/dev/null | python3 -c 'import sys,json; print(json.load(sys.stdin)["info"]["status"])' 2>/dev/null || echo "not-found")
          echo "Helm release status: $STATUS"
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "Release stuck in $STATUS — uninstalling for clean install"
            helm uninstall convocate --kubeconfig /tmp/kubeconfig -n convocate --wait 2>/dev/null || true
          fi

      - name: Helm upgrade cluster-a
        run: |
          helm upgrade --install convocate ./infrastructure/charts/convocate \
            -f ./infrastructure/charts/convocate/values-cluster-a.yaml \
            --set global.imageTag=$IMAGE_TAG \
            --kubeconfig /tmp/kubeconfig \
            --namespace convocate \
            --create-namespace \
            --wait --timeout 300s \
            --debug 2>&1 || {
              echo "=== Helm upgrade failed ==="
              echo "=== Pods ==="
              kubectl --kubeconfig=/tmp/kubeconfig get pods -n convocate -o wide 2>&1 || true
              echo "=== Events ==="
              kubectl --kubeconfig=/tmp/kubeconfig get events -n convocate --sort-by=.lastTimestamp 2>&1 | tail -30 || true
              echo "=== Helm history ==="
              helm history convocate --kubeconfig /tmp/kubeconfig -n convocate 2>&1 || true
              exit 1
            }

      - name: Wait for rollout
        run: |
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate rollout status deployment/convocate-api --timeout=60s
          kubectl --kubeconfig=/tmp/kubeconfig -n data-layer rollout status deployment/postgresql --timeout=60s 2>/dev/null || true
          kubectl --kubeconfig=/tmp/kubeconfig -n data-layer rollout status deployment/redis --timeout=60s 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/kubeconfig

  pdv-cluster-a:
    name: PDV (cluster-a)
    needs: deploy-cluster-a
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 2
    steps:
      - name: API health check
        run: |
          for i in $(seq 1 10); do
            RESP=$(curl -sfk https://192.168.3.171:443/api/v1/status 2>/dev/null) && break
            sleep 3
          done
          if [ -z "$RESP" ]; then
            echo "::error::API not responding at https://192.168.3.171:443"
            exit 1
          fi
          echo "$RESP" | python3 -c '
          import sys,json
          d=json.load(sys.stdin)
          print(f"Status: {d[\"status\"]}")
          for s in d.get("services",[]):
              print(f"  {s[\"name\"]}: {s[\"status\"]} ({s[\"latencyMs\"]}ms)")
          assert d["status"] in ("healthy","degraded"), f"Unhealthy: {d}"
          print("PDV PASS: API healthy")
          '

  deploy-cluster-b:
    name: Deploy to cluster-b (production)
    needs: pdv-cluster-a
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    env:
      KUBECONFIG_HOST: 192.168.3.180
      CLUSTER: cluster-b
      IMAGE_TAG: ${{ needs.verify.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Fetch kubeconfig
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/key \
            convocate@$KUBECONFIG_HOST sudo cat /etc/kubernetes/admin.conf > /tmp/kubeconfig
          rm -f ~/.ssh/key

      - name: Create namespaces and GHCR pull secret
        run: |
          KC="--kubeconfig=/tmp/kubeconfig"
          for NS in convocate data-layer convocate-agents; do
            kubectl $KC create namespace $NS --dry-run=client -o yaml | kubectl $KC apply -f -
            kubectl $KC label namespace $NS app.kubernetes.io/managed-by=Helm --overwrite
            kubectl $KC annotate namespace $NS meta.helm.sh/release-name=convocate meta.helm.sh/release-namespace=convocate --overwrite
          done
          for NS in convocate data-layer; do
            kubectl $KC -n $NS create secret docker-registry ghcr-pull \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | kubectl $KC apply -f -
          done

      - name: Create secrets from OpenBao
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          BAO_TOKEN=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/key \
            samcaldwell@192.168.3.159 'sudo cat /var/openbao/tls/secrets-b/.root-token' 2>/dev/null)
          rm -f ~/.ssh/key
          BAO=https://192.168.3.161:443

          # Issue TLS cert for API
          CERT_RESP=$(curl -sf -k \
            -d '{"common_name":"api.convocate.net","alt_names":"api.convocate.net","ip_sans":"192.168.3.181","ttl":"8760h"}' \
            -H "X-Vault-Token:$BAO_TOKEN" $BAO/v1/pki/issue/server)

          CERT=$(echo "$CERT_RESP" | python3 -c '
          import sys,json
          d=json.load(sys.stdin)["data"]
          c=d["certificate"]
          if d.get("ca_chain"): c+="\n"+"\n".join(d["ca_chain"])
          elif d.get("issuing_ca"): c+="\n"+d["issuing_ca"]
          print(c)')
          KEY=$(echo "$CERT_RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["private_key"])')

          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret tls convocate-api-tls \
            --cert=<(echo "$CERT") --key=<(echo "$KEY") \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          # Create PostgreSQL credentials (all services in convocate namespace)
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret generic postgresql-credentials \
            --from-literal=DATABASE_URL="postgresql://convocate:convocate@postgresql.convocate.svc:5432/convocate?sslmode=disable" \
            --from-literal=POSTGRES_USER=convocate \
            --from-literal=POSTGRES_PASSWORD=convocate \
            --from-literal=POSTGRES_DB=convocate \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret generic redis-credentials \
            --from-literal=REDIS_URL="redis://redis.convocate.svc:6379" \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

          kubectl --kubeconfig=/tmp/kubeconfig -n convocate create secret generic openbao-root-token \
            --from-literal=token="$BAO_TOKEN" \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kubeconfig apply -f -

      - name: Reset Helm release if stuck
        run: |
          STATUS=$(helm status convocate --kubeconfig /tmp/kubeconfig -n convocate -o json 2>/dev/null | python3 -c 'import sys,json; print(json.load(sys.stdin)["info"]["status"])' 2>/dev/null || echo "not-found")
          echo "Helm release status: $STATUS"
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "Release stuck in $STATUS — uninstalling for clean install"
            helm uninstall convocate --kubeconfig /tmp/kubeconfig -n convocate --wait 2>/dev/null || true
          fi

      - name: Helm upgrade cluster-b
        run: |
          helm upgrade --install convocate ./infrastructure/charts/convocate \
            -f ./infrastructure/charts/convocate/values-cluster-b.yaml \
            --set global.imageTag=$IMAGE_TAG \
            --kubeconfig /tmp/kubeconfig \
            --namespace convocate \
            --create-namespace \
            --wait --timeout 300s

      - name: Wait for rollout
        run: |
          kubectl --kubeconfig=/tmp/kubeconfig -n convocate rollout status deployment/convocate-api --timeout=60s
          kubectl --kubeconfig=/tmp/kubeconfig -n data-layer rollout status deployment/postgresql --timeout=60s 2>/dev/null || true
          kubectl --kubeconfig=/tmp/kubeconfig -n data-layer rollout status deployment/redis --timeout=60s 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/kubeconfig

  smoke-cluster-b:
    name: Smoke (cluster-b)
    needs: deploy-cluster-b
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 2
    steps:
      - name: API health check
        run: |
          for i in $(seq 1 10); do
            RESP=$(curl -sfk https://192.168.3.181:443/api/v1/status 2>/dev/null) && break
            sleep 3
          done
          if [ -z "$RESP" ]; then
            echo "::error::API not responding at https://192.168.3.181:443"
            exit 1
          fi
          echo "$RESP" | python3 -c '
          import sys,json
          d=json.load(sys.stdin)
          print(f"Status: {d[\"status\"]}")
          for s in d.get("services",[]):
              print(f"  {s[\"name\"]}: {s[\"status\"]} ({s[\"latencyMs\"]}ms)")
          assert d["status"] in ("healthy","degraded"), f"Unhealthy: {d}"
          print("SMOKE PASS: API healthy")
          '
